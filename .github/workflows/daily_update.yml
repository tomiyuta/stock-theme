name: Daily Data Update

on:
  schedule:
    - cron: '0 23 * * 1-5'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas scipy numpy

      - name: Run data pipeline
        run: python scripts/build_for_vercel.py

      - name: Update stock metadata
        run: |
          python scripts/fetch_stock_meta.py
          python scripts/add_ja_names.py

      - name: Generate PRISM snapshot
        env:
          SNAPSHOT_INPUT_DIR: data/input
          SNAPSHOT_ROOT: data/snapshots
          MARKET_BENCHMARK: SPY
          CASH_PROXY: SHV
          K_GATE_LOOKBACK_DAYS: "63"
          GATE_OPEN_THRESHOLD: "0.0"
          GATE_MID_THRESHOLD: "-0.02"
        run: |
          python scripts/prepare_snapshot_inputs.py
          python scripts/generate_snapshot.py
          mkdir -p public/api/prism
          cp data/snapshots/latest/*.json public/api/prism/
          python scripts/generate_orders.py
          cp data/ledger/positions.json public/api/prism/ledger.json
          LATEST_ORDER=$(ls -t data/orders/orders_*.csv 2>/dev/null | head -1)
          if [ -n "$LATEST_ORDER" ]; then python3 -c "import csv,json,sys; r=list(csv.DictReader(open('$LATEST_ORDER'))); open('public/api/prism/orders.json','w').write(json.dumps(r,indent=2))"; fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/api/ data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data+prism: $(date -u +%Y-%m-%d) daily update"
            git pull --rebase origin main
            git push
          fi
