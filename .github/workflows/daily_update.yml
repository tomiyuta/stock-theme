name: Daily Data Update

on:
  schedule:
    - cron: '0 23 * * 1-5'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas scipy

      - name: Run data pipeline
        run: python scripts/build_for_vercel.py

      - name: Update stock metadata
        run: |
          python scripts/fetch_stock_meta.py
          python scripts/add_ja_names.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/api/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/api/
          git commit -m "data: $(date -u +%Y-%m-%d) daily update"
          git pull --rebase origin main
          git push
