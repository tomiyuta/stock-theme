<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>マクロ＋構造 | PRISMATIC</title>
  <link rel="stylesheet" href="/styles.css?v=21">
<style>
.tab-bar{display:flex;border-bottom:2px solid rgba(0,0,0,0.06);margin:0 0 4px}
.tab-btn{flex:1;padding:10px;border:none;background:none;font-size:13px;font-weight:600;color:var(--text-sub);cursor:pointer;position:relative;font-family:inherit}
.tab-btn.active{color:var(--text-main)}
.tab-btn.active::after{content:'';position:absolute;bottom:-2px;left:15%;right:15%;height:2px;background:var(--text-main);border-radius:1px}
.tab-content{display:none}.tab-content.active{display:block}
</style>
<style>
.sr-card{margin:4px 10px;border-radius:6px;border:1px solid rgba(0,0,0,0.06);overflow:hidden}
.sr-header{padding:10px 12px;font-size:12px;font-weight:700;cursor:pointer;background:var(--card,#f8f9fb);display:flex;justify-content:space-between;align-items:center}
.sr-header:active{background:rgba(0,0,0,0.04)}
.sr-body{display:none;padding:0 8px 8px;overflow-x:auto}
.sr-card.open .sr-body{display:block}
.sr-card.open .sr-arrow{transform:rotate(90deg)}
.sr-arrow{font-size:9px;color:var(--text-sub);transition:transform 0.2s}
.sr-meta{font-size:9px;color:var(--text-sub)}
.dm-table{width:100%;font-size:9px;border-collapse:collapse;min-width:350px}
.dm-table th{padding:4px 3px;font-weight:600;color:var(--text-sub);border-bottom:1px solid rgba(0,0,0,0.08);position:sticky;top:0;background:#fff;font-size:8px;white-space:nowrap;text-align:center}
.dm-table th.dm-cat-th{max-width:70px;overflow:hidden;text-overflow:ellipsis;cursor:help}
.dm-table td{padding:3px 2px;border-bottom:1px solid rgba(0,0,0,0.03);text-align:center}
.dm-table td:first-child{text-align:left;font-weight:700;font-size:10px;white-space:nowrap}
.dm-s{display:inline-block;width:16px;height:16px;line-height:16px;text-align:center;border-radius:2px;font-size:10px;font-weight:700}
.dm-s.s10{background:rgba(0,200,83,0.15);color:#00c853}
.dm-s.s05{background:rgba(0,82,204,0.1);color:#0052cc}
.dm-s.s025{background:rgba(245,158,11,0.1);color:#f59e0b}
.dm-s.s0{color:rgba(0,0,0,0.1)}
.cross-row{display:flex;align-items:center;gap:6px;padding:4px 10px;border-bottom:1px solid rgba(0,0,0,0.04);font-size:11px}
.cross-tk{font-weight:800;min-width:45px}.cross-cnt{font-size:10px;color:var(--text-sub);min-width:20px}
.cross-tags{display:flex;gap:3px;flex-wrap:wrap}
.cross-tag{font-size:8px;padding:1px 4px;border-radius:2px;background:rgba(0,82,204,0.06);color:#0052cc;white-space:nowrap}
.dip-card{margin:4px 10px;padding:10px 12px;border-radius:6px;border:1px solid rgba(0,0,0,0.06);display:flex;justify-content:space-between;align-items:center}
.dip-name{font-size:12px;font-weight:700;flex:1}.dip-val{font-size:14px;font-weight:800;color:#ff1744}
.dip-meta{font-size:9px;color:var(--text-sub);margin-top:2px}
.dip-wr{font-size:9px;padding:1px 4px;border-radius:2px;margin-left:6px}
.dip-wr.high{background:rgba(0,200,83,0.1);color:#00c853}.dip-wr.low{background:rgba(255,23,68,0.1);color:#ff1744}
</style>
</head>
<body>
  <header>
    <div class="header-top"><div class="header-title">マクロ＋構造分析</div></div>
    <div class="header-meta" id="headerMeta"></div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('macro')">マクロ</button>
      <button class="tab-btn" onclick="switchTab('struct')">構造分析</button>
      <button class="tab-btn" onclick="switchTab('dip')">押し目</button>
    </div>
    <div class="period-bar" id="pbar"></div>
  </header>
  <main>
    <div id="tabMacro" class="tab-content active"><div id="macroMain" style="padding:0"></div></div>
    <div id="tabStruct" class="tab-content"><div id="structMain" style="padding:0"></div></div>
    <div id="tabDip" class="tab-content"><div id="dipMain" style="padding:0"></div></div>
  </main>
  <nav class="bottom-nav">
    <a class="nav-item" href="/"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg></span>テーマ</a>
    <a class="nav-item" href="/health"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 2v6H3v8h6v6h6v-6h6V8h-6V2z"/></svg></span>健康診断</a>
    <a class="nav-item" href="/map"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"/></svg></span>マップ</a>
    <a class="nav-item" href="/market-movers"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span>銘柄</a>
    <a class="nav-item active" href="/infographic"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15 15 0 014 10 15 15 0 01-4 10 15 15 0 01-4-10 15 15 0 014-10z"/></svg></span>マクロ</a>
    <a class="nav-item" href="/prism"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/><line x1="12" y1="22" x2="12" y2="8.5"/><line x1="22" y1="8.5" x2="2" y2="8.5"/></svg></span>PRISM</a>
      <a class="nav-item" href="/prism-r"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/><circle cx="12" cy="12" r="3"/></svg></span><span style="color:#7c3aed">R</span></a>
      <a class="nav-item" href="/prism-rq"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg></span><span style="color:#7c3aed">RQ</span></a>
      <a class="nav-item" href="/prism-g2"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/><path d="M7 14l5-8 5 8" fill="currentColor"/></svg></span><span style="color:#e11d48">G2</span></a>
  </nav>
<script>
function switchTab(t){
  const tabs=['macro','struct','dip'];
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',tabs[i]===t));
  document.getElementById('tabMacro').classList.toggle('active',t==='macro');
  document.getElementById('tabStruct').classList.toggle('active',t==='struct');
  document.getElementById('tabDip').classList.toggle('active',t==='dip');
  document.getElementById('pbar').style.display=t==='macro'?'':'none';
  if(t==='struct'&&!window._structLoaded){loadStruct();window._structLoaded=true;}
  if(t==='dip'&&!window._dipLoaded){loadDip();window._dipLoaded=true;}
}
let period="1ヶ月";
const PL={"1日":"1D","5日":"5D","10日":"10D","1ヶ月":"1M","2ヶ月":"2M","3ヶ月":"3M","半年":"6M","1年":"1Y"};
const fmt=v=>v==null?"—":(v>=0?"+":"")+((v*100).toFixed(1))+"%";
// === Macro Tab (existing) ===
const MACRO={
  "市場指数":{etfs:["SPY","QQQ","IWM","RSP"],desc:"主要インデックス"},
  "セクター":{etfs:["XLK","XLE","XLF","XLV","XLI","XLC","XLY","XLP","XLRE","XLU","XLB"],desc:"S&P500セクター別"},
  "債券・金利":{etfs:["TLT","TLH","IEF","IEI","SHY","SHV","HYG","MBB"],desc:"金利環境と債券市場"},
  "コモディティ":{etfs:["GLD","SLV","USO","UNG","CPER"],desc:"商品市場"},
  "暗号資産":{etfs:["IBIT"],desc:"デジタル資産"},
  "国際":{etfs:["EWJ","MCHI","INDA","EWZ","EWY","EWT","EWU","EZU","EWC","EWA"],desc:"グローバル市場"}
};
const NAMES={SPY:"S&P500",QQQ:"NASDAQ100",IWM:"Russell2000",RSP:"S&P500均等",XLK:"テクノロジー",XLE:"エネルギー",XLF:"金融",XLV:"ヘルスケア",XLI:"資本財",XLC:"通信",XLY:"一般消費財",XLP:"生活必需品",XLRE:"不動産",XLU:"公益",XLB:"素材",TLT:"米国債20Y+",TLH:"米国債10-20Y",IEF:"米国債7-10Y",IEI:"米国債3-7Y",SHY:"米国債1-3Y",SHV:"米国債短期",HYG:"ハイイールド社債",MBB:"MBS",GLD:"金",SLV:"銀",USO:"原油",UNG:"天然ガス",CPER:"銅",IBIT:"ビットコイン",EWJ:"日本",MCHI:"中国",INDA:"インド",EWZ:"ブラジル",EWY:"韓国",EWT:"台湾",EWU:"英国",EZU:"ユーロ圏",EWC:"カナダ",EWA:"豪州"};
let allEtfs=[];
fetch("/api/theme_ranking.json?t="+Date.now()).then(r=>r.json()).then(data=>{
  allEtfs=(data.all_themes||[]).filter(t=>t.isETF);
  window._allThemes=data.all_themes||[];
  const periods=(data.all_periods||[]).filter(p=>p!=="日中");
  document.getElementById("pbar").innerHTML=periods.map(p=>'<button class="period-btn'+(p===period?" active":"")+'" onclick="setP(this,\''+p+'\')">'+((PL[p])||p)+'</button>').join("");
  renderMacro();
});
function setP(btn,p){period=p;document.querySelectorAll(".period-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");renderMacro()}
function renderMacro(){
  let h="";
  for(const[cat,info] of Object.entries(MACRO)){
    h+='<div class="section-label">'+cat+'</div><div class="macro-card">';
    const sorted=info.etfs.map(tk=>{const e=allEtfs.find(x=>x.name===tk);return{tk,name:NAMES[tk]||tk,ret:e?e[period]:null}}).sort((a,b)=>(b.ret||0)-(a.ret||0));
    sorted.forEach(t=>{const cls=(t.ret||0)>=0?"positive":"negative";h+='<div class="macro-row"><span class="macro-row-name">'+t.name+' <span style="color:var(--text-sub);font-size:10px">'+t.tk+'</span></span><span class="macro-row-val '+cls+'">'+fmt(t.ret)+'</span></div>';});
    h+='</div>';
  }
  document.getElementById("macroMain").innerHTML=h;
}
// === Structural Analysis Tab ===
function loadStruct(){
  fetch("/api/structural.json?v="+Date.now()).then(r=>r.json()).then(data=>{
    let h='<div class="section-label">テーマ構造分析（25レポート・'+data.total_tickers+'銘柄）</div>';
    // Reports
    data.reports.forEach(r=>{
      const catHeaders=r.catalysts.map(c=>'<th class="dm-cat-th" title="'+esc(c.title)+'">'+esc(c.short)+'</th>').join('');
      let rows='';
      r.tickers.forEach(t=>{
        let cells='';
        t.drivers.forEach(d=>{
          const cls=d.s===1?'s10':d.s===0.5?'s05':d.s===0.25?'s025':'s0';
          cells+='<td><span class="dm-s '+cls+'">'+d.sym+'</span></td>';
        });
        rows+='<tr><td>'+t.tk+'</td>'+cells+'</tr>';
      });
      h+='<div class="sr-card"><div class="sr-header" onclick="this.parentElement.classList.toggle(\'open\')">';
      h+='<span>'+esc(r.name)+' <span class="sr-meta">'+r.n_tickers+'銘柄 × '+r.n_catalysts+'ドライバー</span></span>';
      h+='<span class="sr-arrow">▶</span></div>';
      h+='<div class="sr-body"><div style="overflow-x:auto"><table class="dm-table"><tr><th></th>'+catHeaders+'</tr>'+rows+'</table></div></div></div>';
    });
    // Cross-theme tickers
    if(data.cross_tickers&&data.cross_tickers.length>0){
      h+='<div class="section-label">テーマ横断銘柄（2レポート以上に登場）</div>';
      data.cross_tickers.forEach(ct=>{
        h+='<div class="cross-row"><span class="cross-tk">'+ct.tk+'</span>';
        h+='<span class="cross-cnt">'+ct.count+'</span>';
        h+='<span class="cross-tags">'+ct.reports.map(r=>'<span class="cross-tag">'+esc(r)+'</span>').join('')+'</span></div>';
      });
    }
    document.getElementById('structMain').innerHTML=h;
  }).catch(e=>{document.getElementById('structMain').innerHTML='<p style="padding:20px;color:var(--text-sub)">構造データ読込中...</p>';});
}
function esc(s){const d=document.createElement('span');d.textContent=s;return d.innerHTML;}
// === Dip Alerts Tab ===
function loadDip(){
  fetch("/api/dip_alerts.json?v="+Date.now()).then(r=>r.json()).then(data=>{
    const period='1M';
    const raw=data[period]||[];
    // Deduplicate: keep deepest dip per theme
    const seen={};
    raw.forEach(a=>{const k=a.theme;if(!seen[k]||Math.abs(a.dip)>Math.abs(seen[k].dip))seen[k]=a;});
    const alerts=Object.values(seen).sort((a,b)=>a.dip-b.dip);
    window._dipAlerts=alerts;
    let h='';
    // === Methodology Card ===
    h+='<div style="margin:8px 10px;border-radius:8px;padding:12px 14px;background:rgba(0,82,204,0.04);border:1px solid rgba(0,82,204,0.12);cursor:pointer" onclick="this.querySelector(\'.dip-guide-body\').style.display=this.querySelector(\'.dip-guide-body\').style.display===\'block\'?\'none\':\'block\'">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;font-weight:700;color:#0052cc">📖 押し目検知の読み方</span><span style="font-size:9px;color:var(--text-sub)">▶ タップで展開</span></div>';
    h+='<div class="dip-guide-body" style="display:none;margin-top:10px;font-size:10px;line-height:1.7;color:var(--text-main)">';

    h+='<div style="font-weight:700;margin-bottom:4px;color:#0052cc">■ 計算手法</div>';
    h+='<div style="padding:6px 8px;background:rgba(0,0,0,0.02);border-radius:4px;margin-bottom:8px">';
    h+='① テーマリターンのピーク（1M/3M/6M/12Mルックバック）を特定<br>';
    h+='② 現在価格とピークの差 = <b>下落幅（dip）</b><br>';
    h+='③ 過去の同パターン（下落幅×経過期間）から<b>回復率（win_rate）</b>を算出<br>';
    h+='④ 回復率 = 「同じ深さ・同じ速さの下落後、テーマが反発した歴史的確率」';
    h+='</div>';

    h+='<div style="font-weight:700;margin-bottom:4px;color:#0052cc">■ 3つの軸（MECE）</div>';
    h+='<table style="width:100%;font-size:9px;border-collapse:collapse;margin-bottom:8px">';
    h+='<tr style="background:rgba(0,82,204,0.06)"><th style="padding:3px 6px;text-align:left;font-weight:700">軸</th><th style="padding:3px 6px;text-align:left">区分</th><th style="padding:3px 6px;text-align:left">意味</th></tr>';
    h+='<tr><td rowspan="3" style="padding:3px 6px;font-weight:700;border-right:1px solid rgba(0,0,0,0.06)">下落幅</td><td style="padding:3px 6px">10-20%</td><td style="padding:3px 6px">調整</td></tr>';
    h+='<tr><td style="padding:3px 6px">20-30%</td><td style="padding:3px 6px">大幅下落</td></tr>';
    h+='<tr style="border-bottom:1px solid rgba(0,0,0,0.06)"><td style="padding:3px 6px">30%+</td><td style="padding:3px 6px">暴落</td></tr>';
    h+='<tr><td rowspan="3" style="padding:3px 6px;font-weight:700;border-right:1px solid rgba(0,0,0,0.06)">経過期間</td><td style="padding:3px 6px">0-1M</td><td style="padding:3px 6px">短期（急落）</td></tr>';
    h+='<tr><td style="padding:3px 6px">1-2M</td><td style="padding:3px 6px">じわじわ</td></tr>';
    h+='<tr style="border-bottom:1px solid rgba(0,0,0,0.06)"><td style="padding:3px 6px">2-3M</td><td style="padding:3px 6px">だらだら</td></tr>';
    h+='<tr><td rowspan="4" style="padding:3px 6px;font-weight:700;border-right:1px solid rgba(0,0,0,0.06)">LB期間</td><td style="padding:3px 6px">1M</td><td style="padding:3px 6px">直近ピーク基準</td></tr>';
    h+='<tr><td style="padding:3px 6px">3M</td><td style="padding:3px 6px">四半期ピーク基準</td></tr>';
    h+='<tr><td style="padding:3px 6px">6M</td><td style="padding:3px 6px">半年ピーク基準</td></tr>';
    h+='<tr><td style="padding:3px 6px">12M</td><td style="padding:3px 6px">年間ピーク基準</td></tr>';
    h+='</table>';

    h+='<div style="font-weight:700;margin-bottom:4px;color:#0052cc">■ 判断フロー</div>';
    h+='<div style="padding:6px 8px;background:rgba(0,200,83,0.04);border-radius:4px;border-left:3px solid #00c853;margin-bottom:6px">';
    h+='<b style="color:#00c853">✅ 使える場面</b><br>';
    h+='• <b>売却の「待て」</b> — 保有テーマに押し目alert → トレンド崩壊ではなく一時的下落と判断し保持継続<br>';
    h+='• <b>エントリの前倒し</b> — ENTRY圏のテーマが安くなった → 次のリバランスを待たず買い<br>';
    h+='• <b>候補テーマの予約</b> — WATCH圏で深い押し目 → 回復すればENTRY圏入りを監視';
    h+='</div>';
    h+='<div style="padding:6px 8px;background:rgba(255,23,68,0.04);border-radius:4px;border-left:3px solid #ff1744;margin-bottom:6px">';
    h+='<b style="color:#ff1744">❌ 使わない場面</b><br>';
    h+='• EXIT圏（rank &gt; 35）のテーマ → トレンド崩壊の可能性大<br>';
    h+='• 回復率 &lt; 60% → コイン投げ以下の確率<br>';
    h+='• サンプル &lt; 20件 → 統計的に無意味';
    h+='</div>';

    h+='<div style="font-weight:700;margin-bottom:4px;color:#0052cc">■ カードの読み方</div>';
    h+='<div style="padding:6px 8px;background:rgba(0,0,0,0.02);border-radius:4px">';
    h+='<b>テーマ名</b> — 押し目が検出されたテーマ<br>';
    h+='<b style="color:#ff1744">-XX.X%</b> — ピークからの下落幅（深いほど赤）<br>';
    h+='<b>閾値</b> — dip_bandの下限<br>';
    h+='<b>回復率</b> — 過去同パターンで反発した割合（<span style="color:#00c853">60%以上=緑</span> / <span style="color:#ff1744">60%未満=赤</span>）<br>';
    h+='<b>検知日</b> — いつ押し目が発生したか';
    h+='</div>';

    h+='</div></div>';

    h+='<div class="section-label">押し目検知（'+alerts.length+'テーマ）</div>';
    if(alerts.length===0){h+='<div style="padding:20px;color:var(--text-sub)">現在押し目シグナルなし</div>';}
    alerts.forEach((a,idx)=>{
      const wrCls=a.win_rate>=60?'high':'low';
      h+='<div style="margin:4px 10px;border-radius:6px;border:1px solid rgba(0,0,0,0.06);overflow:hidden">';
      h+='<div class="dip-card" style="cursor:pointer" onclick="toggleDipStocks(\'dipStocks'+idx+'\','+idx+')">';
      h+='<div><div class="dip-name">'+esc(a.theme)+' <span style="font-size:9px;color:var(--text-sub)">▶</span></div>';
      h+='<div class="dip-meta">閾値: '+a.threshold+'% / 検知: '+a.detected+'</div></div>';
      h+='<div style="text-align:right"><div class="dip-val">'+a.dip+'%</div>';
      h+='<span class="dip-wr '+wrCls+'">回復率 '+a.win_rate+'%</span></div>';
      h+='</div>';
      h+='<div id="dipStocks'+idx+'" style="display:none;padding:0 10px 10px"></div>';
      h+='</div>';
    });
    document.getElementById('dipMain').innerHTML=h;
  }).catch(()=>{document.getElementById('dipMain').innerHTML='<p style="padding:20px;color:var(--text-sub)">データ読込中...</p>';});
}
function toggleDipStocks(elId, alertIdx){
  const el=document.getElementById(elId);
  if(!el)return;
  if(el.style.display==='block'){el.style.display='none';return;}
  el.style.display='block';
  if(el.innerHTML){return;}
  // Find theme data
  const alerts=window._dipAlerts||[];
  const a=alerts[alertIdx];
  if(!a){el.innerHTML='<div style="font-size:9px;color:var(--text-sub)">データなし</div>';return;}
  const themeName=a.theme;
  const themes=window._allThemes||[];
  const th=themes.find(t=>t.name===themeName||t.slug===themeName);
  if(!th||!th.tickerPerformances){el.innerHTML='<div style="font-size:9px;color:var(--text-sub)">銘柄データなし</div>';return;}
  const tp=th.tickerPerformances;
  const tickers=Object.keys(tp);
  // Sort by 1M return (descending)
  const sorted=tickers.map(tk=>{const p=tp[tk];return{tk,r1m:p['1ヶ月']||0,r3m:p['3ヶ月']||0,r6m:p['半年']||0,r1y:p['1年']||0};}).sort((a,b)=>b.r1m-a.r1m);
  const f=v=>{if(v==null)return'—';const pct=(v*100).toFixed(1);return(v>=0?'+':'')+pct+'%';};
  const c=v=>v>=0?'color:#00c853':'color:#ff1744';
  let t='<table style="width:100%;font-size:9px;border-collapse:collapse">';
  t+='<tr style="border-bottom:1px solid rgba(0,0,0,0.1)"><th style="text-align:left;padding:3px 4px;font-weight:600;color:var(--text-sub)">銘柄</th><th style="text-align:right;padding:3px 4px;font-weight:600;color:var(--text-sub)">1M</th><th style="text-align:right;padding:3px 4px;font-weight:600;color:var(--text-sub)">3M</th><th style="text-align:right;padding:3px 4px;font-weight:600;color:var(--text-sub)">6M</th><th style="text-align:right;padding:3px 4px;font-weight:600;color:var(--text-sub)">1Y</th></tr>';
  sorted.forEach(s=>{
    t+='<tr style="border-bottom:1px solid rgba(0,0,0,0.04)">';
    t+='<td style="padding:3px 4px;font-weight:700">'+s.tk+'</td>';
    t+='<td style="padding:3px 4px;text-align:right;font-weight:600;'+c(s.r1m)+'">'+f(s.r1m)+'</td>';
    t+='<td style="padding:3px 4px;text-align:right;'+c(s.r3m)+'">'+f(s.r3m)+'</td>';
    t+='<td style="padding:3px 4px;text-align:right;'+c(s.r6m)+'">'+f(s.r6m)+'</td>';
    t+='<td style="padding:3px 4px;text-align:right;'+c(s.r1y)+'">'+f(s.r1y)+'</td>';
    t+='</tr>';
  });
  t+='</table>';
  t+='<div style="font-size:8px;color:var(--text-sub);margin-top:4px">'+tickers.length+'銘柄 | 1Mリターン順</div>';
  el.innerHTML=t;
}

</script>
<script>
(async()=>{try{const r=await fetch('/api/theme_ranking.json?t='+Date.now());const d=await r.json();
const el=document.getElementById('headerMeta');if(el&&d.last_update){
el.innerHTML=(el.innerHTML||'')+
'<div class="last-updated">データ更新: '+d.last_update+'</div>';}
}catch(e){}})();
</script>
