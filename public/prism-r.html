<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PRISM-R | 米国株テーマトラッカー</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#ffffff">
  <link rel="stylesheet" href="/styles.css?v=20">
<style>
:root{--text-main:#1a1a2e;--text-sub:#6b7280;--bg:#fff;--card-bg:#f8f9fb;--green:#00c853;--red:#ff1744;--blue:#0052cc;--gold:#f59e0b;--purple:#7c3aed}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',-apple-system,sans-serif;background:var(--bg);color:var(--text-main);padding-bottom:80px}
@media(min-width:1024px){html{background:#eee}body{max-width:700px;margin:0 auto;background:var(--bg);min-height:100vh;box-shadow:0 0 40px rgba(0,0,0,0.06)}}
.prism-header{padding:16px 12px 8px;text-align:center}
.prism-title{font-size:18px;font-weight:900;letter-spacing:1px}
.prism-sub{font-size:10px;color:var(--text-sub);margin-top:2px}
.prism-badge{display:inline-block;font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;margin-top:4px}
.gate-card{margin:8px 12px;border-radius:8px;padding:14px;text-align:center}
.gate-card.shadow{background:rgba(124,58,237,0.06);border:2px solid var(--purple)}
.gate-state{font-size:20px;font-weight:900;letter-spacing:2px;color:var(--purple)}
.gate-detail{font-size:10px;color:var(--text-sub);margin-top:4px}
.gate-atk{font-size:12px;font-weight:700;margin-top:6px}
.health-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin:6px 12px}
.health-box{border-radius:4px;padding:5px;text-align:center;background:var(--card-bg);border:1px solid rgba(0,0,0,0.06)}
.health-label{font-size:8px;color:var(--text-sub);font-weight:600}
.health-val{font-size:12px;font-weight:700}
.section-title{font-size:12px;font-weight:700;margin:16px 12px 6px;color:var(--text-main)}
.signal-pair{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 12px}
@media(max-width:600px){.signal-pair{grid-template-columns:1fr;gap:6px}}
.signal-card{border-radius:6px;padding:10px;min-height:60px}
.signal-card.a4{background:rgba(0,0,0,0.02);border:1px solid rgba(0,0,0,0.1)}
.signal-card.a5{background:rgba(124,58,237,0.04);border:1px solid rgba(124,58,237,0.25)}
.signal-card-title{font-size:11px;font-weight:700;margin-bottom:6px}
.signal-card.a4 .signal-card-title{color:var(--text-main)}
.signal-card.a5 .signal-card-title{color:var(--purple)}
.ss{background:#fff;border-radius:4px;padding:8px;margin:4px 0;border:1px solid rgba(0,0,0,0.05)}
.ss-top{display:flex;align-items:center;justify-content:space-between;gap:4px}
.ss-ticker{font-size:15px;font-weight:800}.ss-price{font-size:14px;font-weight:700}
.ss-company{font-size:10px;color:var(--text-sub);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ss-badges{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
.ss-badge{font-size:8px;padding:1px 4px;border-radius:2px;white-space:nowrap}
.ss-badge.ex{background:rgba(0,0,0,0.04);color:var(--text-sub)}
.ss-badge.sec{background:rgba(0,82,204,0.08);color:var(--blue)}
.ss-rets{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin-top:5px}
.ss-ret{text-align:center;font-size:9px;background:rgba(0,0,0,0.02);border-radius:2px;padding:2px 0}
.ss-ret-label{color:var(--text-sub)}.ss-ret-val{font-weight:600;font-size:10px}
.ss-ret-val.pos{color:var(--green)}.ss-ret-val.neg{color:var(--red)}
.theme-pick{margin:4px 12px;padding:8px;border-radius:4px;background:var(--card-bg);border:1px solid rgba(0,0,0,0.06);cursor:pointer}
.theme-pick.same{border-left:3px solid var(--green)}.theme-pick.diff{border-left:3px solid var(--purple)}
.theme-pick-top{display:flex;justify-content:space-between;align-items:center}
.theme-pick-name{font-size:12px;font-weight:700}.theme-pick-meta{font-size:9px;color:var(--text-sub)}
.theme-pick-badge{font-size:8px;padding:1px 5px;border-radius:2px}
.tpb-same{background:rgba(0,200,83,0.1);color:var(--green)}.tpb-diff{background:rgba(124,58,237,0.1);color:var(--purple)}
.theme-pick-body{display:none;margin-top:8px}.theme-pick.open .theme-pick-body{display:block}
.bm-card{margin:8px 12px;border-radius:8px;padding:12px;background:var(--card-bg);border:1px solid rgba(0,0,0,0.06)}
.bm-title{font-size:11px;font-weight:700;color:var(--blue);margin-bottom:8px}
.bm-table{width:100%;font-size:10px;border-collapse:collapse}
.bm-table th{text-align:left;padding:3px 4px;color:var(--text-sub);font-weight:600;border-bottom:1px solid rgba(0,0,0,0.1)}
.bm-table td{padding:3px 4px;border-bottom:1px solid rgba(0,0,0,0.04)}
.bm-table .best{color:var(--green);font-weight:700}.bm-table .worst{color:var(--red);font-weight:700}
.logic-card{margin:4px 12px;border-radius:6px;border:1px solid rgba(0,0,0,0.06);overflow:hidden}
.logic-card-header{padding:10px 12px;font-size:11px;font-weight:700;cursor:pointer;background:var(--card-bg);display:flex;justify-content:space-between;align-items:center}
.logic-card-body{display:none;padding:10px 12px;font-size:10px;line-height:1.7}
.logic-card.open .logic-card-body{display:block}.logic-card.open .lc-icon{transform:rotate(90deg)}
.lc-icon{font-size:9px;transition:transform 0.2s}
.logic-rule{margin:4px 0;padding:4px 8px;background:rgba(0,0,0,0.02);border-radius:3px;font-size:10px}
.ledger-card{margin:8px 12px;border-radius:8px;padding:12px;background:var(--card-bg);border:1px solid rgba(0,0,0,0.06)}
.ledger-title{font-size:11px;font-weight:700;margin-bottom:8px}
.prog-bar-wrap{background:rgba(0,0,0,0.04);border-radius:4px;height:10px;overflow:hidden;margin:6px 0}
.prog-bar-fill{height:100%;border-radius:4px;background:var(--purple);transition:width 0.5s}
.prog-steps{display:flex;justify-content:space-between;font-size:8px;color:var(--text-sub);font-weight:600;margin-top:2px}
.gate-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin:4px 12px}
@media(max-width:400px){.gate-grid{grid-template-columns:1fr}}
.gate-item{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border-radius:4px;font-size:9px;background:var(--card-bg);border:1px solid rgba(0,0,0,0.06)}
.gate-item .g-label{color:var(--text-sub);font-weight:600}.gate-item .g-icon{font-size:11px}
.prod-meta{font-size:9px;color:var(--text-sub);margin-top:6px}
.all-stocks{width:100%;font-size:9px;border-collapse:collapse;margin-top:4px}
.all-stocks th{text-align:left;padding:3px;font-weight:600;color:var(--text-sub);border-bottom:1px solid rgba(0,0,0,0.1)}
.all-stocks th:not(:first-child){text-align:right}
.all-stocks td{padding:3px;border-bottom:1px solid rgba(0,0,0,0.03)}
.all-stocks td:not(:first-child){text-align:right;font-family:monospace}
.all-stocks tr.pick-a5{background:rgba(124,58,237,0.06)}.all-stocks tr.pick-a4{background:rgba(0,0,0,0.03)}
</style>
</head>
<body>
<div class="prism-header">
  <div class="prism-title">PRISM-<span style="color:var(--purple)">R</span></div>
  <div class="prism-sub">Residual Alpha Shadow Book</div>
  <div id="prismDate" class="prism-badge" style="background:rgba(124,58,237,0.08);color:var(--purple)">Loading...</div>
  <div id="headerMeta"></div>
</div>
<div id="prismMain"><div style="padding:40px;text-align:center;color:var(--text-sub)">読み込み中...</div></div>

<script>
const fmt=v=>{if(v===null||v===undefined)return'—';const n=Number(v);return isNaN(n)?'—':(n>=0?'+':'')+((n*100).toFixed(1))+'%'};
const fmtN=(v,d=3)=>v!=null?v.toFixed(d):'—';
const _v='?v='+Date.now();
Promise.all([
  fetch('/api/prism-r/shadow_comparison.json'+_v).then(r=>r.json()),
  fetch('/api/prism-r/meta.json'+_v).then(r=>r.json())
]).then(([comp,meta])=>{
  document.getElementById('prismDate').textContent='Snapshot: '+comp.snapshot_date;
  let h='';
  // 1. Shadow Status Card
  h+=`<div class="gate-card shadow"><div class="gate-state">PRISM-R: ${meta.status||'SHADOW'}</div>`;
  h+=`<div class="gate-detail">α63×shrink(r²) | 20営業日リバランス | sector_cap=3</div>`;
  h+=`<div class="gate-atk">観測モード — A4 live維持</div></div>`;
  // 2. PIT Warning
  h+=`<div style="margin:6px 12px;padding:6px 10px;border-radius:4px;font-size:9px;background:rgba(245,158,11,0.08);color:#b45309;border:1px solid rgba(245,158,11,0.2)">⚠ 研究用: テーマ構成のPIT問題あり。絶対CAGRは採用根拠にしない。相対差分のみ有効。</div>`;
  // 3. Summary Grid
  const s=comp.summary;
  h+=`<div class="health-grid">`;
  h+=`<div class="health-box"><div class="health-label">テーマ</div><div class="health-val">${s.themes_selected}</div></div>`;
  h+=`<div class="health-box"><div class="health-label">A5銘柄</div><div class="health-val">${s.a5_names}</div></div>`;
  h+=`<div class="health-box"><div class="health-label">差分銘柄</div><div class="health-val" style="color:var(--purple)">${s.diff_names}</div></div>`;
  h+=`<div class="health-box"><div class="health-label">重複率</div><div class="health-val">${Math.round(s.overlap_pct*100)}%</div></div></div>`;
  // 4. Promotion Progress
  const fwd=meta.forward_rebalances||0,tgt=meta.target_rebalances||18,pct=Math.min(100,Math.round(fwd/tgt*100));
  h+=`<div class="section-title">🎯 昇格進捗</div>`;
  h+=`<div class="ledger-card"><div class="ledger-title">Forward PIT-safe 観測: ${fwd} / ${tgt} リバランス</div>`;
  h+=`<div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${pct}%"></div></div>`;
  h+=`<div class="prog-steps"><span>0</span><span>12 pilot</span><span>18 review</span><span>24 strong</span></div>`;
  h+=`<div class="prod-meta" style="margin-top:6px">次回: ${meta.next_rebalance_est||'—'}</div></div>`;
  // 5. Backtest Reference
  const b=meta.backtest_5yr||{};
  h+=`<div class="section-title">📊 5年拡張バックテスト（参考値）</div>`;
  h+=`<div class="bm-card"><div class="bm-title">73リバランス / 2020-01 ~ 2026-04 / Norgate Platinum</div>`;
  h+=`<table class="bm-table"><tr><th>指標</th><th>A4 (raw 1M)</th><th>A5-R (α×shrink)</th><th>差分</th></tr>`;
  h+=`<tr><td>Sharpe</td><td>${b.a4_sharpe||'—'}</td><td class="best">${b.a5_sharpe||'—'}</td><td>+${b.sharpe_diff||'—'}</td></tr>`;
  h+=`<tr><td>MaxDD</td><td>${b.a4_maxdd||'—'}</td><td class="worst">${b.a5_maxdd||'—'}</td><td>-2.3pt</td></tr>`;
  h+=`<tr><td>月次diff</td><td colspan="2" style="text-align:center">${b.monthly_diff||'—'}/月</td><td>勝率 ${b.monthly_win_rate||'—'}</td></tr>`;
  h+=`<tr><td>Sign test</td><td colspan="2" style="text-align:center">p=${b.sign_test_p||'—'}</td><td class="worst">有意でない</td></tr>`;
  h+=`<tr><td>Tech比率</td><td colspan="2" style="text-align:center">${b.tech_share_net||'—'}</td><td class="worst">純超過収益の76%</td></tr></table>`;
  h+=`<div class="prod-meta" style="margin-top:6px">⚠ PIT汚染含む研究値。production判断はforward PIT-safeのみ。</div></div>`;
  // 6. Shadow Comparison
  h+=`<div class="section-title">🔀 Shadow比較 — ${comp.snapshot_date}</div>`;
  comp.comparisons.forEach(c=>{
    const cls=c.same?'same':'diff';
    const a4s=c.stocks.find(x=>x.ticker===c.a4_pick)||{};
    const a5s=c.stocks.find(x=>x.ticker===c.a5_pick)||{};
    h+=`<div class="theme-pick ${cls}" onclick="this.classList.toggle('open')">`;
    h+=`<div class="theme-pick-top"><div><span class="theme-pick-name">${c.theme_name}</span> <span class="theme-pick-badge ${c.same?'tpb-same':'tpb-diff'}">${c.same?'一致':'差分'}</span></div>`;
    h+=`<span style="font-size:9px;color:var(--text-sub);font-weight:600">#${c.rank} | ${c.n_members}銘柄</span></div>`;
    h+=`<div class="theme-pick-meta">mom63=${fmt(c.mom63)} | decel=${fmtN(c.decel,4)} | score=${fmtN(c.theme_score)} | ${c.sector}</div>`;
    h+=`<div class="theme-pick-body"><div class="signal-pair">`;
    h+=renderStock(a4s,'a4','A4: raw 1M');
    h+=renderStock(a5s,'a5','A5-R: α×shrink');
    h+=`</div>`;
    if(c.stocks.length>0){const sorted=[...c.stocks].sort((a,b)=>(b.score_a5||0)-(a.score_a5||0));
    h+=`<table class="all-stocks"><tr><th>Ticker</th><th>1M</th><th>α63</th><th>R²</th><th>Score</th></tr>`;
    sorted.forEach(x=>{const isA5=x.ticker===c.a5_pick,isA4=x.ticker===c.a4_pick;
    const cls=isA5?'pick-a5':isA4?'pick-a4':'';const mark=isA5?' ◆R':isA4?' ◇A4':'';
    h+=`<tr class="${cls}"><td style="font-weight:${(isA4||isA5)?700:400}">${x.ticker}${mark}</td>`;
    h+=`<td style="color:${(x.raw_1m||0)>=0?'var(--green)':'var(--red)'}">${fmt(x.raw_1m)}</td>`;
    h+=`<td style="color:${(x.alpha63||0)>=0?'var(--green)':'var(--red)'}">${fmtN(x.alpha63)}</td>`;
    h+=`<td>${fmtN(x.r2_63)}</td><td style="font-weight:600">${fmtN(x.score_a5)}</td></tr>`;});
    h+=`</table>`;}
    h+=`</div></div>`;
  });
  // 7. Frozen Parameters
  const p=comp.frozen_params;
  h+=`<div class="section-title">🔒 凍結パラメータ</div>`;
  h+=`<div class="logic-card open"><div class="logic-card-header" onclick="this.parentElement.classList.toggle('open')">A5-lite v1 — 全パラメータ凍結中<span class="lc-icon">▶</span></div>`;
  h+=`<div class="logic-card-body">`;
  h+=`<div class="logic-rule"><b>Stock Score:</b> <code>${p.stock_score}</code></div>`;
  h+=`<div class="logic-rule"><b>Theme Score:</b> <code>${p.theme_score}</code></div>`;
  h+=`<div class="logic-rule">α窓=${p.alpha_window}日 | テーマ数=${p.top_themes} | 銘柄/テーマ=${p.picks_per_theme} | 最小構成=${p.min_members} | sector_cap=${p.sector_cap} | リバランス=${p.rebalance_days}営業日</div>`;
  h+=`</div></div>`;
  // 8. Production Gates
  h+=`<div class="section-title">🚦 昇格ゲート</div><div class="gate-grid">`;
  ['G1: median diff > +0.5%','G2: cumulative > +8%','G3: MaxDD ≤ 5pt悪化','G4: 単月 < 35%寄与',
   'G5: 前後半とも正','G6: PIT-safe only','G7: 25bps net > 0','G8: Tech share < 60%',
   'G9: Non-Tech diff ≥ 0','G10: Top5 share < 50%'].forEach(g=>{
    h+=`<div class="gate-item"><span class="g-label">${g}</span><span class="g-icon">⏳</span></div>`;});
  h+=`</div><div class="prod-meta" style="margin:2px 12px">全ゲートはforward PIT-safeデータで評価。バックテスト値は参考のみ。</div>`;
  document.getElementById('prismMain').innerHTML=h;
}).catch(err=>{document.getElementById('prismMain').innerHTML=`<p style="color:red;padding:20px">Error: ${err.message}</p>`;});
function renderStock(s,cls,label){
  if(!s||!s.ticker)return`<div class="signal-card ${cls}"><div class="signal-card-title">${label}</div><div style="color:var(--text-sub);font-size:9px">候補なし</div></div>`;
  let h=`<div class="signal-card ${cls}"><div class="signal-card-title">${label}</div>`;
  h+=`<div class="ss"><div class="ss-top"><span class="ss-ticker">${s.ticker}</span><span class="ss-price">$${s.price||'—'}</span></div>`;
  h+=`<div class="ss-company">${s.name_ja||s.name||''}</div>`;
  h+=`<div class="ss-badges"><span class="ss-badge ex">${s.mc}</span><span class="ss-badge sec">${s.sector}</span></div>`;
  h+=`<div class="ss-rets">`;
  [{l:'α63',v:s.alpha63,f:fmtN},{l:'R²',v:s.r2_63,f:fmtN},{l:'Shrink',v:s.shrink,f:fmtN},{l:'1M',v:s.raw_1m,f:fmt}].forEach(r=>{
    const val=r.f(r.v);const nv=Number(r.v)||0;const c=r.l==='R²'||r.l==='Shrink'?'':nv>=0?'pos':'neg';
    h+=`<div class="ss-ret"><div class="ss-ret-label">${r.l}</div><div class="ss-ret-val ${c}">${val}</div></div>`;});
  h+=`</div></div></div>`;return h;}
</script>

<script>(async()=>{try{const r=await fetch('/api/theme_ranking.json');const d=await r.json();const el=document.getElementById('headerMeta');if(el&&d.last_update){el.innerHTML=(el.innerHTML||'')+'<div class="last-updated">データ更新: '+d.last_update+'</div>';}}catch(e){}})();</script>
</body>
</html>
