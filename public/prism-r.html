<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PRISM-R | PRISMATIC</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#ffffff">
  <link rel="stylesheet" href="/styles.css?v=21">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root{--text-main:#1a1a2e;--text-sub:#6b7280;--bg:#fff;--card-bg:#f8f9fb;--green:#00c853;--red:#ff1744;--blue:#0052cc;--gold:#f59e0b;--purple:#7c3aed}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',-apple-system,sans-serif;background:var(--bg);color:var(--text-main);padding-bottom:80px}
@media(min-width:1024px){html{background:#eee}body{max-width:700px;margin:0 auto;background:var(--bg);min-height:100vh;box-shadow:0 0 40px rgba(0,0,0,0.06)}}
.prism-header{padding:16px 12px 8px;text-align:center}
.prism-title{font-size:18px;font-weight:900;letter-spacing:1px}
.prism-sub{font-size:10px;color:var(--text-sub);margin-top:2px}
.prism-badge{display:inline-block;font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;margin-top:4px}
.gate-card{margin:8px 12px;border-radius:8px;padding:14px;text-align:center}
.gate-card.shadow{background:rgba(124,58,237,0.06);border:2px solid var(--purple)}
.gate-state{font-size:20px;font-weight:900;letter-spacing:2px;color:var(--purple)}
.gate-detail{font-size:10px;color:var(--text-sub);margin-top:4px}
.gate-atk{font-size:12px;font-weight:700;margin-top:6px}
.health-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin:6px 12px}
.health-box{border-radius:4px;padding:5px;text-align:center;background:var(--card-bg);border:1px solid rgba(0,0,0,0.06)}
.health-label{font-size:8px;color:var(--text-sub);font-weight:600}
.health-val{font-size:12px;font-weight:700}
.section-title{font-size:12px;font-weight:700;margin:16px 12px 6px;color:var(--text-main)}
.signal-pair{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 12px}
@media(max-width:600px){.signal-pair{grid-template-columns:1fr;gap:6px}}
.signal-card{border-radius:6px;padding:10px;min-height:60px}
.signal-card.a4{background:rgba(0,0,0,0.02);border:1px solid rgba(0,0,0,0.1)}
.signal-card.a5{background:rgba(124,58,237,0.04);border:1px solid rgba(124,58,237,0.25)}
.signal-card-title{font-size:11px;font-weight:700;margin-bottom:6px}
.signal-card.a4 .signal-card-title{color:var(--text-main)}
.signal-card.a5 .signal-card-title{color:var(--purple)}
.ss{background:#fff;border-radius:4px;padding:8px;margin:4px 0;border:1px solid rgba(0,0,0,0.05)}
.ss-top{display:flex;align-items:center;justify-content:space-between;gap:4px}
.ss-ticker{font-size:15px;font-weight:800}.ss-price{font-size:14px;font-weight:700}
.ss-company{font-size:10px;color:var(--text-sub);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ss-badges{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
.ss-badge{font-size:8px;padding:1px 4px;border-radius:2px;white-space:nowrap}
.ss-badge.ex{background:rgba(0,0,0,0.04);color:var(--text-sub)}
.ss-badge.sec{background:rgba(0,82,204,0.08);color:var(--blue)}
.ss-rets{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin-top:5px}
.ss-ret{text-align:center;font-size:9px;background:rgba(0,0,0,0.02);border-radius:2px;padding:2px 0}
.ss-ret-label{color:var(--text-sub)}.ss-ret-val{font-weight:600;font-size:10px}
.ss-ret-val.pos{color:var(--green)}.ss-ret-val.neg{color:var(--red)}
.theme-pick{margin:4px 12px;padding:8px;border-radius:4px;background:var(--card-bg);border:1px solid rgba(0,0,0,0.06);cursor:pointer}
.theme-pick.same{border-left:3px solid var(--green)}.theme-pick.diff{border-left:3px solid var(--purple)}
.theme-pick-top{display:flex;justify-content:space-between;align-items:center}
.theme-pick-name{font-size:12px;font-weight:700}.theme-pick-meta{font-size:9px;color:var(--text-sub)}
.theme-pick-badge{font-size:8px;padding:1px 5px;border-radius:2px}
.tpb-same{background:rgba(0,200,83,0.1);color:var(--green)}.tpb-diff{background:rgba(124,58,237,0.1);color:var(--purple)}
.theme-pick-body{display:none;margin-top:8px;overflow-x:auto;-webkit-overflow-scrolling:touch}.theme-pick.open .theme-pick-body{display:block}
.bm-card{margin:8px 12px;border-radius:8px;padding:12px;background:var(--card-bg);border:1px solid rgba(0,0,0,0.06);overflow-x:auto;-webkit-overflow-scrolling:touch}
.bm-title{font-size:11px;font-weight:700;color:var(--blue);margin-bottom:8px}
.bm-table{width:100%;font-size:10px;border-collapse:collapse}
.bm-table th{text-align:left;padding:3px 4px;color:var(--text-sub);font-weight:600;border-bottom:1px solid rgba(0,0,0,0.1)}
.bm-table td{padding:3px 4px;border-bottom:1px solid rgba(0,0,0,0.04)}
.bm-table .best{color:var(--green);font-weight:700}.bm-table .worst{color:var(--red);font-weight:700}
.logic-card{margin:4px 12px;border-radius:6px;border:1px solid rgba(0,0,0,0.06);overflow:hidden}
.logic-card-header{padding:10px 12px;font-size:11px;font-weight:700;cursor:pointer;background:var(--card-bg);display:flex;justify-content:space-between;align-items:center}
.logic-card-body{display:none;padding:10px 12px;font-size:10px;line-height:1.7}
.logic-card.open .logic-card-body{display:block}.logic-card.open .lc-icon{transform:rotate(90deg)}
.lc-icon{font-size:9px;transition:transform 0.2s}
.logic-rule{margin:4px 0;padding:4px 8px;background:rgba(0,0,0,0.02);border-radius:3px;font-size:10px}
.ledger-card{margin:8px 12px;border-radius:8px;padding:12px;background:var(--card-bg);border:1px solid rgba(0,0,0,0.06)}
.ledger-title{font-size:11px;font-weight:700;margin-bottom:8px}
.prog-bar-wrap{background:rgba(0,0,0,0.04);border-radius:4px;height:10px;overflow:hidden;margin:6px 0}
.prog-bar-fill{height:100%;border-radius:4px;background:var(--purple);transition:width 0.5s}
.prog-steps{display:flex;justify-content:space-between;font-size:8px;color:var(--text-sub);font-weight:600;margin-top:2px}
.gate-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin:4px 12px}
@media(max-width:400px){.gate-grid{grid-template-columns:1fr}}
.gate-item{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border-radius:4px;font-size:9px;background:var(--card-bg);border:1px solid rgba(0,0,0,0.06)}
.gate-item .g-label{color:var(--text-sub);font-weight:600}.gate-item .g-icon{font-size:11px}
.prod-meta{font-size:9px;color:var(--text-sub);margin-top:6px}
.signal-card.sell-r{background:rgba(255,23,68,0.04);border:1.5px solid rgba(255,23,68,0.25)}
.signal-card.sell-r .signal-card-title{color:var(--red)}
.signal-card.blocked-r{background:rgba(245,158,11,0.04);border:1.5px solid rgba(245,158,11,0.25)}
.signal-card.blocked-r .signal-card-title{color:#b45309}
.signal-card.hold-r{background:rgba(0,200,83,0.04);border:1.5px solid rgba(0,200,83,0.25)}
.signal-card.hold-r .signal-card-title{color:var(--green)}
.logic-table{width:100%;font-size:9px;border-collapse:collapse;margin:4px 0}
.logic-table th,.logic-table td{padding:3px 6px;border-bottom:1px solid rgba(0,0,0,0.06);text-align:left}
.logic-table th{color:var(--text-sub);font-weight:600}
.all-stocks{width:100%;font-size:9px;border-collapse:collapse;margin-top:4px}
.all-stocks th{text-align:left;padding:3px;font-weight:600;color:var(--text-sub);border-bottom:1px solid rgba(0,0,0,0.1)}
.all-stocks th:not(:first-child){text-align:right}
.all-stocks td{padding:3px;border-bottom:1px solid rgba(0,0,0,0.03)}
.all-stocks td:not(:first-child){text-align:right;font-family:monospace}
.all-stocks tr.pick-a5{background:rgba(124,58,237,0.06)}.all-stocks tr.pick-a4{background:rgba(0,0,0,0.03)}
.prod-card{margin:8px 12px;border-radius:8px;padding:12px;background:rgba(124,58,237,0.03);border:1.5px solid rgba(124,58,237,0.15);overflow-x:auto;-webkit-overflow-scrolling:touch}
.prod-title{font-size:11px;font-weight:700;color:var(--purple);margin-bottom:8px}
.prod-input-row{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid rgba(0,0,0,0.06)}
.prod-input-top{display:flex;align-items:center;justify-content:space-between}
.prod-seg{display:flex;border:0.5px solid rgba(0,0,0,0.15);border-radius:20px;overflow:hidden;background:rgba(0,0,0,0.03)}
.prod-seg-btn{padding:7px 20px;font-size:12px;font-weight:500;border:none;cursor:pointer;background:none;color:var(--text-sub);border-radius:20px;transition:all 0.15s}
.prod-seg-btn.active{background:var(--text-main);color:#fff}
.prod-fx-area{display:flex;align-items:center;gap:6px;cursor:pointer;padding:4px 10px;border-radius:16px;transition:background 0.15s}
.prod-fx-area:hover{background:rgba(0,0,0,0.04)}
.prod-fx-rate{font-size:12px;font-weight:500;color:var(--text-main)}
.prod-fx-dot{width:5px;height:5px;border-radius:50%;background:#1D9E75;flex-shrink:0}
.prod-fx-time{font-size:10px;color:var(--text-sub)}
.prod-fx-icon{width:14px;height:14px;color:var(--text-sub);transition:transform 0.5s}
.prod-big-wrap{position:relative}
.prod-big-sign{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:20px;font-weight:500;color:var(--text-sub)}
.prod-big-input{width:100%;padding:14px 14px 14px 34px;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;font-size:22px;font-weight:500;font-family:monospace;text-align:left;box-sizing:border-box;background:none;color:var(--text-main);outline:none;transition:border-color 0.15s}
.prod-big-input:focus{border-color:var(--purple)}
.prod-conv-row{display:flex;align-items:center;justify-content:space-between;padding:2px 4px;font-size:13px;color:var(--text-sub)}
.prod-input-label{font-size:10px;font-weight:600;color:var(--text-sub)}
.prod-input{width:90px;padding:10px 8px;border:1px solid rgba(0,0,0,0.12);border-radius:4px;font-size:11px;text-align:right;font-family:monospace}
.prod-table{width:100%;font-size:10px;border-collapse:collapse}
.prod-table th{text-align:left;padding:6px 4px;font-size:9px;font-weight:600;color:var(--text-sub);border-bottom:1px solid rgba(0,0,0,0.1)}
.prod-table td{padding:5px 4px;border-bottom:1px solid rgba(0,0,0,0.04)}
.prod-table .num{text-align:right;font-family:monospace;font-weight:600}
.prod-table .shares{font-size:12px;font-weight:800;color:var(--purple)}
.prod-table .dev{font-size:9px}.prod-table .dev.neg{color:var(--red)}.prod-table .dev.pos{color:var(--green)}
.prod-summary{margin-top:8px;font-size:10px;display:flex;justify-content:space-between;padding:6px;background:rgba(0,0,0,0.02);border-radius:4px}
.strat-tabs{display:flex;gap:0;border-bottom:1.5px solid rgba(0,0,0,0.1);margin-bottom:10px}
.strat-tab{flex:1;padding:8px 0;font-size:11px;font-weight:600;border:none;background:none;cursor:pointer;color:var(--text-sub);border-bottom:2px solid transparent;transition:all 0.15s}
.strat-tab.active{color:var(--purple);border-bottom-color:var(--purple)}
.strat-tab:hover{color:var(--text-main)}
.strat-panel{display:none}.strat-panel.active{display:block}
</style>
</head>
<body>
<div class="prism-header">
  <div class="prism-title">PRISM-<span style="color:var(--purple)">R</span></div>
  <div class="prism-sub">DEF = Tier 1 主力候補 | A5 = Tier 2 研究枝</div>
  <div style="margin-top:4px;display:flex;gap:4px;justify-content:center;flex-wrap:wrap">
    <div class="prism-badge" style="background:rgba(0,200,83,0.08);color:#00a844">DEF Sharpe 1.03</div>
    <div class="prism-badge" style="background:rgba(124,58,237,0.08);color:var(--purple)">PIT Silver</div>
  </div>
  <div id="prismDate" class="prism-badge" style="background:rgba(124,58,237,0.08);color:var(--purple);margin-top:2px">Loading...</div>
  <div id="headerMeta"></div>
</div>
<div id="prismMain"><div style="padding:40px;text-align:center;color:var(--text-sub)">読み込み中...</div></div>

<script>
const fmt=v=>{if(v===null||v===undefined)return'—';const n=Number(v);return isNaN(n)?'—':(n>=0?'+':'')+((n*100).toFixed(1))+'%'};
const fmtN=(v,d=3)=>v!=null?v.toFixed(d):'—';
const _v='?v='+Date.now();
Promise.all([
  fetch('/api/prism-r/shadow_comparison.json'+_v).then(r=>r.json()),
  fetch('/api/prism-r/meta.json'+_v).then(r=>r.json())
]).then(([comp,meta])=>{
  document.getElementById('prismDate').textContent='Snapshot: '+comp.snapshot_date;
  let h='';
  // 1. Shadow Status Card
  h+=`<div class="gate-card shadow"><div class="gate-state">PRISM-R: ${meta.status||'SHADOW'}</div>`;
  h+=`<div class="gate-detail">split-window α(β126d/α63d) × shrink(r²) | W5b加重 | 20営業日リバランス</div>`;
  h+=`<div class="gate-atk">観測モード — A4 live維持</div></div>`;
  // 2. PIT Warning
  h+=`<div style="margin:6px 12px;padding:6px 10px;border-radius:4px;font-size:9px;background:rgba(245,158,11,0.08);color:#b45309;border:1px solid rgba(245,158,11,0.2)">⚠ 研究用: テーマ構成のPIT問題あり。絶対CAGRは採用根拠にしない。相対差分のみ有効。</div>`;
  // 3. Summary Grid
  const s=comp.summary;
  h+=`<div class="health-grid">`;
  h+=`<div class="health-box"><div class="health-label">テーマ</div><div class="health-val">${s.themes_selected}</div></div>`;
  h+=`<div class="health-box"><div class="health-label">A5銘柄</div><div class="health-val">${s.a5_names}</div></div>`;
  h+=`<div class="health-box"><div class="health-label">差分銘柄</div><div class="health-val" style="color:var(--purple)">${s.diff_names}</div></div>`;
  h+=`<div class="health-box"><div class="health-label">重複率</div><div class="health-val">${Math.round(s.overlap_pct*100)}%</div></div></div>`;
  // 3a. Virtual sell/hold signals (EXIT CONSTITUTION v2)
  const exitThemes=comp.comparisons.filter(c=>c.theme_state==='EXIT');
  const watchThemes=comp.comparisons.filter(c=>c.theme_state==='WATCH');
  const entryThemes=comp.comparisons.filter(c=>c.theme_state==='ENTRY');
  if(exitThemes.length>0){
    h+=`<div class="section-title" style="color:var(--red)">▼ 売却確定（仮想）</div>`;
    exitThemes.forEach(c=>{
      const s5=c.stocks.find(x=>x.ticker===c.a5_pick)||{};
      h+=`<div class="signal-card sell-r" style="margin:4px 12px"><div class="signal-card-title">🔴 ${c.a5_pick} ${c.theme_name} — rank${c.full_rank} EXIT</div>`;
      h+=`<div style="font-size:9px;color:var(--text-sub)">テーマrank>${35}でtarget除外。MinHold満了後に売却対象。</div></div>`;
    });
  }
  if(watchThemes.length>0){
    h+=`<div class="section-title" style="color:#b45309">⏳ WATCH ZONE（仮想）</div>`;
    watchThemes.forEach(c=>{
      h+=`<div class="signal-card blocked-r" style="margin:4px 12px"><div class="signal-card-title">🟡 ${c.a5_pick} ${c.theme_name} — rank${c.full_rank} WATCH</div>`;
      h+=`<div style="font-size:9px;color:var(--text-sub)">rank 21-35: 退出しないが監視強化。rank>35で売却候補に移行。</div></div>`;
    });
  }
  if(exitThemes.length===0&&watchThemes.length===0){
    h+=`<div class="signal-card hold-r" style="margin:8px 12px"><div class="signal-card-title">✅ 全${entryThemes.length}テーマ ENTRY（rank≤20）</div>`;
    h+=`<div style="font-size:9px;color:var(--text-sub)">EXIT CONSTITUTION v2: 売却候補なし。全テーマがENTRY zone内。</div></div>`;
  }
  // 3b. Virtual Portfolio — A4 vs A5-R side by side
  h+=`<div class="section-title">📋 バーチャルポートフォリオ</div>`;
  h+=`<div class="bm-card"><div class="bm-title">A4 (PRISM現行) vs A5-R (W5b Shadow)</div>`;
  h+=`<table class="bm-table"><tr><th>#</th><th>テーマ</th><th>状態</th><th>A4 pick</th><th>A5-R pick</th><th></th></tr>`;
  comp.comparisons.forEach((c,i)=>{
    const a4s=c.stocks.find(x=>x.ticker===c.a4_pick)||{};
    const a5s=c.stocks.find(x=>x.ticker===c.a5_pick)||{};
    const cls=c.same?'':'style="background:rgba(124,58,237,0.04)"';
    const tag=c.same?'<span style="color:var(--green);font-size:9px">一致</span>':'<span style="color:var(--purple);font-size:9px;font-weight:700">差分</span>';
    h+=`<tr ${cls}>`;
    h+=`<td style="font-size:9px;color:var(--text-sub)">${i+1}</td>`;
    h+=`<td style="font-size:9px">${c.theme_name}</td>`;
    const stColor=c.theme_state==='ENTRY'?'var(--green)':c.theme_state==='WATCH'?'#b45309':'var(--red)';
    h+=`<td style="font-size:8px;font-weight:700;color:${stColor}">${c.theme_state||'?'}</td>`;
    h+=`<td style="font-weight:700">${c.a4_pick} <span style="font-size:8px;color:${(a4s.raw_1m||0)>=0?'var(--green)':'var(--red)'}">${fmt(a4s.raw_1m)}</span></td>`;
    h+=`<td style="font-weight:700;color:var(--purple)">${c.a5_pick} <span style="font-size:8px;color:${(a5s.alpha63||0)>=0?'var(--green)':'var(--red)'}">α${fmtN(a5s.alpha63)}</span></td>`;
    h+=`<td>${tag}</td></tr>`;
  });
  h+=`</table></div>`;
  // 3b-2. Virtual Sell Confirmed card (EXIT CONSTITUTION v2)
  const vExits = comp.virtual_exits || [];
  const vEntries = comp.virtual_entries || [];
  if(vExits.length > 0) {
    h+=`<div class="signal-card sell-r" style="margin:8px 12px"><div class="signal-card-title">🔴 売却確定（仮想） — ${vExits.length}銘柄がtarget除外</div>`;
    vExits.forEach(e => {
      h+=`<div style="padding:4px 8px;margin:2px 0;background:rgba(255,23,68,0.04);border-radius:3px;font-size:10px">`;
      h+=`<b style="color:var(--red)">${e.ticker}</b> <span style="color:var(--text-sub)">${e.prev_theme}</span>`;
      h+=`<span style="float:right;font-size:9px;color:var(--text-sub)">前回#${e.prev_rank} → 除外</span></div>`;
    });
    h+=`<div style="font-size:9px;color:var(--text-sub);margin-top:4px">EXIT CONSTITUTION v2: target_weightsから除外された銘柄。shadowモードのため仮想表示。</div></div>`;
  }
  if(vEntries.length > 0) {
    h+=`<div class="signal-card hold-r" style="margin:8px 12px"><div class="signal-card-title">🟢 新規参入（仮想） — ${vEntries.length}銘柄</div>`;
    vEntries.forEach(e => {
      h+=`<div style="padding:4px 8px;margin:2px 0;background:rgba(0,200,83,0.04);border-radius:3px;font-size:10px">`;
      h+=`<b style="color:var(--green)">${e.ticker}</b> <span style="color:var(--text-sub)">${e.theme}</span></div>`;
    });
    h+=`</div>`;
  }
  if(vExits.length === 0 && vEntries.length === 0) {
    h+=`<div style="margin:6px 12px;padding:6px 10px;border-radius:4px;font-size:9px;background:rgba(0,200,83,0.06);color:var(--green);border:1px solid rgba(0,200,83,0.15)">✅ 前回から銘柄変更なし — 全ポジション継続</div>`;
  }
  // 3c. Rebalance Calculator
  window._prismR_picks = comp.comparisons.map(c => {
    const s = c.stocks.find(x=>x.ticker===c.a5_pick)||{};
    const sd = c.stocks.find(x=>x.ticker===c.def_pick)||{};
    return {ticker:c.a5_pick, def_ticker:c.def_pick||c.a5_pick, price:s.price, def_price:sd.price||s.price, sector:s.sector, theme:c.theme_name, alpha63:s.alpha63, w5b_weight:c.w5b_weight||0, beast_weight:c.beast_weight||0, def_weight:c.def_weight||0};
  });
  h+=`<div id="sellCardR"></div>`;

function renderStock(s,cls,label){
  if(!s||!s.ticker)return`<div class="signal-card ${cls}"><div class="signal-card-title">${label}</div><div style="color:var(--text-sub);font-size:9px">候補なし</div></div>`;
  let h=`<div class="signal-card ${cls}"><div class="signal-card-title">${label}</div>`;
  h+=`<div class="ss"><div class="ss-top"><span class="ss-ticker">${s.ticker}</span><span class="ss-price">$${s.price||'—'}</span></div>`;
  h+=`<div class="ss-company">${s.name_ja||s.name||''}</div>`;
  h+=`<div class="ss-badges"><span class="ss-badge ex">${s.mc}</span><span class="ss-badge sec">${s.sector}</span></div>`;
  h+=`<div class="ss-rets">`;
  [{l:'α63',v:s.alpha63,f:fmtN},{l:'R²',v:s.r2_63,f:fmtN},{l:'Shrink',v:s.shrink,f:fmtN},{l:'1M',v:s.raw_1m,f:fmt}].forEach(r=>{
    const val=r.f(r.v);const nv=Number(r.v)||0;const c=r.l==='R²'||r.l==='Shrink'?'':nv>=0?'pos':'neg';
    h+=`<div class="ss-ret"><div class="ss-ret-label">${r.l}</div><div class="ss-ret-val ${c}">${val}</div></div>`;});
  h+=`</div></div></div>`;return h;}

  else{cap.value=Math.round(parseFloat(cap.value.replace(/,/g,''))/window._rFx).toLocaleString();}

}
function fetchRFx(){
  const dot=document.getElementById('rFxDot');const time=document.getElementById('rFxTime');
  const icon=document.getElementById('rFxIcon');const rate=document.getElementById('rFxRate');
  dot.style.background='#BA7517';time.textContent='取得中...';icon.style.transform='rotate(360deg)';
  fetch('https://api.exchangerate-api.com/v4/latest/USD').then(r=>r.json()).then(d=>{
    window._rFx=d.rates?.JPY||150;rate.textContent='¥'+window._rFx.toFixed(2);
    dot.style.background='#1D9E75';const now=new Date();
    time.textContent=now.toLocaleTimeString('ja-JP',{timeZone:'Asia/Tokyo',hour:'2-digit',minute:'2-digit',hour12:false})+' JST取得';

function switchRTab(tab){
  document.querySelectorAll('#prismMain .strat-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('#prismMain .strat-panel').forEach(p=>p.classList.remove('active'));
  document.querySelector(`[onclick="switchRTab('${tab}')"]`).classList.add('active');
  document.getElementById('rTab'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
}
function calcR(){
  const picks=window._prismR_picks;if(!picks)return;
  const rawCap=parseFloat(document.getElementById('rCapital').value.replace(/,/g,''))||0;
  const fx=window._rFx||150;
  const capUSD=window._rCcy==='JPY'?rawCap/fx:rawCap;
  const fmtD=v=>'$'+v.toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0});
  const fmtY=v=>'¥'+Math.round(v*fx).toLocaleString();
  function buildTab(prefix,sumPrefix,suffix,picks,weightKey,priceKey,tickerKey,color){
    let html='';let totalInv=0;
    picks.forEach(p=>{
      const pr=p[priceKey]||p.price;if(!pr)return;
      const w=p[weightKey]||0.10;
      const tk=p[tickerKey]||p.ticker;
      const amt=capUSD*w;const shares=Math.floor(amt/pr);const inv=shares*pr;
      const realPct=capUSD>0?(inv/capUSD)*100:0;totalInv+=inv;
      html+=`<tr><td><b style="color:${color}">${tk}</b></td>`;
      html+=`<td style="font-size:9px">${p.theme}</td>`;
      html+=`<td class="num" style="font-weight:700;color:${color}">${(w*100).toFixed(1)}%</td>`;
      html+=`<td class="num">$${pr.toLocaleString()}</td>`;
      html+=`<td class="num"><span class="shares">${shares}株</span> <span class="dev ${realPct-w*100>=0?'pos':'neg'}">実${realPct.toFixed(1)}%</span></td></tr>`;
    });
    document.getElementById(prefix+suffix).innerHTML=html;
    const res=capUSD-totalInv;const resPct=capUSD>0?(res/capUSD)*100:0;
    let sh=`<div class="prod-summary"><span style="color:${color}">投資額 <b>${fmtD(totalInv)}</b>`;
    if(window._rCcy==='JPY')sh+=` (${fmtY(totalInv)})`;
    sh+=`</span><span>余り <b style="color:${resPct>15?'var(--red)':'var(--text-main)'}"> ${fmtD(res)} (${resPct.toFixed(1)}%)</b></span></div>`;
    document.getElementById(sumPrefix+suffix).innerHTML=sh;
  }
  buildTab('rBody','rSum','W5b',picks,'w5b_weight','price','ticker','var(--purple)');
  buildTab('rBody','rSum','Beast',picks,'beast_weight','price','ticker','#D85A30');
  buildTab('rBody','rSum','Def',picks,'def_weight','def_price','def_ticker','#228B22');
  const convEl=document.getElementById('rConvDisplay');
  if(convEl){if(window._rCcy==='USD')convEl.textContent='≈ ¥'+Math.round(rawCap*fx).toLocaleString();else convEl.textContent='≈ $'+Math.round(rawCap/fx).toLocaleString();}
}
setTimeout(()=>{fetchRFx();if(window._prismR_picks)setTimeout(calcR,1500);},300);

  if (isLog) {
    chart.options.scales.y.ticks.callback = function(v) {
      if ([0.5,1,2,5,10,20,50,100,200,500].includes(v)) return v.toFixed(v<10?1:0)+'x';
      return null;
    };

  chart.update();
