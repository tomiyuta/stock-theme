<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PRISM-R | зұіеӣҪж ӘгғҶгғјгғһгғҲгғ©гғғгӮ«гғј</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#ffffff">
  <link rel="stylesheet" href="/styles.css?v=21">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root{--text-main:#1a1a2e;--text-sub:#6b7280;--bg:#fff;--card-bg:#f8f9fb;--green:#00c853;--red:#ff1744;--blue:#0052cc;--gold:#f59e0b;--purple:#7c3aed}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',-apple-system,sans-serif;background:var(--bg);color:var(--text-main);padding-bottom:80px}
@media(min-width:1024px){html{background:#eee}body{max-width:700px;margin:0 auto;background:var(--bg);min-height:100vh;box-shadow:0 0 40px rgba(0,0,0,0.06)}}
.prism-header{padding:16px 12px 8px;text-align:center}
.prism-title{font-size:18px;font-weight:900;letter-spacing:1px}
.prism-sub{font-size:10px;color:var(--text-sub);margin-top:2px}
.prism-badge{display:inline-block;font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;margin-top:4px}
.gate-card{margin:8px 12px;border-radius:8px;padding:14px;text-align:center}
.gate-card.shadow{background:rgba(124,58,237,0.06);border:2px solid var(--purple)}
.gate-state{font-size:20px;font-weight:900;letter-spacing:2px;color:var(--purple)}
.gate-detail{font-size:10px;color:var(--text-sub);margin-top:4px}
.gate-atk{font-size:12px;font-weight:700;margin-top:6px}
.health-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin:6px 12px}
.health-box{border-radius:4px;padding:5px;text-align:center;background:var(--card-bg);border:1px solid rgba(0,0,0,0.06)}
.health-label{font-size:8px;color:var(--text-sub);font-weight:600}
.health-val{font-size:12px;font-weight:700}
.section-title{font-size:12px;font-weight:700;margin:16px 12px 6px;color:var(--text-main)}
.signal-pair{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 12px}
@media(max-width:600px){.signal-pair{grid-template-columns:1fr;gap:6px}}
.signal-card{border-radius:6px;padding:10px;min-height:60px}
.signal-card.a4{background:rgba(0,0,0,0.02);border:1px solid rgba(0,0,0,0.1)}
.signal-card.a5{background:rgba(124,58,237,0.04);border:1px solid rgba(124,58,237,0.25)}
.signal-card-title{font-size:11px;font-weight:700;margin-bottom:6px}
.signal-card.a4 .signal-card-title{color:var(--text-main)}
.signal-card.a5 .signal-card-title{color:var(--purple)}
.ss{background:#fff;border-radius:4px;padding:8px;margin:4px 0;border:1px solid rgba(0,0,0,0.05)}
.ss-top{display:flex;align-items:center;justify-content:space-between;gap:4px}
.ss-ticker{font-size:15px;font-weight:800}.ss-price{font-size:14px;font-weight:700}
.ss-company{font-size:10px;color:var(--text-sub);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ss-badges{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
.ss-badge{font-size:8px;padding:1px 4px;border-radius:2px;white-space:nowrap}
.ss-badge.ex{background:rgba(0,0,0,0.04);color:var(--text-sub)}
.ss-badge.sec{background:rgba(0,82,204,0.08);color:var(--blue)}
.ss-rets{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin-top:5px}
.ss-ret{text-align:center;font-size:9px;background:rgba(0,0,0,0.02);border-radius:2px;padding:2px 0}
.ss-ret-label{color:var(--text-sub)}.ss-ret-val{font-weight:600;font-size:10px}
.ss-ret-val.pos{color:var(--green)}.ss-ret-val.neg{color:var(--red)}
.theme-pick{margin:4px 12px;padding:8px;border-radius:4px;background:var(--card-bg);border:1px solid rgba(0,0,0,0.06);cursor:pointer}
.theme-pick.same{border-left:3px solid var(--green)}.theme-pick.diff{border-left:3px solid var(--purple)}
.theme-pick-top{display:flex;justify-content:space-between;align-items:center}
.theme-pick-name{font-size:12px;font-weight:700}.theme-pick-meta{font-size:9px;color:var(--text-sub)}
.theme-pick-badge{font-size:8px;padding:1px 5px;border-radius:2px}
.tpb-same{background:rgba(0,200,83,0.1);color:var(--green)}.tpb-diff{background:rgba(124,58,237,0.1);color:var(--purple)}
.theme-pick-body{display:none;margin-top:8px;overflow-x:auto;-webkit-overflow-scrolling:touch}.theme-pick.open .theme-pick-body{display:block}
.bm-card{margin:8px 12px;border-radius:8px;padding:12px;background:var(--card-bg);border:1px solid rgba(0,0,0,0.06);overflow-x:auto;-webkit-overflow-scrolling:touch}
.bm-title{font-size:11px;font-weight:700;color:var(--blue);margin-bottom:8px}
.bm-table{width:100%;font-size:10px;border-collapse:collapse}
.bm-table th{text-align:left;padding:3px 4px;color:var(--text-sub);font-weight:600;border-bottom:1px solid rgba(0,0,0,0.1)}
.bm-table td{padding:3px 4px;border-bottom:1px solid rgba(0,0,0,0.04)}
.bm-table .best{color:var(--green);font-weight:700}.bm-table .worst{color:var(--red);font-weight:700}
.logic-card{margin:4px 12px;border-radius:6px;border:1px solid rgba(0,0,0,0.06);overflow:hidden}
.logic-card-header{padding:10px 12px;font-size:11px;font-weight:700;cursor:pointer;background:var(--card-bg);display:flex;justify-content:space-between;align-items:center}
.logic-card-body{display:none;padding:10px 12px;font-size:10px;line-height:1.7}
.logic-card.open .logic-card-body{display:block}.logic-card.open .lc-icon{transform:rotate(90deg)}
.lc-icon{font-size:9px;transition:transform 0.2s}
.logic-rule{margin:4px 0;padding:4px 8px;background:rgba(0,0,0,0.02);border-radius:3px;font-size:10px}
.ledger-card{margin:8px 12px;border-radius:8px;padding:12px;background:var(--card-bg);border:1px solid rgba(0,0,0,0.06)}
.ledger-title{font-size:11px;font-weight:700;margin-bottom:8px}
.prog-bar-wrap{background:rgba(0,0,0,0.04);border-radius:4px;height:10px;overflow:hidden;margin:6px 0}
.prog-bar-fill{height:100%;border-radius:4px;background:var(--purple);transition:width 0.5s}
.prog-steps{display:flex;justify-content:space-between;font-size:8px;color:var(--text-sub);font-weight:600;margin-top:2px}
.gate-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin:4px 12px}
@media(max-width:400px){.gate-grid{grid-template-columns:1fr}}
.gate-item{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border-radius:4px;font-size:9px;background:var(--card-bg);border:1px solid rgba(0,0,0,0.06)}
.gate-item .g-label{color:var(--text-sub);font-weight:600}.gate-item .g-icon{font-size:11px}
.prod-meta{font-size:9px;color:var(--text-sub);margin-top:6px}
.signal-card.sell-r{background:rgba(255,23,68,0.04);border:1.5px solid rgba(255,23,68,0.25)}
.signal-card.sell-r .signal-card-title{color:var(--red)}
.signal-card.blocked-r{background:rgba(245,158,11,0.04);border:1.5px solid rgba(245,158,11,0.25)}
.signal-card.blocked-r .signal-card-title{color:#b45309}
.signal-card.hold-r{background:rgba(0,200,83,0.04);border:1.5px solid rgba(0,200,83,0.25)}
.signal-card.hold-r .signal-card-title{color:var(--green)}
.logic-table{width:100%;font-size:9px;border-collapse:collapse;margin:4px 0}
.logic-table th,.logic-table td{padding:3px 6px;border-bottom:1px solid rgba(0,0,0,0.06);text-align:left}
.logic-table th{color:var(--text-sub);font-weight:600}
.all-stocks{width:100%;font-size:9px;border-collapse:collapse;margin-top:4px}
.all-stocks th{text-align:left;padding:3px;font-weight:600;color:var(--text-sub);border-bottom:1px solid rgba(0,0,0,0.1)}
.all-stocks th:not(:first-child){text-align:right}
.all-stocks td{padding:3px;border-bottom:1px solid rgba(0,0,0,0.03)}
.all-stocks td:not(:first-child){text-align:right;font-family:monospace}
.all-stocks tr.pick-a5{background:rgba(124,58,237,0.06)}.all-stocks tr.pick-a4{background:rgba(0,0,0,0.03)}
.prod-card{margin:8px 12px;border-radius:8px;padding:12px;background:rgba(124,58,237,0.03);border:1.5px solid rgba(124,58,237,0.15);overflow-x:auto;-webkit-overflow-scrolling:touch}
.prod-title{font-size:11px;font-weight:700;color:var(--purple);margin-bottom:8px}
.prod-input-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid rgba(0,0,0,0.06)}
.prod-input-label{font-size:10px;font-weight:600;color:var(--text-sub)}
.prod-toggle{display:flex;gap:0;background:rgba(0,0,0,0.04);border-radius:4px;padding:1px}
.prod-toggle-btn{padding:3px 10px;border-radius:3px;font-size:10px;font-weight:600;border:none;cursor:pointer;background:none;color:var(--text-sub)}
.prod-toggle-btn.active{background:var(--purple);color:#fff}
.prod-input{width:90px;padding:3px 6px;border:1px solid rgba(0,0,0,0.12);border-radius:4px;font-size:11px;text-align:right;font-family:monospace}
.prod-fx-btn{font-size:9px;padding:2px 6px;border:1px solid rgba(0,0,0,0.12);border-radius:3px;background:none;cursor:pointer;color:var(--text-sub)}
.prod-table{width:100%;font-size:10px;border-collapse:collapse}
.prod-table th{text-align:left;padding:6px 4px;font-size:9px;font-weight:600;color:var(--text-sub);border-bottom:1px solid rgba(0,0,0,0.1)}
.prod-table td{padding:5px 4px;border-bottom:1px solid rgba(0,0,0,0.04)}
.prod-table .num{text-align:right;font-family:monospace;font-weight:600}
.prod-table .shares{font-size:12px;font-weight:800;color:var(--purple)}
.prod-table .dev{font-size:9px}.prod-table .dev.neg{color:var(--red)}.prod-table .dev.pos{color:var(--green)}
.prod-summary{margin-top:8px;font-size:10px;display:flex;justify-content:space-between;padding:6px;background:rgba(0,0,0,0.02);border-radius:4px}
</style>
</head>
<body>
<div class="prism-header">
  <div class="prism-title">PRISM-<span style="color:var(--purple)">R</span></div>
  <div class="prism-sub">Residual Alpha Shadow Book</div>
  <div id="prismDate" class="prism-badge" style="background:rgba(124,58,237,0.08);color:var(--purple)">Loading...</div>
  <div id="headerMeta"></div>
</div>
<div id="prismMain"><div style="padding:40px;text-align:center;color:var(--text-sub)">иӘӯгҒҝиҫјгҒҝдёӯ...</div></div>

<script>
const fmt=v=>{if(v===null||v===undefined)return'вҖ”';const n=Number(v);return isNaN(n)?'вҖ”':(n>=0?'+':'')+((n*100).toFixed(1))+'%'};
const fmtN=(v,d=3)=>v!=null?v.toFixed(d):'вҖ”';
const _v='?v='+Date.now();
Promise.all([
  fetch('/api/prism-r/shadow_comparison.json'+_v).then(r=>r.json()),
  fetch('/api/prism-r/meta.json'+_v).then(r=>r.json())
]).then(([comp,meta])=>{
  document.getElementById('prismDate').textContent='Snapshot: '+comp.snapshot_date;
  let h='';
  // 1. Shadow Status Card
  h+=`<div class="gate-card shadow"><div class="gate-state">PRISM-R: ${meta.status||'SHADOW'}</div>`;
  h+=`<div class="gate-detail">Оұ63Г—shrink(rВІ) | 20е–¶жҘӯж—ҘгғӘгғҗгғ©гғігӮ№ | sector_cap=3</div>`;
  h+=`<div class="gate-atk">иҰіжё¬гғўгғјгғү вҖ” A4 liveз¶ӯжҢҒ</div></div>`;
  // 2. PIT Warning
  h+=`<div style="margin:6px 12px;padding:6px 10px;border-radius:4px;font-size:9px;background:rgba(245,158,11,0.08);color:#b45309;border:1px solid rgba(245,158,11,0.2)">вҡ  з ”з©¶з”Ё: гғҶгғјгғһж§ӢжҲҗгҒ®PITе•ҸйЎҢгҒӮгӮҠгҖӮзө¶еҜҫCAGRгҒҜжҺЎз”Ёж №жӢ гҒ«гҒ—гҒӘгҒ„гҖӮзӣёеҜҫе·®еҲҶгҒ®гҒҝжңүеҠ№гҖӮ</div>`;
  // 3. Summary Grid
  const s=comp.summary;
  h+=`<div class="health-grid">`;
  h+=`<div class="health-box"><div class="health-label">гғҶгғјгғһ</div><div class="health-val">${s.themes_selected}</div></div>`;
  h+=`<div class="health-box"><div class="health-label">A5йҠҳжҹ„</div><div class="health-val">${s.a5_names}</div></div>`;
  h+=`<div class="health-box"><div class="health-label">е·®еҲҶйҠҳжҹ„</div><div class="health-val" style="color:var(--purple)">${s.diff_names}</div></div>`;
  h+=`<div class="health-box"><div class="health-label">йҮҚиӨҮзҺҮ</div><div class="health-val">${Math.round(s.overlap_pct*100)}%</div></div></div>`;
  // 3a. Virtual sell/hold signals (EXIT CONSTITUTION v2)
  const exitThemes=comp.comparisons.filter(c=>c.theme_state==='EXIT');
  const watchThemes=comp.comparisons.filter(c=>c.theme_state==='WATCH');
  const entryThemes=comp.comparisons.filter(c=>c.theme_state==='ENTRY');
  if(exitThemes.length>0){
    h+=`<div class="section-title" style="color:var(--red)">в–ј еЈІеҚҙзўәе®ҡпјҲд»®жғіпјү</div>`;
    exitThemes.forEach(c=>{
      const s5=c.stocks.find(x=>x.ticker===c.a5_pick)||{};
      h+=`<div class="signal-card sell-r" style="margin:4px 12px"><div class="signal-card-title">рҹ”ҙ ${c.a5_pick} ${c.theme_name} вҖ” rank${c.full_rank} EXIT</div>`;
      h+=`<div style="font-size:9px;color:var(--text-sub)">гғҶгғјгғһrank>${35}гҒ§targetйҷӨеӨ–гҖӮMinHoldжәҖдәҶеҫҢгҒ«еЈІеҚҙеҜҫиұЎгҖӮ</div></div>`;
    });
  }
  if(watchThemes.length>0){
    h+=`<div class="section-title" style="color:#b45309">вҸі WATCH ZONEпјҲд»®жғіпјү</div>`;
    watchThemes.forEach(c=>{
      h+=`<div class="signal-card blocked-r" style="margin:4px 12px"><div class="signal-card-title">рҹҹЎ ${c.a5_pick} ${c.theme_name} вҖ” rank${c.full_rank} WATCH</div>`;
      h+=`<div style="font-size:9px;color:var(--text-sub)">rank 21-35: йҖҖеҮәгҒ—гҒӘгҒ„гҒҢзӣЈиҰ–еј·еҢ–гҖӮrank>35гҒ§еЈІеҚҙеҖҷиЈңгҒ«з§»иЎҢгҖӮ</div></div>`;
    });
  }
  if(exitThemes.length===0&&watchThemes.length===0){
    h+=`<div class="signal-card hold-r" style="margin:8px 12px"><div class="signal-card-title">вң… е…Ё${entryThemes.length}гғҶгғјгғһ ENTRYпјҲrankвүӨ20пјү</div>`;
    h+=`<div style="font-size:9px;color:var(--text-sub)">EXIT CONSTITUTION v2: еЈІеҚҙеҖҷиЈңгҒӘгҒ—гҖӮе…ЁгғҶгғјгғһгҒҢENTRY zoneеҶ…гҖӮ</div></div>`;
  }
  // 3b. Virtual Portfolio вҖ” A4 vs A5-R side by side
  h+=`<div class="section-title">рҹ“Ӣ гғҗгғјгғҒгғЈгғ«гғқгғјгғҲгғ•гӮ©гғӘгӮӘ</div>`;
  h+=`<div class="bm-card"><div class="bm-title">A4 (PRISMзҸҫиЎҢ) vs A5-R (Shadow) вҖ” еҗ„10%зӯүгӮҰгӮ§гӮӨгғҲ</div>`;
  h+=`<table class="bm-table"><tr><th>#</th><th>гғҶгғјгғһ</th><th>зҠ¶ж…Ӣ</th><th>A4 pick</th><th>A5-R pick</th><th></th></tr>`;
  comp.comparisons.forEach((c,i)=>{
    const a4s=c.stocks.find(x=>x.ticker===c.a4_pick)||{};
    const a5s=c.stocks.find(x=>x.ticker===c.a5_pick)||{};
    const cls=c.same?'':'style="background:rgba(124,58,237,0.04)"';
    const tag=c.same?'<span style="color:var(--green);font-size:9px">дёҖиҮҙ</span>':'<span style="color:var(--purple);font-size:9px;font-weight:700">е·®еҲҶ</span>';
    h+=`<tr ${cls}>`;
    h+=`<td style="font-size:9px;color:var(--text-sub)">${i+1}</td>`;
    h+=`<td style="font-size:9px">${c.theme_name}</td>`;
    const stColor=c.theme_state==='ENTRY'?'var(--green)':c.theme_state==='WATCH'?'#b45309':'var(--red)';
    h+=`<td style="font-size:8px;font-weight:700;color:${stColor}">${c.theme_state||'?'}</td>`;
    h+=`<td style="font-weight:700">${c.a4_pick} <span style="font-size:8px;color:${(a4s.raw_1m||0)>=0?'var(--green)':'var(--red)'}">${fmt(a4s.raw_1m)}</span></td>`;
    h+=`<td style="font-weight:700;color:var(--purple)">${c.a5_pick} <span style="font-size:8px;color:${(a5s.alpha63||0)>=0?'var(--green)':'var(--red)'}">Оұ${fmtN(a5s.alpha63)}</span></td>`;
    h+=`<td>${tag}</td></tr>`;
  });
  h+=`</table></div>`;
  // 3b-2. Virtual Sell Confirmed card (EXIT CONSTITUTION v2)
  const vExits = comp.virtual_exits || [];
  const vEntries = comp.virtual_entries || [];
  if(vExits.length > 0) {
    h+=`<div class="signal-card sell-r" style="margin:8px 12px"><div class="signal-card-title">рҹ”ҙ еЈІеҚҙзўәе®ҡпјҲд»®жғіпјү вҖ” ${vExits.length}йҠҳжҹ„гҒҢtargetйҷӨеӨ–</div>`;
    vExits.forEach(e => {
      h+=`<div style="padding:4px 8px;margin:2px 0;background:rgba(255,23,68,0.04);border-radius:3px;font-size:10px">`;
      h+=`<b style="color:var(--red)">${e.ticker}</b> <span style="color:var(--text-sub)">${e.prev_theme}</span>`;
      h+=`<span style="float:right;font-size:9px;color:var(--text-sub)">еүҚеӣһ#${e.prev_rank} вҶ’ йҷӨеӨ–</span></div>`;
    });
    h+=`<div style="font-size:9px;color:var(--text-sub);margin-top:4px">EXIT CONSTITUTION v2: target_weightsгҒӢгӮүйҷӨеӨ–гҒ•гӮҢгҒҹйҠҳжҹ„гҖӮshadowгғўгғјгғүгҒ®гҒҹгӮҒд»®жғіиЎЁзӨәгҖӮ</div></div>`;
  }
  if(vEntries.length > 0) {
    h+=`<div class="signal-card hold-r" style="margin:8px 12px"><div class="signal-card-title">рҹҹў ж–°иҰҸеҸӮе…ҘпјҲд»®жғіпјү вҖ” ${vEntries.length}йҠҳжҹ„</div>`;
    vEntries.forEach(e => {
      h+=`<div style="padding:4px 8px;margin:2px 0;background:rgba(0,200,83,0.04);border-radius:3px;font-size:10px">`;
      h+=`<b style="color:var(--green)">${e.ticker}</b> <span style="color:var(--text-sub)">${e.theme}</span></div>`;
    });
    h+=`</div>`;
  }
  if(vExits.length === 0 && vEntries.length === 0) {
    h+=`<div style="margin:6px 12px;padding:6px 10px;border-radius:4px;font-size:9px;background:rgba(0,200,83,0.06);color:var(--green);border:1px solid rgba(0,200,83,0.15)">вң… еүҚеӣһгҒӢгӮүйҠҳжҹ„еӨүжӣҙгҒӘгҒ— вҖ” е…ЁгғқгӮёгӮ·гғ§гғіз¶ҷз¶ҡ</div>`;
  }
  // 3c. Rebalance Calculator
  window._prismR_picks = comp.comparisons.map(c => {
    const s = c.stocks.find(x=>x.ticker===c.a5_pick)||{};
    return {ticker:c.a5_pick, price:s.price, sector:s.sector, theme:c.theme_name, alpha63:s.alpha63};

    ["еЈІеҚҙгғӯгӮёгғғгӮҜпјҲEXIT CONSTITUTION v2пјү",`<div style="font-size:10px;font-weight:700;color:var(--purple);margin:6px 0 4px">3еұӨеҲҶйӣўгӮўгғјгӮӯгғҶгӮҜгғҒгғЈ</div><div class="logic-rule"><b>Layer A: Signal Exit</b> вҖ” гӮҝгғјгӮІгғғгғҲйҷӨеӨ–еҲӨе®ҡгҖӮT2(rank&gt;35)гҒҢжӯЈејҸйҖҖеҮәгғүгғ©гӮӨгғҗгҖӮT3гҒҜdiagnostic onlyгҖӮ</div><div class="logic-rule"><b>Layer B: Execution Permission</b> вҖ” е®ҹиЎҢеҲ¶зҙ„гҖӮMinHold 20е–¶жҘӯж—ҘгҒҢе”ҜдёҖгҒ®е®ҹиЁјжёҲгҒҝгӮігӮўгҖӮTRAIL8=alert-onlyгҖӮ</div><div class="logic-rule"><b>Layer C: Portfolio Reconciliation</b> вҖ” blockedйҠҳжҹ„гҒ®capж•ҙеҗҲгҖӮжңҖе„Әе…Ҳgovernanceи«–зӮ№гҖӮ</div><div style="font-size:10px;font-weight:700;color:var(--purple);margin:8px 0 4px">еЈІеҚҙеҲӨе®ҡгғ•гғӯгғј</div><div class="logic-rule">в‘  target_weightsгҒ«еҗ«гҒҫгӮҢгӮӢ вҶ’ <b>HOLD_TARGET</b></div><div class="logic-rule">в‘Ў targetеӨ– + holding_days &lt; 20 вҶ’ <b>рҹ”’ HOLD_BLOCKED</b>пјҲMinHoldпјү</div><div class="logic-rule">в‘ў targetеӨ– + holding_days вүҘ 20 вҶ’ <b>SELL_EXPIRED</b></div><div class="logic-rule">в‘Ј TRAIL8зҷәзҒ« вҶ’ <b>вҡ пёҸ ALERT гҒ®гҒҝ</b>пјҲauto-sellз„ЎеҠ№пјү</div><div style="font-size:10px;font-weight:700;color:var(--purple);margin:8px 0 4px">cap violationжҷӮгҒ®е„Әе…Ҳй ҶдҪҚ</div><div class="logic-rule">1. Data integrity / delisting вҶ’ еҚіжҷӮеЈІеҚҙпјҲMinHoldз„ЎиҰ–пјү</div><div class="logic-rule">2. atk_capпјҲhardпјү вҶ’ blockedйҠҳжҹ„гҒ®жҜ”дҫӢзё®е°ҸгӮ’иЁұеҸҜ</div><div class="logic-rule">3. MinHold вҶ’ иЈҒйҮҸеЈІеҚҙзҰҒжӯўгҒ гҒҢгҖҒcapеҜҫеҝңгҒ®зё®е°ҸгҒҜиЁұеҸҜ</div><div class="logic-rule">4. sector_cap вҶ’ legacy blocked=soft / new buys=hard</div><div style="font-size:10px;font-weight:700;color:var(--purple);margin:8px 0 4px">blocked weightеҮҰзҗҶ</div><div class="logic-rule">blockedйҠҳжҹ„гҒҜ atk_capйҒ•еҸҚжҷӮгҒ®гҒҝзё®е°ҸиЁұеҸҜгҖӮsector_capгҒ§гҒҜдёҚеҸҜгҖӮ</div><div style="font-size:10px;font-weight:700;color:var(--text-sub);margin:8px 0 4px">гғ‘гӮӨгғ—гғ©гӮӨгғіеҲҶйӣў</div><div class="logic-rule"><b>Order pipeline:</b> гғҶгғјгғһйҒёе®ҡвҶ’targetвҶ’MinHoldвҶ’cap repairвҶ’жіЁж–Ү</div><div class="logic-rule"><b>Monitoring pipeline:</b> TRAIL8 / T3 / peak DDпјҲжіЁж–ҮжЁ©йҷҗгҒӘгҒ—пјү</div>`],
    ["PITгғ»жӨңиЁјзҠ¶жіҒ",`<div style="font-size:10px;font-weight:700;color:var(--green);margin:4px 0">вң… жӨңиЁјжёҲгҒҝ</div><div class="logic-rule">MinHold 20ж—Ҙ / SectorCap 35% / K-gate / A5ж–№еҗ‘жҖ§пјҲ5е№ҙ73гғӘгғҗгғ©гғігӮ№пјү</div><div style="font-size:10px;font-weight:700;color:#b45309;margin:8px 0 4px">вҡ  йғЁеҲҶжӨңиЁј</div><div class="logic-rule">гғҶгғјгғһгӮ№гӮігӮў5еӣ еӯҗпјҲ126ж—ҘгҒ®гҒҝпјү/ гғ’гӮ№гғҶгғӘгӮ·гӮ№20/35пјҲжңӘгғҶгӮ№гғҲпјү</div><div style="font-size:10px;font-weight:700;color:var(--red);margin:8px 0 4px">вқҢ жңӘжӨңиЁј</div><div class="logic-rule">TRAIL8 -8%й–ҫеҖӨ / T3еҚҳзӢ¬еҠ№жһң / Layer C cap repair / A5еӣәжңүexit / shrinkageй–ўж•°гҒ®зҗҶи«–зҡ„жңҖйҒ©жҖ§</div><div style="font-size:10px;font-weight:700;color:var(--text-sub);margin:8px 0 4px">PITз•ҷдҝқ</div><div class="logic-rule">A4/A5гҒҜеҗҢдёҖfrozen membershipгӮ’дҪҝгҒҶгҒҹгӮҒPITжұҡжҹ“гҒҜ<b>йғЁеҲҶзӣёж®ә</b>гҒ•гӮҢгӮӢгҖӮгҒҹгҒ гҒ—A5гҒҜOLSжҺЁе®ҡеҖӨгҒ«membershipгҒҢзӣҙжҺҘе…ҘгӮӢгҒҹгӮҒгҖҒLayer 2гҒ®PITж„ҹеҝңеәҰгҒҜA4гӮҲгӮҠй«ҳгҒ„гҖӮ</div><div class="logic-rule">76%гҒ®TechжҜ”зҺҮгҒҜ<b>return concentration</b>пјҲгғ‘гғ•гӮ©гғјгғһгғігӮ№йӣҶдёӯпјүгҒ§гҒӮгӮҠгҖҒallocation concentrationпјҲй…ҚеҲҶйӣҶдёӯпјүгҒ§гҒҜгҒӘгҒ„гҖӮ</div>`]
  ];
  lcards.forEach(([title,body])=>{
    h+=`<div class="logic-card" onclick="this.classList.toggle('open')"><div class="logic-card-header"><span>в–¶ ${title}</span><span class="lc-icon">вҖә</span></div><div class="logic-card-body">${body}</div></div>`;
  });
  document.getElementById('prismMain').innerHTML=h;
  initPrismRChart();
}).catch(err=>{document.getElementById('prismMain').innerHTML=`<p style="color:red;padding:20px">Error: ${err.message}</p>`;});
function renderStock(s,cls,label){
  if(!s||!s.ticker)return`<div class="signal-card ${cls}"><div class="signal-card-title">${label}</div><div style="color:var(--text-sub);font-size:9px">еҖҷиЈңгҒӘгҒ—</div></div>`;
  let h=`<div class="signal-card ${cls}"><div class="signal-card-title">${label}</div>`;
  h+=`<div class="ss"><div class="ss-top"><span class="ss-ticker">${s.ticker}</span><span class="ss-price">$${s.price||'вҖ”'}</span></div>`;
  h+=`<div class="ss-company">${s.name_ja||s.name||''}</div>`;
  h+=`<div class="ss-badges"><span class="ss-badge ex">${s.mc}</span><span class="ss-badge sec">${s.sector}</span></div>`;
  h+=`<div class="ss-rets">`;
  [{l:'Оұ63',v:s.alpha63,f:fmtN},{l:'RВІ',v:s.r2_63,f:fmtN},{l:'Shrink',v:s.shrink,f:fmtN},{l:'1M',v:s.raw_1m,f:fmt}].forEach(r=>{
    const val=r.f(r.v);const nv=Number(r.v)||0;const c=r.l==='RВІ'||r.l==='Shrink'?'':nv>=0?'pos':'neg';
    h+=`<div class="ss-ret"><div class="ss-ret-label">${r.l}</div><div class="ss-ret-val ${c}">${val}</div></div>`;});
  h+=`</div></div></div>`;return h;}

window._rCcy='USD';
function setRCcy(c){window._rCcy=c;document.querySelectorAll('.prod-toggle-btn').forEach(b=>b.classList.toggle('active',b.textContent===c));document.getElementById('rCcySign').textContent=c==='USD'?'$':'ВҘ';calcR();}
function fetchRFx(){const btn=document.querySelector('.prod-fx-btn');btn.textContent='еҸ–еҫ—дёӯ...';fetch('https://api.exchangerate-api.com/v4/latest/USD').then(r=>r.json()).then(d=>{const rate=d.rates?.JPY||150;document.getElementById('rFx').value=rate.toFixed(2);btn.textContent='рҹ”„ '+rate.toFixed(2)+'еҶҶ';calcR();}).catch(()=>{btn.textContent='рҹ”„ еҸ–еҫ—еӨұж•—';});}
function calcR(){
  const picks=window._prismR_picks;if(!picks)return;
  const rawCap=parseFloat(document.getElementById('rCapital').value)||0;
  const fx=parseFloat(document.getElementById('rFx').value)||150;
  const capUSD=window._rCcy==='JPY'?rawCap/fx:rawCap;
  const w=0.10;let totalInvested=0;let html='';
  picks.forEach(p=>{
    if(!p.price)return;
    const target=capUSD*w;const shares=Math.floor(target/p.price);
    const actual=shares*p.price;const actualPct=capUSD>0?(actual/capUSD)*100:0;
    const dev=actualPct-10;totalInvested+=actual;
    html+=`<tr><td><b style="color:var(--purple)">${p.ticker}</b> <span style="font-size:8px;color:var(--text-sub)">Оұ${p.alpha63!=null?p.alpha63.toFixed(2):''}</span></td>`;
    html+=`<td style="font-size:9px">${p.theme}</td>`;
    html+=`<td class="num">$${p.price.toLocaleString()}</td>`;
    html+=`<td class="num"><span class="shares">${shares}ж Ә</span> <span class="dev ${dev>=0?'pos':'neg'}">е®ҹ${actualPct.toFixed(1)}% (${dev>=0?'+':''}${dev.toFixed(1)}%)</span></td></tr>`;
  });
  document.getElementById('rRebalBody').innerHTML=html;
  const residual=capUSD-totalInvested;const residualPct=capUSD>0?(residual/capUSD)*100:0;
  const fmtD=v=>'$'+v.toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0});
  const fmtY=v=>'ВҘ'+Math.round(v*fx).toLocaleString();
  let sh=`<div class="prod-summary"><span>е®ҹжҠ•иіҮйЎҚ <b>${fmtD(totalInvested)}</b>`;
  if(window._rCcy==='JPY')sh+=` (${fmtY(totalInvested)})`;
  sh+=`</span><span>жңӘдҪҝз”ЁзҸҫйҮ‘ <b style="color:${residualPct>15?'var(--red)':'var(--text-main)'}"> ${fmtD(residual)} (${residualPct.toFixed(1)}%)</b>`;
  if(window._rCcy==='JPY')sh+=` (${fmtY(residual)})`;
  sh+=`</span></div>`;
  document.getElementById('rRebalSummary').innerHTML=sh;
}
setTimeout(()=>{if(window._prismR_picks)calcR();},500);
// === Cumulative Returns Chart (PRISM-R) ===
function initPrismRChart(){
fetch('/api/prism-r/cumulative_returns.json?t='+Date.now()).then(r=>r.json()).then(cr=>{
  const ctx=document.getElementById('cumChartR');
  if(!ctx)return;
  const fwd = cr.forward_overlay || {dates:[],a5:[],SPY:[]};
  const lastBT_a5 = cr.a5[cr.a5.length-1] || 1;
  const lastBT_spy = cr.SPY[cr.SPY.length-1] || 1;
  const fwdA5 = (fwd.a5||[]).map(g => Math.round(lastBT_a5 * g * 1e6) / 1e6);
  const fwdSPY = (fwd.SPY||[]).map(g => Math.round(lastBT_spy * g * 1e6) / 1e6);
  const allDates = [...cr.dates, ...fwd.dates.filter(d => !cr.dates.includes(d))];
  const btA5 = [...cr.a5, ...new Array(fwd.dates.filter(d=>!cr.dates.includes(d)).length).fill(null)];
  const btSPY = [...cr.SPY, ...new Array(fwd.dates.filter(d=>!cr.dates.includes(d)).length).fill(null)];
  const fwdA5Full = [...new Array(cr.dates.length - 1).fill(null), lastBT_a5, ...fwdA5];
  const fwdSPYFull = [...new Array(cr.dates.length - 1).fill(null), lastBT_spy, ...fwdSPY];
  new Chart(ctx,{type:'line',data:{labels:allDates,datasets:[
    {label:'A5-R BT(еҸӮиҖғ)',data:btA5,borderColor:'rgba(124,58,237,0.4)',borderWidth:1.5,pointRadius:0,fill:false,borderDash:[4,3]},
    {label:'A5-R е®ҹзёҫ',data:fwdA5Full,borderColor:'#7c3aed',borderWidth:2.5,pointRadius:fwd.dates.length>0?3:0,fill:false},
    {label:'SPY BT',data:btSPY,borderColor:'rgba(156,163,175,0.4)',borderWidth:1,pointRadius:0,fill:false,borderDash:[4,3]},
    {label:'SPY е®ҹзёҫ',data:fwdSPYFull,borderColor:'#9ca3af',borderWidth:2,pointRadius:fwd.dates.length>0?3:0,fill:false}
  ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},spanGaps:false,
    plugins:{legend:{position:'top',labels:{font:{size:10},boxWidth:12}},
      tooltip:{callbacks:{label:c=>c.dataset.label+': '+c.parsed.y.toFixed(2)+'x'}}},
    scales:{x:{type:'category',ticks:{maxTicksLimit:8,font:{size:9}},grid:{display:false}},
      y:{ticks:{font:{size:9},callback:v=>v.toFixed(1)+'x'},grid:{color:'rgba(0,0,0,0.04)'}}}}});
  const st=cr.stats;
  const mkB=(l,s,c)=>`<div style="flex:1;min-width:80px;text-align:center;padding:6px;border-radius:4px;background:${c}"><div style="font-size:8px;color:var(--text-sub)">${l}</div><div style="font-size:11px;font-weight:700">${s}</div></div>`;
  document.getElementById('cumStatsR').innerHTML=
    mkB('A5-R CAGR',(st.a5.cagr*100).toFixed(1)+'%','rgba(124,58,237,0.06)')+
    mkB('A5-R Sharpe',st.a5.sharpe.toFixed(2),'rgba(124,58,237,0.06)')+
    mkB('A5-R MaxDD',(st.a5.maxdd*100).toFixed(1)+'%','rgba(255,23,68,0.06)')+
    mkB('SPY CAGR',(st.SPY.cagr*100).toFixed(1)+'%','rgba(0,0,0,0.03)')+
    mkB('SPY MaxDD',(st.SPY.maxdd*100).toFixed(1)+'%','rgba(0,0,0,0.03)');
  const ann=cr.annual;const years=Object.keys(ann.a5).sort();
  let tb='';
  years.forEach(y=>{
    const a5v=ann.a5[y]||0,sv=ann.SPY[y]||0,diff=a5v-sv;
    const f=v=>(v>=0?'+':'')+(v*100).toFixed(1)+'%';
    const c=v=>v>=0?'color:var(--green)':'color:var(--red)';
    tb+=`<tr><td style="font-weight:600">${y}</td><td style="${c(a5v)};font-weight:700">${f(a5v)}</td><td style="${c(sv)}">${f(sv)}</td><td style="${c(diff)};font-weight:600">${f(diff)}</td></tr>`;
  });
  document.getElementById('annualBodyR').innerHTML=tb;
}).catch(e=>console.warn('cumulative chart error:',e));
}
</script>
