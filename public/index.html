<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>米国株テーマトラッカー</title>
  <link rel="stylesheet" href="/styles.css?v=2">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ffffff">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
  <header>
    <div class="header-top">
      <div class="header-title">米国株テーマトラッカー</div>
      <div class="header-right">
        <div class="market-toggle" id="marketToggle">
          <button class="mt-btn" data-mode="close" id="mtClose">終値</button>
          <button class="mt-btn active" data-mode="daily" id="mtDaily">日中</button>
        </div>
        <button class="header-action-btn" id="menuBtn" title="メニュー">☰</button>
      </div>
    </div>
    <div class="header-meta" id="headerMeta"></div>
    <div class="period-bar" id="periodBar"></div>
    <div class="toolbar" id="toolbar">
      <button class="toolbar-btn active" id="chartToggle">チャート</button>
      <button class="toolbar-btn" id="tickerToggle">銘柄</button>
      <select class="toolbar-select" id="sortSelect">
        <option value="rank">ランク順</option>
        <option value="desc">暴騰率↑</option>
        <option value="asc">暴落率↓</option>
        <option value="name">名前順</option>
      </select>
    </div>
    <div class="radio-filters" id="radioFilters">
      <label class="rf"><input type="radio" name="cat" value="" checked><span>全て</span></label>
      <label class="rf"><input type="radio" name="cat" value="sector"><span>セクター</span></label>
      <label class="rf"><input type="radio" name="cat" value="style"><span>スタイル</span></label>
      <label class="rf"><input type="radio" name="cat" value="commodity"><span>商品</span></label>
      <label class="rf"><input type="radio" name="cat" value="bond"><span>金利</span></label>
    </div>
  </header>
  <main id="main"><div class="loading" id="loading">読み込み中...</div></main>
  <nav class="bottom-nav">
    <a class="nav-item active" href="/"><span class="nav-icon">🏠</span>ホーム</a>
    <a class="nav-item" href="/map"><span class="nav-icon">🗺</span>マップ</a>
    <a class="nav-item" href="/market-movers"><span class="nav-icon">📈</span>銘柄</a>
    <a class="nav-item" href="/infographic"><span class="nav-icon">🌐</span>マクロテーマ</a>

  </nav>
  <script src="/app.js?v=6"></script>
</body>
</html>
