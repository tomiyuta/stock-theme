<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>米国株テーマトラッカー</title>
  <link rel="stylesheet" href="/styles.css?v=11">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ffffff">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
  <header>
    <div class="header-top">
      <div class="header-title">米国株テーマトラッカー</div>
      <div class="header-right">
        <div class="market-toggle" id="marketToggle">
          <button class="mt-btn active" data-mode="close">終値</button>
          <button class="mt-btn" data-mode="daily">日中</button>
        </div>
      </div>
    </div>
    <div class="header-meta" id="headerMeta"></div>
    <div class="period-bar" id="periodBar"></div>
    <div class="toolbar" id="toolbar">
      <button class="toolbar-btn active" id="chartToggle">チャート</button>
      <button class="toolbar-btn" id="tickerToggle">銘柄</button>
      <select class="toolbar-select" id="sortSelect">
        <option value="rank">ランク順</option>
        <option value="desc">暴騰率↑</option>
        <option value="asc">暴落率↓</option>
        <option value="name">名前順</option>
      </select>
    </div>
    <div class="radio-filters">
      <label class="rf"><input type="radio" name="cat" value="sector" checked><span>セクター</span></label>
      <label class="rf"><input type="radio" name="cat" value="style"><span>スタイル</span></label>
      <label class="rf"><input type="radio" name="cat" value="commodity"><span>商品</span></label>
      <label class="rf"><input type="radio" name="cat" value="bond"><span>金利</span></label>
    </div>
  </header>
  <div id="miniMap"></div>
  <main id="main"><div class="loading">読み込み中...</div></main>
  <nav class="bottom-nav">
    <a class="nav-item active" href="/"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg></span>テーマ</a>
    <a class="nav-item" href="/map"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"/></svg></span>マップ</a>
    <a class="nav-item" href="/market-movers"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span>銘柄</a>
    <a class="nav-item" href="/infographic"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15 15 0 014 10 15 15 0 01-4 10 15 15 0 01-4-10 15 15 0 014-10z"/></svg></span>マクロテーマ</a>
    <a class="nav-item" href="/favorites"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15 9 23 9 17 14 19 22 12 17 5 22 7 14 1 9 9 9"/></svg></span>お気に入り</a>
  </nav>
  <script src="/app.js?v=12"></script>
</body>
</html>
