<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>米国株テーマトラッカー</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
  <header>
    <div class="header-top">
      <div class="header-title">米国株テーマトラッカー<span class="header-badge">Self-Hosted</span></div>
      <div class="header-right">
        <button class="header-action-btn" id="menuBtn" title="メニュー">☰</button>
      </div>
    </div>
    <div class="header-meta" id="headerMeta"></div>
    <div class="period-bar" id="periodBar"></div>
    <div class="toolbar" id="toolbar">
      <button class="toolbar-btn active" id="chartToggle">チャート</button>
      <button class="toolbar-btn" id="tickerToggle">銘柄</button>
      <button class="toolbar-btn" id="breakdownToggle">期間</button>
      <select class="toolbar-select" id="industryFilter"><option value="">全セクター</option></select>
      <select class="toolbar-select" id="sortSelect">
        <option value="rank">ランク順</option>
        <option value="desc">騰落率↓</option>
        <option value="asc">騰落率↑</option>
        <option value="name">名前順</option>
      </select>
    </div>
  </header>
  <main id="main"><div class="loading" id="loading">読み込み中...</div></main>
  <div class="modal-overlay" id="modal">
    <div class="modal-sheet">
      <button class="modal-close" id="modalClose">✕</button>
      <div id="modalBody"></div>
    </div>
  </div>
  <nav class="bottom-nav">
    <a class="nav-item active" href="/"><span class="nav-icon">🏠</span>ホーム</a>
    <a class="nav-item" href="/map"><span class="nav-icon">🗺</span>マップ</a>
    <a class="nav-item" href="/market-movers"><span class="nav-icon">📈</span>値動き</a>
    <a class="nav-item" href="/infographic"><span class="nav-icon">🌐</span>マクロ</a>
    <a class="nav-item" href="/favorites"><span class="nav-icon">⭐</span>お気に入り</a>
  </nav>
  <script src="/app.js"></script>
</body>
</html>
