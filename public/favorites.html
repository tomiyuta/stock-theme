<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>お気に入り | 米国株テーマトラッカー</title>
  <link rel="stylesheet" href="/styles.css?v=10">
</head>
<body>
  <header>
    <div class="header-top"><div class="header-title">お気に入り</div></div>
  </header>
  <main id="favMain" style="padding:12px"><div class="loading">お気に入りテーマはまだありません。<br><br>テーマ一覧から★をタップして追加してください。</div></main>
  <nav class="bottom-nav">
    <a class="nav-item" href="/"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg></span>テーマ</a>
    <a class="nav-item" href="/map"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"/></svg></span>マップ</a>
    <a class="nav-item" href="/market-movers"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span>銘柄</a>
    <a class="nav-item" href="/infographic"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15 15 0 014 10 15 15 0 01-4 10 15 15 0 01-4-10 15 15 0 014-10z"/></svg></span>マクロテーマ</a>
    <a class="nav-item active" href="/favorites"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15 9 23 9 17 14 19 22 12 17 5 22 7 14 1 9 9 9"/></svg></span>お気に入り</a>
  </nav>
  <script>
const fmt=v=>v==null?"—":(v>=0?"+":"")+((v*100).toFixed(1))+"%";
const favs=JSON.parse(localStorage.getItem("stock-theme-favs")||"[]");
if(favs.length>0){
  fetch("/api/theme_ranking.json").then(r=>r.json()).then(data=>{
    const all=(data.all_themes||[]).filter(t=>t.related);
    const items=all.filter(t=>favs.includes(t.slug));
    if(items.length===0){document.getElementById("favMain").innerHTML='<div class="loading">お気に入りテーマが見つかりません</div>';return}
    let h="";
    items.forEach((t,i)=>{
      const r=t["1日"];const dir=(r||0)>=0?"up":"down";
      h+='<div class="theme-item '+dir+'" onclick="location.href=\'/theme/'+t.slug+'\'"><div class="theme-item-row">';
      h+='<div class="rank '+(i<3?"top3 "+dir:"")+'">★</div>';
      h+='<div class="theme-name"><div class="theme-name-primary">'+t.name+'</div><div class="theme-name-secondary">'+t.theme1+'</div></div>';
      h+='<div class="return-cell"><div class="return-value '+(dir==="up"?"positive":"negative")+'">'+fmt(r)+'</div></div>';
      h+='<div class="chevron">›</div></div></div>';
    });
    document.getElementById("favMain").innerHTML=h;
  });
}
  </script>
</body>
</html>
