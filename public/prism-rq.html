<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PRISM-RQ | PRISMATIC</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#ffffff">
  <link rel="stylesheet" href="/styles.css?v=21">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root{--text-main:#1a1a2e;--text-sub:#6b7280;--bg:#fff;--card-bg:#f8f9fb;--green:#00c853;--red:#ff1744;--blue:#0052cc;--gold:#f59e0b;--purple:#7c3aed}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',-apple-system,sans-serif;background:var(--bg);color:var(--text-main);padding-bottom:80px}
@media(min-width:1024px){html{background:#eee}body{max-width:700px;margin:0 auto;background:var(--bg);min-height:100vh;box-shadow:0 0 40px rgba(0,0,0,0.06)}}
.section-title{font-size:12px;font-weight:700;margin:16px 12px 6px;color:var(--text-main)}
.card{margin:8px 12px;border-radius:8px;padding:12px;background:var(--card-bg);border:1px solid rgba(0,0,0,0.06)}
.card-title{font-size:11px;font-weight:700;margin-bottom:8px}
.tbl{width:100%;font-size:10px;border-collapse:collapse}
.tbl th{text-align:left;padding:3px 4px;color:var(--text-sub);font-weight:600;border-bottom:1px solid rgba(0,0,0,0.1)}
.tbl td{padding:3px 4px;border-bottom:1px solid rgba(0,0,0,0.04)}
.pos{color:var(--green);font-weight:700}.neg{color:var(--red);font-weight:700}
.badge{font-size:8px;padding:1px 5px;border-radius:2px;display:inline-block}
.accordion{margin:4px 12px;border-radius:6px;border:1px solid rgba(0,0,0,0.06);overflow:hidden}
.acc-hdr{padding:10px 12px;font-size:11px;font-weight:700;cursor:pointer;background:var(--card-bg);display:flex;justify-content:space-between;align-items:center}
.acc-body{display:none;padding:10px 12px;font-size:10px;line-height:1.7}
.accordion.open .acc-body{display:block}.accordion.open .acc-icon{transform:rotate(90deg)}
.acc-icon{font-size:9px;transition:transform 0.2s}
.prod-card{margin:8px 12px;border-radius:8px;padding:12px;background:rgba(124,58,237,0.03);border:1.5px solid rgba(124,58,237,0.15);overflow-x:auto;-webkit-overflow-scrolling:touch}
.prod-title{font-size:11px;font-weight:700;color:var(--purple);margin-bottom:8px}
.prod-input-row{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid rgba(0,0,0,0.06)}
.prod-input-top{display:flex;align-items:center;justify-content:space-between}
.prod-seg{display:flex;border:0.5px solid rgba(0,0,0,0.15);border-radius:20px;overflow:hidden;background:rgba(0,0,0,0.03)}
.prod-seg-btn{padding:7px 20px;font-size:12px;font-weight:500;border:none;cursor:pointer;background:none;color:var(--text-sub);border-radius:20px;transition:all 0.15s}
.prod-seg-btn.active{background:var(--text-main);color:#fff}
.prod-fx-area{display:flex;align-items:center;gap:6px;cursor:pointer;padding:4px 10px;border-radius:16px;transition:background 0.15s}
.prod-fx-area:hover{background:rgba(0,0,0,0.04)}
.prod-fx-rate{font-size:12px;font-weight:500;color:var(--text-main)}
.prod-fx-dot{width:5px;height:5px;border-radius:50%;background:#1D9E75;flex-shrink:0}
.prod-fx-time{font-size:10px;color:var(--text-sub)}
.prod-fx-icon{width:14px;height:14px;color:var(--text-sub);transition:transform 0.5s}
.prod-big-wrap{position:relative}
.prod-big-sign{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:20px;font-weight:500;color:var(--text-sub)}
.prod-big-input{width:100%;padding:14px 14px 14px 34px;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;font-size:22px;font-weight:500;font-family:monospace;text-align:left;box-sizing:border-box;background:none;color:var(--text-main);outline:none;transition:border-color 0.15s}
.prod-big-input:focus{border-color:var(--purple)}
.prod-conv-row{display:flex;align-items:center;justify-content:space-between;padding:2px 4px;font-size:13px;color:var(--text-sub)}
.prod-table{width:100%;font-size:10px;border-collapse:collapse}
.prod-table th{text-align:left;padding:6px 4px;font-size:9px;font-weight:600;color:var(--text-sub);border-bottom:1px solid rgba(0,0,0,0.1)}
.prod-table td{padding:5px 4px;border-bottom:1px solid rgba(0,0,0,0.04)}
.prod-table .num{text-align:right;font-family:monospace;font-weight:600}
.prod-table .shares{font-size:12px;font-weight:800;color:var(--purple)}
.prod-table .dev{font-size:9px}.prod-table .dev.neg{color:var(--red)}.prod-table .dev.pos{color:var(--green)}
.prod-summary{margin-top:8px;font-size:10px;display:flex;justify-content:space-between;padding:6px;background:rgba(0,0,0,0.02);border-radius:4px}
.prod-meta{font-size:9px;color:var(--text-sub);margin-top:6px}
.strat-tabs{display:flex;gap:0;border-bottom:1.5px solid rgba(0,0,0,0.1);margin-bottom:10px}
.strat-tab{flex:1;padding:8px 0;font-size:11px;font-weight:600;border:none;background:none;cursor:pointer;color:var(--text-sub);border-bottom:2px solid transparent;transition:all 0.15s}
.strat-tab.active{color:var(--purple);border-bottom-color:var(--purple)}
.strat-tab:hover{color:var(--text-main)}
.strat-panel{display:none}.strat-panel.active{display:block}
</style>
</head>
<body>
<div style="padding:16px 12px 4px;text-align:center">
  <div style="font-size:20px;font-weight:900;letter-spacing:1px">PRISM-<span style="color:var(--purple)">RQ</span></div>
  <div style="font-size:10px;color:var(--text-sub);margin-top:2px">Tier 2 研究枝 — 四半期リバランス検証</div>
  <div style="margin-top:4px;display:flex;gap:4px;justify-content:center;flex-wrap:wrap">
    <span style="font-size:8px;padding:2px 6px;border-radius:3px;background:rgba(234,179,8,0.1);color:#b8860b;font-weight:700">A5ベース — α付加価値は限定的</span>
    <span style="font-size:8px;padding:2px 6px;border-radius:3px;background:rgba(0,200,83,0.08);color:#00a844;font-weight:700">PIT Silver</span>
  </div>
  <div id="headerMeta"></div>
</div>
<div id="rqMain"><div style="padding:40px;text-align:center;color:var(--text-sub)">Loading...</div></div>
<script>
const _v='?t='+Date.now();
Promise.all([
  fetch('/api/prism-r/shadow_comparison.json'+_v).then(r=>r.json()),
  fetch('/api/prism-r/meta.json'+_v).then(r=>r.json())
]).then(([comp,meta])=>{
  let h='';
  const pct=v=>(v*100).toFixed(1)+'%';
  const cl=v=>v>0?'pos':'neg';

  // === 1. Status Card ===
  h+=`<div style="margin:8px 12px;border-radius:8px;padding:14px;text-align:center;background:rgba(124,58,237,0.06);border:2px solid var(--purple)">`;
  h+=`<div style="font-size:20px;font-weight:900;letter-spacing:2px;color:var(--purple)">PRISM-RQ: ${meta.status||'SHADOW'}</div>`;
  h+=`<div style="font-size:10px;color:var(--text-sub);margin-top:4px">${comp.snapshot_date} | ${comp.version}</div>`;
  h+=`</div>`;

  // === 2. Portfolio: PRISM-RQ 10 Picks ===
  h+=`<div class="section-title">📊 PRISM-RQ ポートフォリオ</div>`;
  h+=`<div class="card"><div class="card-title" style="color:var(--purple)">SNRb × BFM-v2 — 10銘柄 × 10%等ウェイト</div>`;
  h+=`<table class="tbl"><tr><th>#</th><th>テーマ</th><th>銘柄</th><th>BFM-v2</th><th>CRA</th></tr>`;
  comp.comparisons.forEach((c,i) => {
    const snrb = c.snrb_pick || '—';
    const inBfm2 = c.in_bfm2 ? '<span class="badge" style="background:rgba(0,200,83,0.1);color:var(--green)">✅</span>' : '<span class="badge" style="background:rgba(255,23,68,0.1);color:var(--red)">vetoed</span>';
    const craAudit = c.cra_pick ? (c.stocks||[]).find(s=>s.ticker===c.cra_pick) : null;
    const craScore = craAudit?.cra_audit?.audit_score;
    const craLabel = craScore !== undefined ? (craScore >= 0.8 ? `<span class="pos">${craScore.toFixed(2)}</span>` : craScore >= 0.5 ? craScore.toFixed(2) : `<span class="neg">${craScore.toFixed(2)}</span>`) : '—';
    h+=`<tr><td>${i+1}</td><td style="font-size:9px">${c.theme_name||c.theme}</td><td style="font-weight:700">${snrb}</td><td>${inBfm2}</td><td>${craLabel}</td></tr>`;
  });
  h+=`</table></div>`;

  // === Sell Card ===
  h+=`<div id="sellCardRQ"></div>`;
  h+=`<div id="rebalDiffRQ"></div>`;
  comp.comparisons.forEach((c,i)=>{
    const snrbStock = (c.stocks||[]).find(s=>s.ticker===c.snrb_pick);
    if(!snrbStock) return;
    const cra = snrbStock.cra_audit || {};
    h+=`<div class="accordion" onclick="this.classList.toggle('open')">`;
    h+=`<div class="acc-hdr">${c.theme_name||c.theme} → ${snrbStock.ticker} <span class="acc-icon">▶</span></div>`;
    h+=`<div class="acc-body">`;
    h+=`<div style="font-weight:700;font-size:12px">${snrbStock.ticker} <span style="font-weight:400;font-size:10px;color:var(--text-sub)">${snrbStock.name||''}</span></div>`;
    if(snrbStock.price) h+=`<div style="font-size:14px;font-weight:700;margin:2px 0">$${snrbStock.price}</div>`;
    h+=`<div style="display:flex;gap:4px;flex-wrap:wrap;margin:4px 0">`;
    if(snrbStock.sector) h+=`<span class="badge" style="background:rgba(0,82,204,0.08);color:var(--blue)">${snrbStock.sector}</span>`;
    if(snrbStock.mc) h+=`<span class="badge" style="background:rgba(0,0,0,0.04);color:var(--text-sub)">${snrbStock.mc}</span>`;
    h+=`</div>`;
    // Scores
    h+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin:6px 0;font-size:9px">`;
    [['SNRb Score', snrbStock.score_snrb],['α63', snrbStock.alpha63],['Resid Vol', snrbStock.resid_vol63]].forEach(([l,v])=>{
      h+=`<div style="padding:3px 5px;border-radius:3px;background:rgba(124,58,237,0.05)"><div style="font-size:7px;color:var(--text-sub)">${l}</div><div style="font-weight:700">${v!==null&&v!==undefined?v:'—'}</div></div>`;
    });
    h+=`</div>`;
    [['β63', snrbStock.beta63],['R²', snrbStock.r2_63],['Shrink', snrbStock.shrink]].forEach(([l,v])=>{
      h+=`<div style="display:inline-block;font-size:8px;margin:1px 4px;color:var(--text-sub)">${l}=${v!==null?v:'—'}</div>`;
    });
    // CRA audit detail
    if(cra.audit_score !== undefined) {
      h+=`<div style="margin-top:6px;padding:6px;border-radius:4px;background:rgba(0,0,0,0.02);font-size:8px">`;
      h+=`<div style="font-weight:700;margin-bottom:3px">CRA-v1 監査 (audit=${cra.audit_score})</div>`;
      h+=`<div>符号3M=${cra.c1_sign3m?'✅':'❌'} 符号6M=${cra.c2_sign6m?'✅':'❌'} 安定=${cra.c3_st_stable?'✅':'❌'} t3M=${cra.c4_tval3m?'✅':'❌'} t6M=${cra.c5_tval6m?'✅':'❌'}</div>`;
      h+=`<div style="color:var(--text-sub);margin-top:2px">st_α3M=${cra.st_alpha_3m} t=${cra.st_tval_3m} | st_α6M=${cra.st_alpha_6m} t=${cra.st_tval_6m}</div>`;
      h+=`</div>`;
    }
    h+=`</div></div>`;
  });

  // === 4. Theme Correlation Budget ===
  const cd = comp.correlation_diagnostics || {};
  if (cd.n_themes) {
    const alert = cd.effective_n_themes < 4;
    h+=`<div class="section-title">🔗 Theme Correlation Budget</div>`;
    h+=`<div class="card" style="border-color:${alert?'var(--red)':'rgba(0,0,0,0.06)'};${alert?'background:rgba(239,68,68,0.04)':''}">`;
    h+=`<div style="font-size:10px;font-weight:700;color:${alert?'var(--red)':'var(--text-main)'};margin-bottom:6px">`;
    h+=`Effective N = ${cd.effective_n_themes}${alert?' ⚠️ CONCENTRATION ALERT':' ✅'}`;
    h+=`</div>`;
    h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:9px">`;
    [['Avg Corr', cd.avg_pairwise_corr, cd.avg_pairwise_corr>0.5],
     ['Max Corr', cd.max_pairwise_corr, cd.max_pairwise_corr>0.85],
     ['High Pairs (>0.7)', cd.n_high_corr_pairs+'/45', cd.n_high_corr_pairs/45>0.10],
     ['Effective N', cd.effective_n_themes, cd.effective_n_themes<4]
    ].forEach(([l,v,a])=>{
      h+=`<div style="padding:4px 6px;border-radius:4px;background:${a?'rgba(239,68,68,0.08)':'rgba(0,0,0,0.03)'}">`;
      h+=`<div style="font-size:8px;color:var(--text-sub)">${l}</div>`;
      h+=`<div style="font-weight:700;color:${a?'var(--red)':'var(--text-main)'}"> ${v} ${a?'⚠':'✅'}</div></div>`;
    });
    h+=`</div>`;
    h+=`<div style="font-size:7px;color:var(--text-sub);margin-top:6px">閾値: effective_n<4 / max_corr>0.85 / high_pairs>10%</div>`;
    h+=`</div>`;
  }

  // === 5. BFM-v2 Quality Filter ===
  const bfm2Count = comp.summary?.bfm2_themes || 0;
  const bfm2Vetoed = comp.summary?.bfm2_vetoed || 0;
  const vetoedThemes = comp.comparisons ? comp.comparisons.filter(c=>!c.in_bfm2).map(c=>c.theme_name||c.theme) : [];
  h+=`<div class="card">`;
  h+=`<div class="card-title">🛡️ BFM-v2 品質フィルタ</div>`;
  h+=`<div style="font-size:10px">テーマ生存: <b>${bfm2Count}/10</b> | 候補からvetoed: <b>${bfm2Vetoed}/25</b></div>`;
  h+=`<div style="font-size:8px;color:var(--text-sub);margin-top:3px">条件: breadth<30pct / concentration>80pct / vol>80pct</div>`;
  if(vetoedThemes.length>0) h+=`<div style="font-size:8px;color:var(--red);margin-top:3px">除外テーマ: ${vetoedThemes.join(', ')}</div>`;
  // Quality features for surviving themes
  const qf = comp.bfm2_quality_features || {};
  const qfEntries = Object.entries(qf).filter(([,v])=>v);
  if(qfEntries.length>0) {
    h+=`<table class="tbl" style="margin-top:6px"><tr><th>テーマ</th><th>Breadth</th><th>Conc.</th><th>Vol</th></tr>`;
    qfEntries.forEach(([th,f])=>{ h+=`<tr><td style="font-size:8px">${th}</td><td>${(f.breadth63*100).toFixed(0)}%</td><td>${f.concentration63.toFixed(3)}</td><td>${(f.theme_vol63*100).toFixed(0)}%</td></tr>`; });
    h+=`</table>`;
  }
  h+=`</div>`;

  // === 6. Dip Sleeve ===
  const dipSum = comp.dip_sleeve_summary || {};
  const dipAlerts = comp.dip_sleeve_diagnostics || [];
  if(dipAlerts.length > 0) {
    const nQ = dipSum.qualified || 0;
    h+=`<div class="card" style="border-color:${nQ>0?'#d97706':'rgba(0,0,0,0.06)'};${nQ>0?'background:rgba(217,119,6,0.04)':''}">`;
    h+=`<div class="card-title" style="color:${nQ>0?'#d97706':'var(--text-main)'}">📉 Dip Sleeve — ${nQ}/${dipSum.total_alerts} qualified</div>`;
    if(nQ>0) {
      h+=`<table class="tbl"><tr><th>テーマ</th><th>Dip</th><th>WR</th><th>n</th><th>Window</th><th>State</th></tr>`;
      const seen = new Set();
      dipAlerts.filter(a=>a.qualified).forEach(a=>{
        const key=a.theme+a.window; if(seen.has(key)) return; seen.add(key);
        h+=`<tr><td>${a.theme}</td><td class="neg">${pct(a.dip)}</td><td>${(a.win_rate*100).toFixed(0)}%</td><td>${a.sample_n}</td><td>${a.window}</td><td style="color:#d97706">${a.trend_state}</td></tr>`;
      });
      h+=`</table>`;
    }
    h+=`<div style="font-size:7px;color:var(--text-sub);margin-top:3px">条件: ENTRY/WATCH + win_rate≥60% + n≥20 + window∈{1M,1-2M,2-3M} + days≤60</div>`;
    h+=`</div>`;
  }

  // === 7. Architecture ===
  h+=`<div class="section-title">📐 PRISM-RQ アーキテクチャ</div>`;
  const archItems = [
    ["構造概要",`<div style="padding:6px;background:rgba(124,58,237,0.04);border-radius:4px;margin-bottom:6px;font-size:10px;line-height:1.6"><b>PRISM-RQ</b> = BFM-v2（Layer 1品質フィルタ）+ A5-SNRb（Layer 2残差SNR）<br>R = Residual（残差モメンタム） / Q = Quality（品質フィルタ）</div><div style="font-size:10px;line-height:1.6"><b>Layer 1:</b> テーマスコア上位25 → BFM-v2 veto（breadth/concentration/vol）→ 上位10<br><b>Layer 2:</b> 各テーマからSNRbスコア最大の1銘柄を選定<br><b>Layer 3:</b> 10銘柄 × 等ウェイト × 20営業日リバランス</div>`],
    ["Layer 1: テーマ選定 + BFM-v2",`<div style="font-size:10px;line-height:1.6"><code>theme_score = 0.70×rank(mom63) + 0.30×rank(decel)</code><br>上位25テーマを仮候補 → 品質フィルタで除外:<br>• breadth63 < 候補群内下位30%<br>• concentration63 > 候補群内上位20%<br>• theme_vol63 > 候補群内上位20%<br>→ 残りからscore順に10テーマ採用（sector_cap=3）</div>`],
    ["Layer 2: A5-SNRb 銘柄選定",`<div style="font-size:10px;line-height:1.6"><b>Split-Window OLS（β=126日、α=63日、自己除外）:</b><br><code>β/R²: 126日OLSで安定推定</code><br><code>α形成: 直近63日の残差平均</code><br><code>r_i(d) = α + β × r_theme_ex_self(d) + ε</code><br><b>スコア:</b><br><code>SNRb = (α_cum63|126 / resid_vol) × shrink(r²_126)</code><br><b>shrink(r²):</b> r²&lt;0.10→2r² | 0.10-0.50→線形 | &gt;0.50→1.0<br>各テーマからスコア最大1銘柄を選定。重複禁止。</div>`],
    ["統治レイヤー（診断中）",`<div style="font-size:10px;line-height:1.6"><b>Theme Correlation Budget:</b> テーマ間相関を監視。effective_n < 4で警告。<br><b>CRA-v1:</b> stock-themesのα/t値で外部監査（符号確認のみ）。parked。<br><b>Dip Sleeve:</b> 中期上昇テーマの押し目再参入候補を監視。<br><b>Continuity Filter:</b> スパークライン滑らかさ + 多期間α整合性。diagnostic。<br><b>Vol Overlay:</b> realized_vol vs target_vol(25%)。diagnostic。</div>`],
  ];
  archItems.forEach(([title,body])=>{
    h+=`<div class="accordion" onclick="this.classList.toggle('open')"><div class="acc-hdr">${title}<span class="acc-icon">▶</span></div><div class="acc-body">${body}</div></div>`;
  });

  // === 7b. Rebalance Calculator ===
  window._prismRQ_picks = comp.comparisons.map(c => {
    const s = (c.stocks||[]).find(x=>x.ticker===c.snrb_pick)||{};
    const sd = (c.stocks||[]).find(x=>x.ticker===(c.def_pick||c.snrb_pick))||{};
    return {ticker:c.snrb_pick, def_ticker:c.def_pick||c.snrb_pick, price:s.price, def_price:sd.price||s.price, sector:s.sector, theme:c.theme_name||c.theme, score_snrb:s.score_snrb, def_weight:c.def_weight||0.10};
  });
  h+=`<div class="section-title">📊 PRISM-RQ リバランス計算</div>`;
  h+=`<div class="prod-card"><div class="prod-title">SNRb Portfolio — 10銘柄 × 10%等ウェイト + 🛡DEF</div>`;
  h+=`<div class="prod-input-row">`;
  h+=`<div class="prod-input-top">`;
  h+=`<div class="prod-seg"><button class="prod-seg-btn active" id="rqSegUSD" onclick="setRQCcy('USD')">USD</button><button class="prod-seg-btn" id="rqSegJPY" onclick="setRQCcy('JPY')">JPY</button></div>`;
  h+=`<div class="prod-fx-area" onclick="fetchRQFx()"><span class="prod-fx-rate" id="rqFxRate">¥---</span><div class="prod-fx-dot" id="rqFxDot"></div><span class="prod-fx-time" id="rqFxTime">取得中...</span><svg class="prod-fx-icon" id="rqFxIcon" viewBox="0 0 16 16"><path d="M13.65 2.35A8 8 0 1 0 16 8h-2a6 6 0 1 1-1.76-4.24L10 6h6V0l-2.35 2.35z" fill="currentColor"/></svg></div>`;
  h+=`</div>`;

function initRQChart(){
fetch('/api/prism-rq/cumulative_returns.json?t='+Date.now()).then(r=>r.json()).then(cr=>{
  const ctx=document.getElementById('cumChartRQ');
  if(!ctx)return;
  const fwd=cr.forward_overlay||{dates:[],a5:[],SPY:[]};
  const lastBT_a5=cr.a5[cr.a5.length-1]||1;
  const lastBT_spy=cr.SPY[cr.SPY.length-1]||1;
  const fwdA5=(fwd.a5||[]).map(g=>Math.round(lastBT_a5*g*1e6)/1e6);
  const fwdSPY=(fwd.SPY||[]).map(g=>Math.round(lastBT_spy*g*1e6)/1e6);
  const allDates=[...cr.dates,...fwd.dates.filter(d=>!cr.dates.includes(d))];
  const btA5=[...cr.a5,...new Array(fwd.dates.filter(d=>!cr.dates.includes(d)).length).fill(null)];
  const btSPY=[...cr.SPY,...new Array(fwd.dates.filter(d=>!cr.dates.includes(d)).length).fill(null)];
  const fwdA5Full=[...new Array(cr.dates.length-1).fill(null),lastBT_a5,...fwdA5];
  const fwdSPYFull=[...new Array(cr.dates.length-1).fill(null),lastBT_spy,...fwdSPY];
  window._cumChartRQ=new Chart(ctx,{type:'line',data:{labels:allDates,datasets:[
    {label:'RQ BT(参考)',data:btA5,borderColor:'rgba(124,58,237,0.4)',borderWidth:1.5,pointRadius:0,fill:false,borderDash:[4,3]},
    {label:'RQ 実績',data:fwdA5Full,borderColor:'#7c3aed',borderWidth:2.5,pointRadius:fwd.dates.length>0?3:0,fill:false},
    {label:'SPY BT',data:btSPY,borderColor:'rgba(156,163,175,0.4)',borderWidth:1,pointRadius:0,fill:false,borderDash:[4,3]},
    {label:'SPY 実績',data:fwdSPYFull,borderColor:'#9ca3af',borderWidth:2,pointRadius:fwd.dates.length>0?3:0,fill:false}
  ]},options:{responsive:true,maintainAspectRatio:false,layout:{padding:{bottom:8}},interaction:{mode:'index',intersect:false},spanGaps:false,
    plugins:{legend:{position:'top',labels:{font:{size:10},boxWidth:12}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+c.parsed.y.toFixed(2)+'x'}}},
    scales:{x:{type:'category',ticks:{maxTicksLimit:8,maxRotation:45,font:{size:8}},grid:{display:false}},y:{ticks:{font:{size:9},callback:v=>v.toFixed(1)+'x'},grid:{color:'rgba(0,0,0,0.04)'}}}}});
  // Stats badges
  const st=cr.stats;
  const mkRow=(name,color,cagr,maxdd,sharpe,sortino,calmar)=>`<div style="display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:6px;background:${color};margin-bottom:4px"><div style="font-size:10px;font-weight:700;min-width:50px;color:var(--text-main)">${name}</div><div style="display:flex;gap:6px;flex:1"><div style="flex:1;text-align:center"><div style="font-size:7px;color:var(--text-sub)">CAGR</div><div style="font-size:11px;font-weight:700">${cagr}</div></div><div style="flex:1;text-align:center"><div style="font-size:7px;color:var(--text-sub)">MaxDD</div><div style="font-size:11px;font-weight:700">${maxdd}</div></div><div style="flex:1;text-align:center"><div style="font-size:7px;color:var(--text-sub)">Sharpe</div><div style="font-size:11px;font-weight:700">${sharpe}</div></div><div style="flex:1;text-align:center"><div style="font-size:7px;color:var(--text-sub)">Sortino</div><div style="font-size:11px;font-weight:700">${sortino}</div></div><div style="flex:1;text-align:center"><div style="font-size:7px;color:var(--text-sub)">Calmar</div><div style="font-size:11px;font-weight:700">${calmar}</div></div></div></div>`;
  document.getElementById('cumStatsRQ').innerHTML=
    mkRow('PRISM-RQ','rgba(124,58,237,0.06)',(st.a5.cagr*100).toFixed(1)+'%',(st.a5.maxdd*100).toFixed(1)+'%',st.a5.sharpe.toFixed(2),(st.a5.sortino||0).toFixed(2),(st.a5.calmar||0).toFixed(2))+
    mkRow('SPY','rgba(0,0,0,0.03)',(st.SPY.cagr*100).toFixed(1)+'%',(st.SPY.maxdd*100).toFixed(1)+'%',st.SPY.sharpe.toFixed(2),(st.SPY.sortino||0).toFixed(2),(st.SPY.calmar||0).toFixed(2));
  // Annual table
  const ann=cr.annual;const years=Object.keys(ann.a5).sort();
  let tb='';
  years.forEach(y=>{
    const a5v=ann.a5[y]||0,sv=ann.SPY[y]||0,diff=a5v-sv;
    const f=v=>(v>=0?'+':'')+(v*100).toFixed(1)+'%';
    const c=v=>v>=0?'color:var(--green)':'color:var(--red)';
    tb+=`<tr><td style="font-weight:600">${y}</td><td style="${c(a5v)};font-weight:700">${f(a5v)}</td><td style="${c(sv)}">${f(sv)}</td><td style="${c(diff)};font-weight:600">${f(diff)}</td></tr>`;
  });
  document.getElementById('annualBodyRQ').innerHTML=tb;
}).catch(e=>console.warn('RQ chart error:',e));
}
</script>

<script>
function toggleLogScale(chartVar, toggleId, isLog) {
  const chart = window[chartVar];
  if (!chart) return;
  chart.options.scales.y.type = isLog ? 'logarithmic' : 'linear';
  if (isLog) {
    chart.options.scales.y.ticks.callback = function(v) {
      if ([0.5,1,2,5,10,20,50,100,200,500].includes(v)) return v.toFixed(v<10?1:0)+'x';
      return null;
    };
  } else {
    chart.options.scales.y.ticks.callback = function(v) { return v.toFixed(1)+'x'; };
  }
  chart.update();
  document.querySelectorAll('#'+toggleId+' button').forEach(function(b,i) {
    b.classList.toggle('active', isLog ? i===1 : i===0);
  });
}
</script>

    let h = '<div style="margin:8px 12px;border-radius:8px;padding:12px;background:rgba(0,82,204,0.04);border:1.5px solid rgba(0,82,204,0.15)">';
    h += '<div style="font-size:11px;font-weight:700;color:#0052cc;margin-bottom:8px">🔄 リバランス差分</div>';
    if(diff.added&&diff.added.length>0){
      h += '<div style="font-size:9px;font-weight:700;color:#00c853;margin:6px 0 3px">▲ 新規購入 ('+diff.added.length+'件)</div>';
      diff.added.forEach(a=>{h += '<div style="padding:2px 0;font-size:10px"><b style="color:#00c853">'+a.ticker+'</b> <span style="color:var(--text-sub)">'+( a.theme||'')+'</span> <span style="font-family:monospace">$'+(a.price||0).toFixed(2)+'</span></div>';});
    }
    if(diff.removed&&diff.removed.length>0){
      h += '<div style="font-size:9px;font-weight:700;color:#ff1744;margin:6px 0 3px">▼ 売却 ('+diff.removed.length+'件)</div>';
      diff.removed.forEach(a=>{h += '<div style="padding:2px 0;font-size:10px"><b style="color:#ff1744">'+a.ticker+'</b> <span style="color:var(--text-sub)">'+(a.theme||'')+'</span></div>';});
    }
    if(diff.unchanged&&diff.unchanged.length>0){
      h += '<div style="font-size:9px;font-weight:700;color:var(--text-sub);margin:6px 0 3px">= 継続保有 ('+diff.unchanged.length+'件)</div>';
      diff.unchanged.forEach(a=>{h += '<div style="padding:2px 0;font-size:10px;color:var(--text-sub)">'+a.ticker+' <span style="font-size:9px">'+(a.theme||'')+'</span></div>';});
    }
    h += '<div style="font-size:8px;color:var(--text-sub);margin-top:6px">前回: '+(diff.prev_date||'初回')+'</div>';
    h += '</div>';
    el.innerHTML = h;
  } catch(e) { console.warn('rebal diff error:', e); }
})();
</script>
<script>
window._rqCcy='USD';window._rqFx=150;
function setRQCcy(c){
  window._rqCcy=c;
  document.getElementById('rqSegUSD').classList.toggle('active',c==='USD');
  document.getElementById('rqSegJPY').classList.toggle('active',c==='JPY');
  document.getElementById('rqCcySign').textContent=c==='USD'?'$':'¥';
  const cap=document.getElementById('rqCapital');
  if(c==='JPY'){cap.value=Math.round(parseFloat(cap.value.replace(/,/g,''))*window._rqFx).toLocaleString();}
  else{cap.value=Math.round(parseFloat(cap.value.replace(/,/g,''))/window._rqFx).toLocaleString();}
  calcRQ();
}
function fetchRQFx(){
  const dot=document.getElementById('rqFxDot');const time=document.getElementById('rqFxTime');
  const icon=document.getElementById('rqFxIcon');const rate=document.getElementById('rqFxRate');
  dot.style.background='#BA7517';time.textContent='取得中...';icon.style.transform='rotate(360deg)';
  fetch('https://api.exchangerate-api.com/v4/latest/USD').then(r=>r.json()).then(d=>{
    window._rqFx=d.rates?.JPY||150;rate.textContent='¥'+window._rqFx.toFixed(2);
    dot.style.background='#1D9E75';const now=new Date();
    time.textContent=now.getHours()+':'+String(now.getMinutes()).padStart(2,'0')+'取得';
    icon.style.transform='rotate(0deg)';calcRQ();
  }).catch(()=>{dot.style.background='#E24B4A';time.textContent='取得失敗';icon.style.transform='rotate(0deg)';});
}
function switchRQTab(tab){
  document.querySelectorAll('#rqMain .strat-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('#rqMain .strat-panel').forEach(p=>p.classList.remove('active'));
  document.querySelector(`[onclick="switchRQTab('${tab}')"]`).classList.add('active');
  document.getElementById('rqTab'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
}
function calcRQ(){
  const picks=window._prismRQ_picks;if(!picks)return;
  const rawCap=parseFloat(document.getElementById('rqCapital').value.replace(/,/g,''))||0;
  const fx=window._rqFx||150;
  const capUSD=window._rqCcy==='JPY'?rawCap/fx:rawCap;
  const fmtD=v=>'$'+v.toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0});
  const fmtY=v=>'¥'+Math.round(v*fx).toLocaleString();
  function buildTab(bodyId,sumId,weightKey,priceKey,tickerKey,color){
    let html='';let totalInv=0;
    picks.forEach(p=>{
      const pr=p[priceKey]||p.price;if(!pr)return;
      const w=p[weightKey]||0.10;const tk=p[tickerKey]||p.ticker;
      const amt=capUSD*w;const shares=Math.floor(amt/pr);const inv=shares*pr;
      const realPct=capUSD>0?(inv/capUSD)*100:0;totalInv+=inv;
      html+=`<tr><td><b style="color:${color}">${tk}</b></td><td style="font-size:9px">${p.theme}</td>`;
      html+=`<td class="num" style="font-weight:700;color:${color}">${(w*100).toFixed(1)}%</td>`;
      html+=`<td class="num">$${pr.toLocaleString()}</td>`;
      html+=`<td class="num"><span class="shares">${shares}株</span> <span class="dev ${realPct-w*100>=0?'pos':'neg'}">実${realPct.toFixed(1)}%</span></td></tr>`;
    });
    document.getElementById(bodyId).innerHTML=html;
    const res=capUSD-totalInv;const resPct=capUSD>0?(res/capUSD)*100:0;
    let sh=`<div class="prod-summary"><span style="color:${color}">投資額 <b>${fmtD(totalInv)}</b>`;
    if(window._rqCcy==='JPY')sh+=` (${fmtY(totalInv)})`;
    sh+=`</span><span>余り <b style="color:${resPct>15?'var(--red)':'var(--text-main)'}"> ${fmtD(res)} (${resPct.toFixed(1)}%)</b></span></div>`;
    document.getElementById(sumId).innerHTML=sh;
  }
  buildTab('rqBodyEw','rqSumEw','def_weight','price','ticker','var(--purple)');
  buildTab('rqBodyDef','rqSumDef','def_weight','def_price','def_ticker','#228B22');
  const convEl=document.getElementById('rqConvDisplay');
  if(convEl){if(window._rqCcy==='USD')convEl.textContent='≈ ¥'+Math.round(rawCap*fx).toLocaleString();else convEl.textContent='≈ $'+Math.round(rawCap/fx).toLocaleString();}
}
setTimeout(()=>{fetchRQFx();if(window._prismRQ_picks)setTimeout(calcRQ,1500);},300);
</script>
</body>
</html>
