<body>
<div style="padding:16px 12px 4px;text-align:center">
  <div style="font-size:20px;font-weight:900;letter-spacing:1px">PRISM-<span style="color:var(--purple)">RQ</span></div>

</div>
<div id="rqMain"><div style="padding:40px;text-align:center;color:var(--text-sub)">Loading...</div></div>
<script>
const _v='?t='+Date.now();
Promise.all([
  fetch('/api/prism-r/shadow_comparison.json'+_v).then(r=>r.json()),
  fetch('/api/prism-r/meta.json'+_v).then(r=>r.json())
]).then(([comp,meta])=>{
  let h='';
  const pct=v=>(v*100).toFixed(1)+'%';
  const cl=v=>v>0?'pos':'neg';

  // === 1. Status Card ===
  h+=`<div style="margin:8px 12px;border-radius:8px;padding:14px;text-align:center;background:rgba(124,58,237,0.06);border:2px solid var(--purple)">`;
  h+=`<div style="font-size:20px;font-weight:900;letter-spacing:2px;color:var(--purple)">PRISM-RQ: ${meta.status||'SHADOW'}</div>`;
  h+=`<div style="font-size:10px;color:var(--text-sub);margin-top:4px">${comp.snapshot_date} | ${comp.version}</div>`;
  h+=`</div>`;

  // === 2. Portfolio: PRISM-RQ 10 Picks ===
  h+=`<div class="section-title">ūüďä PRISM-RQ „ÉĚ„Éľ„Éą„Éē„ā©„É™„ā™</div>`;
  h+=`<div class="card"><div class="card-title" style="color:var(--purple)">SNRb √ó BFM-v2 ‚ÄĒ 10ťäėśüĄ √ó 10%Á≠Č„ā¶„āß„ā§„Éą</div>`;
  h+=`<table class="tbl"><tr><th>#</th><th>„ÉÜ„Éľ„Éě</th><th>ťäėśüĄ</th><th>BFM-v2</th><th>CRA</th></tr>`;
  comp.comparisons.forEach((c,i) => {
    const snrb = c.snrb_pick || '‚ÄĒ';
    const inBfm2 = c.in_bfm2 ? '<span class="badge" style="background:rgba(0,200,83,0.1);color:var(--green)">‚úÖ</span>' : '<span class="badge" style="background:rgba(255,23,68,0.1);color:var(--red)">vetoed</span>';

    const craLabel = craScore !== undefined ? (craScore >= 0.8 ? `<span class="pos">${craScore.toFixed(2)}</span>` : craScore >= 0.5 ? craScore.toFixed(2) : `<span class="neg">${craScore.toFixed(2)}</span>`) : '‚ÄĒ';

  // === 3. Theme detail accordions ===

    [['SNRb Score', snrbStock.score_snrb],['őĪ63', snrbStock.alpha63],['Resid Vol', snrbStock.resid_vol63]].forEach(([l,v])=>{
      h+=`<div style="padding:3px 5px;border-radius:3px;background:rgba(124,58,237,0.05)"><div style="font-size:7px;color:var(--text-sub)">${l}</div><div style="font-weight:700">${v!==null&&v!==undefined?v:'‚ÄĒ'}</div></div>`;
    });

    [['ő≤63', snrbStock.beta63],['R¬≤', snrbStock.r2_63],['Shrink', snrbStock.shrink]].forEach(([l,v])=>{

      h+=`<div>Á¨¶ŚŹ∑3M=${cra.c1_sign3m?'‚úÖ':'‚ĚĆ'} Á¨¶ŚŹ∑6M=${cra.c2_sign6m?'‚úÖ':'‚ĚĆ'} ŚģČŚģö=${cra.c3_st_stable?'‚úÖ':'‚ĚĆ'} t3M=${cra.c4_tval3m?'‚úÖ':'‚ĚĆ'} t6M=${cra.c5_tval6m?'‚úÖ':'‚ĚĆ'}</div>`;
      h+=`<div style="color:var(--text-sub);margin-top:2px">st_őĪ3M=${cra.st_alpha_3m} t=${cra.st_tval_3m} | st_őĪ6M=${cra.st_alpha_6m} t=${cra.st_tval_6m}</div>`;
      h+=`</div>`;
    }
    h+=`</div></div>`;

  // === 4. Theme Correlation Budget ===
  const cd = comp.correlation_diagnostics || {};

    h+=`<div style="font-size:7px;color:var(--text-sub);margin-top:6px">ťĖĺŚÄ§: effective_n<4 / max_corr>0.85 / high_pairs>10%</div>`;
    h+=`</div>`;
  }

  // === 5. BFM-v2 Quality Filter ===
  const bfm2Count = comp.summary?.bfm2_themes || 0;
  const bfm2Vetoed = comp.summary?.bfm2_vetoed || 0;
  const vetoedThemes = comp.comparisons ? comp.comparisons.filter(c=>!c.in_bfm2).map(c=>c.theme_name||c.theme) : [];
  h+=`<div class="card">`;
  h+=`<div class="card-title">ūüõ°ÔłŹ BFM-v2 ŚďĀŤ≥™„Éē„ā£„Éę„āŅ</div>`;
  h+=`<div style="font-size:10px">„ÉÜ„Éľ„ÉěÁĒüŚ≠ė: <b>${bfm2Count}/10</b> | ŚÄôŤ£ú„Āč„āČvetoed: <b>${bfm2Vetoed}/25</b></div>`;
  h+=`<div style="font-size:8px;color:var(--text-sub);margin-top:3px">śĚ°šĽ∂: breadth<30pct / concentration>80pct / vol>80pct</div>`;
  if(vetoedThemes.length>0) h+=`<div style="font-size:8px;color:var(--red);margin-top:3px">ťô§Ś§Ė„ÉÜ„Éľ„Éě: ${vetoedThemes.join(', ')}</div>`;
  // Quality features for surviving themes
  const qf = comp.bfm2_quality_features || {};
  const qfEntries = Object.entries(qf).filter(([,v])=>v);

    h+=`<table class="tbl" style="margin-top:6px"><tr><th>„ÉÜ„Éľ„Éě</th><th>Breadth</th><th>Conc.</th><th>Vol</th></tr>`;

    h+=`</table>`;
  }
  h+=`</div>`;

  // === 6. Dip Sleeve ===

  const dipAlerts = comp.dip_sleeve_diagnostics || [];

    const nQ = dipSum.qualified || 0;
    h+=`<div class="card" style="border-color:${nQ>0?'#d97706':'rgba(0,0,0,0.06)'};${nQ>0?'background:rgba(217,119,6,0.04)':''}">`;
    h+=`<div class="card-title" style="color:${nQ>0?'#d97706':'var(--text-main)'}">ūüďČ Dip Sleeve ‚ÄĒ ${nQ}/${dipSum.total_alerts} qualified</div>`;
    if(nQ>0) {
      h+=`<table class="tbl"><tr><th>„ÉÜ„Éľ„Éě</th><th>Dip</th><th>WR</th><th>n</th><th>Window</th><th>State</th></tr>`;
      const seen = new Set();
      dipAlerts.filter(a=>a.qualified).forEach(a=>{
        const key=a.theme+a.window; if(seen.has(key)) return; seen.add(key);
        h+=`<tr><td>${a.theme}</td><td class="neg">${pct(a.dip)}</td><td>${(a.win_rate*100).toFixed(0)}%</td><td>${a.sample_n}</td><td>${a.window}</td><td style="color:#d97706">${a.trend_state}</td></tr>`;

      h+=`</table>`;
    }
    h+=`<div style="font-size:7px;color:var(--text-sub);margin-top:3px">śĚ°šĽ∂: ENTRY/WATCH + win_rate‚Č•60% + n‚Č•20 + window‚ąą{1M,1-2M,2-3M} + days‚Č§60</div>`;
    h+=`</div>`;
  }

  // === 7. Architecture ===
  h+=`<div class="section-title">ūüďź PRISM-RQ „āĘ„Éľ„ā≠„ÉÜ„āĮ„ÉĀ„É£</div>`;
  const archItems = [
    ["śßčťÄ†ś¶āŤ¶Ā",`<div style="padding:6px;background:rgba(124,58,237,0.04);border-radius:4px;margin-bottom:6px;font-size:10px;line-height:1.6"><b>PRISM-RQ</b> = BFM-v2ÔľąLayer 1ŚďĀŤ≥™„Éē„ā£„Éę„āŅÔľČ+ A5-SNRbÔľąLayer 2śģčŚ∑ģSNRÔľČ<br>R = ResidualÔľąśģčŚ∑ģ„ÉĘ„É°„É≥„āŅ„É†ÔľČ / Q = QualityÔľąŚďĀŤ≥™„Éē„ā£„Éę„āŅÔľČ</div><div style="font-size:10px;line-height:1.6"><b>Layer 1:</b> „ÉÜ„Éľ„Éě„āĻ„ā≥„āĘšłäšĹć25 ‚Üí BFM-v2 vetoÔľąbreadth/concentration/volÔľČ‚Üí šłäšĹć10<br><b>Layer 2:</b> ŚźĄ„ÉÜ„Éľ„Éě„Āč„āČSNRb„āĻ„ā≥„āĘśúÄŚ§ß„Āģ1ťäėśüĄ„āíťĀłŚģö<br><b>Layer 3:</b> 10ťäėśüĄ √ó Á≠Č„ā¶„āß„ā§„Éą √ó 20ŚĖ∂ś•≠śó•„É™„Éź„É©„É≥„āĻ</div>`],
    ["Layer 1: „ÉÜ„Éľ„ÉěťĀłŚģö + BFM-v2",`<div style="font-size:10px;line-height:1.6"><code>theme_score = 0.70√órank(mom63) + 0.30√órank(decel)</code><br>šłäšĹć25„ÉÜ„Éľ„Éě„āíšĽģŚÄôŤ£ú ‚Üí ŚďĀŤ≥™„Éē„ā£„Éę„āŅ„Āßťô§Ś§Ė:<br>‚ÄĘ breadth63 < ŚÄôŤ£úÁĺ§ŚÜÖšłčšĹć30%<br>‚ÄĘ concentration63 > ŚÄôŤ£úÁĺ§ŚÜÖšłäšĹć20%<br>‚ÄĘ theme_vol63 > ŚÄôŤ£úÁĺ§ŚÜÖšłäšĹć20%<br>‚Üí śģč„āä„Āč„āČscoreť†Ü„Āę10„ÉÜ„Éľ„Éěśé°ÁĒ®Ôľąsector_cap=3ÔľČ</div>`],
    ["Layer 2: A5-SNRb ťäėśüĄťĀłŚģö",`<div style="font-size:10px;line-height:1.6"><b>OLSŚõěŚłįÔľą63śó•„ÄĀŤá™Ś∑Īťô§Ś§ĖÔľČ:</b><br><code>r_i(d) = őĪ + ő≤ √ó r_theme_ex_self(d) + őĶ</code><br><b>„āĻ„ā≥„āĘ:</b><br><code>SNRb = (őĪ_cum63 / resid_vol63) √ó shrink(r¬≤)</code><br><b>shrink(r¬≤):</b> r¬≤&lt;0.10‚Üí2r¬≤ | 0.10-0.50‚ÜíÁ∑öŚĹĘ | &gt;0.50‚Üí1.0<br>ŚźĄ„ÉÜ„Éľ„Éě„Āč„āČ„āĻ„ā≥„āĘśúÄŚ§ß1ťäėśüĄ„āíťĀłŚģö„ÄāťáćŤ§áÁ¶Āś≠Ę„Äā</div>`],
    ["ÁĶĪś≤Ľ„É¨„ā§„É§„ÉľÔľąŤ®ļśĖ≠šł≠ÔľČ",`<div style="font-size:10px;line-height:1.6"><b>Theme Correlation Budget:</b> „ÉÜ„Éľ„ÉěťĖďÁõłťĖĘ„āíÁõ£Ť¶Ė„Äāeffective_n < 4„ĀßŤ≠¶ŚĎä„Äā<br><b>CRA-v1:</b> stock-themes„ĀģőĪ/tŚÄ§„ĀßŚ§ĖťÉ®Áõ£śüĽÔľąÁ¨¶ŚŹ∑ÁĘļŤ™ć„Āģ„ĀŅÔľČ„Äāparked„Äā<br><b>Dip Sleeve:</b> šł≠śúüšłäśėá„ÉÜ„Éľ„Éě„Āģśäľ„ĀóÁõģŚÜćŚŹāŚÖ•ŚÄôŤ£ú„āíÁõ£Ť¶Ė„Äā<br><b>Continuity Filter:</b> „āĻ„ÉĎ„Éľ„āĮ„É©„ā§„É≥śĽĎ„āČ„Āč„Āē + Ś§öśúüťĖďőĪśēīŚźąśÄß„Äādiagnostic„Äā<br><b>Vol Overlay:</b> realized_vol vs target_vol(25%)„Äādiagnostic„Äā</div>`],
  ];
  archItems.forEach(([title,body])=>{
    h+=`<div class="accordion" onclick="this.classList.toggle('open')"><div class="acc-hdr">${title}<span class="acc-icon">‚Ė∂</span></div><div class="acc-body">${body}</div></div>`;
  });

  // === 8. BT Comparison Tables ===
  h+=`<div class="section-title">ūüĒ¨ Historical BTÔľąPITśĪöśüďŚŹāŤÄÉŚÄ§ÔľČ</div>`;
  // SNRb vs A5-lite
  h+=`<div class="card"><div class="card-title">A5-SNRb vs BaseÔľąLayer 2Ś∑ģŚąÜÔľČ</div>`;
  h+=`<table class="tbl"><tr><th>śĆáś®ô</th><th>Base+SNRb</th><th>Ś∑ģ vs A5-lite</th><th>Śą§Śģö</th></tr>`;
  const snrbBT = [
    ['CAGR','57.5%','-9.5pt','‚ĚĆ'],['Vol','39.3%','-3.6pt','‚úÖ'],['Sharpe','1.461','-0.098','‚ĚĆ'],
    ['Calmar','1.551','-0.043','‚ĚĆ'],['MaxDD','-37.1%','+4.9pt','‚úÖ'],['Top5ťõÜšł≠','-','-4.2pt','‚úÖ']
  ];
  snrbBT.forEach(([m,v,d,j])=>{ h+=`<tr><td>${m}</td><td>${v}</td><td>${d}</td><td>${j}</td></tr>`; });
  h+=`</table>`;
  h+=`<div style="font-size:8px;color:var(--text-sub);margin-top:4px">A5-SNRb = primary research-shadow„ÄāŚÖłŚěčśúą„Āß„ĀĮA5-lite„ĀĆŚĄ™šĹć„Ā†„ĀĆ„ÄĀťõÜšł≠Śļ¶„ÉĽMaxDD„āíśĒĻŚĖĄ„Äā</div>`;
  h+=`</div>`;

  // BFM-v2 vs Base
  h+=`<div class="card"><div class="card-title">BFM-v2 + SNRb vs Base + SNRbÔľąLayer 1Ś∑ģŚąÜÔľČ</div>`;
  h+=`<table class="tbl"><tr><th>śĆáś®ô</th><th>Base+SNRb</th><th>BFM-v2+SNRb</th><th>Ś∑ģ</th><th>Śą§Śģö</th></tr>`;
  const bfmBT = [
    ['CAGR','57.8%','43.8%','-14.0pt','‚ĚĆ'],['Vol','39.3%','27.4%','-12.0pt','‚úÖ'],
    ['Sharpe','1.471','1.601','+0.130','‚úÖ‚úÖ'],['Calmar','1.561','1.829','+0.269','‚úÖ‚úÖ'],
    ['MaxDD','-37.1%','-23.9%','+13.1pt','‚úÖ‚úÖ']
  ];
  bfmBT.forEach(([m,v1,v2,d,j])=>{ h+=`<tr><td>${m}</td><td>${v1}</td><td>${v2}</td><td>${d}</td><td>${j}</td></tr>`; });
  h+=`</table>`;
  h+=`<div style="font-size:8px;color:var(--text-sub);margin-top:4px">BFM-v2 = Sharpe/Calmar/MaxDDśĒĻŚĖĄ„āíťĀĒśąź„Āó„ĀüŚąĚ„ĀģŚÄôŤ£ú„Äārisk-managed alternativeÔľąreplacement„Āß„ĀĮ„Ā™„ĀĄÔľČ„Äā</div>`;
  h+=`</div>`;

  // === 9. Forward Clock ===
  h+=`<div style="margin:8px 12px;font-size:10px;font-weight:700;color:var(--text-main)">Forward Clock</div>`;
  h+=`<div class="card">`;
  h+=`<div style="font-size:9px;color:var(--text-sub)">A5-SNRb: 2026-04-09ťĖčŚßč | BFM-v2: 2026-04-10ťĖčŚßč</div>`;
  h+=`<div style="background:rgba(0,0,0,0.04);border-radius:4px;height:10px;overflow:hidden;margin:6px 0">`;
  h+=`<div style="height:100%;width:0%;border-radius:4px;background:var(--purple)"></div></div>`;
  h+=`<div style="display:flex;justify-content:space-between;font-size:8px;color:var(--text-sub)"><span>0/18 rebalances</span><span>Pilot: 12 | Review: 18 | Confirm: 24</span></div>`;
  h+=`</div>`;

  // === 10. Experimental Diagnostics ===
  const contDiag = comp.continuity_diagnostics || [];
  const volDiag = comp.vol_overlay_diagnostics || {};
  if (contDiag.length > 0 || volDiag.realized_vol_20d) {
    h+=`<div class="section-title" style="color:var(--text-sub)">ūüß™ Experimental Diagnostics</div>`;
    h+=`<div style="margin:4px 12px;padding:8px 10px;border-radius:6px;border:1px dashed rgba(0,0,0,0.15);background:var(--card-bg);font-size:8px;color:var(--text-sub)">`;
    h+=`<div style="font-size:7px;margin-bottom:4px">‚ö† Ť®ļśĖ≠„Āģ„ĀŅÔľąťĀłŚģö„ÉĽgross„ĀęŚĹĪťüŅ„Ā™„Āó / ENABLE=FalseÔľČ</div>`;
    if (contDiag.length > 0) {
      h+=`<div style="font-weight:700;margin-bottom:3px;color:var(--text-main);font-size:9px">Continuity Filter</div>`;
      h+=`<table class="tbl" style="font-size:8px"><tr><th>Theme</th><th>Tick</th><th>Sign</th><th>Mono</th><th>Jump</th><th>őĪ+</th></tr>`;
      contDiag.forEach(c => {
        const sc=c.sign_consistency; const ap=c.alpha_sign_positive;
        const warn=(sc&&sc<0.4)||(ap!==undefined&&ap<4);
        h+=`<tr style="color:${warn?'var(--red)':'inherit'}"><td>${c.theme||''}</td><td>${c.ticker||''}</td>`;
        h+=`<td>${sc!==undefined?sc.toFixed(2):'‚ÄĒ'}</td><td>${c.monotonic_ratio!==undefined?c.monotonic_ratio.toFixed(2):'‚ÄĒ'}</td>`;
        h+=`<td>${c.jumpiness!==undefined?c.jumpiness.toFixed(1):'‚ÄĒ'}</td><td>${ap!==undefined?ap+'/7':'‚ÄĒ'}</td></tr>`;
      });
      h+=`</table>`;
    }
    if (volDiag.realized_vol_20d) {
      h+=`<div style="font-weight:700;margin:6px 0 3px;color:var(--text-main);font-size:9px">Vol Overlay</div>`;
      const wr=volDiag.would_reduce;
      h+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px">`;
      [['Vol 20d',(volDiag.realized_vol_20d*100).toFixed(1)+'%',volDiag.realized_vol_20d>0.30],
       ['Vol 63d',(volDiag.realized_vol_63d*100).toFixed(1)+'%',volDiag.realized_vol_63d>0.30],
       ['Gross Scale',volDiag.gross_scale_20d.toFixed(2),wr]
      ].forEach(([l,v,a])=>{
        h+=`<div style="padding:3px 5px;border-radius:3px;background:${a?'rgba(239,68,68,0.08)':'rgba(0,0,0,0.03)'}">`;
        h+=`<div style="font-size:7px">${l}</div><div style="font-weight:700;color:${a?'var(--red)':'var(--text-main)'}"> ${v} ${a?'‚ö†':'‚úÖ'}</div></div>`;
      });
      h+=`</div>`;
      if(wr) h+=`<div style="font-size:7px;color:var(--red);margin-top:2px">target 25%Ť∂ÖťĀé ‚Üí gross ${(volDiag.gross_scale_20d*100).toFixed(0)}%„ĀęÁłģŚįŹÁ§ļŚĒÜ</div>`;
    }
    h+=`</div>`;
  }

  // === 11. Labels ===
  h+=`<div class="section-title" style="color:var(--text-sub)">ūüŹ∑ÔłŹ ŚÖ¨ŚľŹ„É©„Éô„Éę</div>`;
  h+=`<div style="margin:4px 12px;padding:8px;border-radius:6px;background:var(--card-bg);font-size:8px;line-height:1.6;color:var(--text-sub)">`;
  h+=`A5-SNRb: primary research-shadow (residual-SNR)<br>`;
  h+=`BFM-v2: risk-managed Layer 1 alternative (quality filter)<br>`;
  h+=`CRA-v1: implemented, parked (Ś∑ģÁēįŚĺģŚįŹ)<br>`;
  h+=`Continuity: diagnostic only, ENABLE=False<br>`;
  h+=`Vol Overlay: diagnostic only, ENABLE=False`;
  h+=`</div>`;

  document.getElementById('rqMain').innerHTML=h;
}).catch(err=>{document.getElementById('rqMain').innerHTML=`<p style="color:red;padding:20px">Error: ${err.message}</p>`;});
