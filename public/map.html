<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>マップ | 米国株テーマトラッカー</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <div class="header-top">
      <div class="header-title">テーママップ</div>
    </div>
  </header>
  <main id="mapMain" style="padding:12px"></main>
  <nav class="bottom-nav">
    <a class="nav-item" href="/"><span class="nav-icon">🏠</span>ホーム</a>
    <a class="nav-item active" href="/map"><span class="nav-icon">🗺</span>マップ</a>
    <a class="nav-item" href="/market-movers"><span class="nav-icon">📈</span>銘柄</a>
    <a class="nav-item" href="/infographic"><span class="nav-icon">🌐</span>マクロテーマ</a>
    <a class="nav-item" href="/mypage"><span class="nav-icon">👤</span>ログイン</a>
  </nav>
  <script>
const CATS = {
  "セクター": ["XLB","XLC","XLE","XLF","XLI","XLK","XLP","XLRE","XLU","XLV","XLY"],
  "スタイル": ["IJH","IJJ","IJK","IVE","IVW","IWM","IWN","IWO","QQQ","RSP","SPY"],
  "コモディティ": ["CPER","GLD","SLV","UNG","USO"],
  "金利": ["HYG","IEF","IEI","MBB","SHV","SHY","TLH","TLT"]
};
fetch("/api/theme_ranking.json").then(r=>r.json()).then(data=>{
  const etfs = (data.all_themes||[]).filter(t=>t.isETF);
  const fmt = v => v==null?"—":(v>=0?"+":"")+((v*100).toFixed(1))+"%";
  let h = "";
  for (const [cat, tickers] of Object.entries(CATS)) {
    h += '<div class="section-label">' + cat + '</div>';
    tickers.forEach(tk => {
      const e = etfs.find(x=>x.name===tk);
      if (!e) return;
      const r1d = e["1日"], r1m = e["1ヶ月"], r1y = e["1年"];
      const dir = (r1d||0)>=0?"up":"down";
      h += '<div class="theme-item '+dir+'"><div class="theme-item-row">';
      h += '<div class="rank '+dir+'">'+tk.substring(0,2)+'</div>';
      h += '<div class="theme-name"><div class="theme-name-primary">'+tk+'</div></div>';
      h += '<div class="return-cell"><div class="return-value '+(dir==="up"?"positive":"negative")+'">'+fmt(r1d)+'</div>';
      h += '<div class="return-sub">'+fmt(r1y)+' /1Y</div></div>';
      h += '<div class="chevron">›</div></div></div>';
    });
  }
  document.getElementById("mapMain").innerHTML = h;
});
  </script>
</body>
</html>
