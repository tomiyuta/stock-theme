<body>

  <nav class="bottom-nav">

    <a class="nav-item active" href="/map"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"/></svg></span>マップ</a>
    <a class="nav-item" href="/market-movers"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span>銘柄</a>
    <a class="nav-item" href="/infographic"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15 15 0 014 10 15 15 0 01-4 10 15 15 0 01-4-10 15 15 0 014-10z"/></svg></span>マクロ</a>
      <a class="nav-item" href="/prism"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/><line x1="12" y1="22" x2="12" y2="8.5"/><line x1="22" y1="8.5" x2="2" y2="8.5"/></svg></span>PRISM</a>
      <a class="nav-item" href="/prism-r"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/><circle cx="12" cy="12" r="3"/></svg></span><span style="color:#7c3aed">R</span></a>
      <a class="nav-item" href="/prism-rq"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg></span><span style="color:#7c3aed">RQ</span></a>

  </nav>
  <script>
let period="1日",cat="sector";
const PL={"1日":"1D","5日":"5D","10日":"10D","1ヶ月":"1M","2ヶ月":"2M","3ヶ月":"3M","半年":"6M","1年":"1Y"};
const CATS={
  sector:{label:"セクター",items:["XLB","XLC","XLE","XLF","XLI","XLK","XLP","XLRE","XLU","XLV","XLY"]},
  style:{label:"スタイル",items:["IJH","IJJ","IJK","IVE","IVW","IWM","IWN","IWO","QQQ","RSP","SPY"]},
  commodity:{label:"コモディティ",items:["CPER","GLD","SLV","UNG","USO"]},
  bond:{label:"金利",items:["HYG","IEF","IEI","MBB","SHV","SHY","TLH","TLT"]},
  crypto:{label:"暗号資産",items:["IBIT"]},
  country:{label:"国別",items:["EWJ","MCHI","INDA","EWZ","EWY","EWT","EWU","EZU","EWC","EWA"]}
};
const NAMES={XLB:"素材",XLC:"通信",XLE:"エネルギー",XLF:"金融",XLI:"資本財",XLK:"テクノロジー",XLP:"生活必需品",XLRE:"不動産",XLU:"公益",XLV:"ヘルスケア",XLY:"一般消費財",SPY:"S&P500",QQQ:"NASDAQ100",IWM:"小型株",RSP:"均等加重",GLD:"金",SLV:"銀",USO:"原油",UNG:"天然ガス",CPER:"銅",TLT:"長期国債",IEF:"中期国債",SHY:"短期国債",HYG:"ハイイールド",IBIT:"ビットコイン",EWJ:"日本",MCHI:"中国",INDA:"インド",EWZ:"ブラジル",EWY:"韓国"};
let allEtfs=[];
const fmt=v=>v==null?"—":(v>=0?"+":"")+((v*100).toFixed(1))+"%";
function tileColor(v){if(v==null)return"#aaa";const a=Math.min(Math.abs(v*100)/5,1);if(v>=0){const r=Math.round(102-102*a),g=Math.round(187-37*a),b=Math.round(106-106*a);return`rgb(${r},${g},${b})`}else{const r=Math.round(239-41*a),g=Math.round(83-83*a),b=Math.round(80-80*a);return`rgb(${r},${g},${b})`}}
fetch("/api/theme_ranking.json?t="+Date.now()).then(r=>r.json()).then(data=>{
  allEtfs=(data.all_themes||[]).filter(t=>t.isETF);
  const periods=(data.all_periods||[]).filter(p=>p!=="日中");
  document.getElementById("pbar").innerHTML=periods.map(p=>'<button class="period-btn'+(p===period?" active":"")+'" onclick="setP(this,\''+p+'\')">'+((PL[p])||p)+'</button>').join("");
  document.getElementById("catFilter").innerHTML=Object.entries(CATS).map(([k,v])=>'<label class="rf"><input type="radio" name="mc" value="'+k+'"'+(k===cat?" checked":"")+'><span>'+v.label+'</span></label>').join("");
  document.querySelectorAll('input[name="mc"]').forEach(r=>r.addEventListener("change",function(){cat=this.value;renderMap()}));
  renderMap();
});
function setP(btn,p){period=p;document.querySelectorAll(".period-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");renderMap()}
function renderMap(){
  const items=CATS[cat]?.items||[];
  const tiles=items.map(tk=>{const e=allEtfs.find(x=>x.name===tk);return{tk,name:NAMES[tk]||tk,ret:e?e[period]:null}}).sort((a,b)=>(b.ret||0)-(a.ret||0));
  document.getElementById("mapMain").innerHTML='<div class="map-viewport">'+tiles.map(t=>'<div class="map-tile" style="background:'+tileColor(t.ret)+'" onclick="window.open(\'https://finance.yahoo.com/quote/'+t.tk+'\',\'_blank\')"><div class="map-tile-name">'+t.name+'</div><div class="map-tile-change">'+fmt(t.ret)+'</div><div style="font-size:9px;color:rgba(255,255,255,0.7);margin-top:2px">'+t.tk+'</div></div>').join("")+'</div>';
}
  </script>
<script>
(async()=>{try{const r=await fetch('/api/theme_ranking.json?t='+Date.now());const d=await r.json();
const el=document.getElementById('headerMeta');if(el&&d.last_update){
el.innerHTML=(el.innerHTML||'')+
'<div class="last-updated">データ更新: '+d.last_update+'</div>';}
}catch(e){}})();
</script>
</body>
</html>
