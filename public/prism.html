<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PRISM | 米国株テーマトラッカー</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#ffffff">
  <link rel="stylesheet" href="/styles.css?v=20">
<style>
:root{--text-main:#1a1a2e;--text-sub:#6b7280;--bg:#fff;--card-bg:#f8f9fb;--green:#00c853;--red:#ff1744;--blue:#0052cc;--gold:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',-apple-system,sans-serif;background:var(--bg);color:var(--text-main);padding-bottom:80px}
.prism-header{padding:16px 12px 8px;text-align:center}
.prism-title{font-size:18px;font-weight:900;letter-spacing:1px}
.prism-sub{font-size:10px;color:var(--text-sub);margin-top:2px}
.prism-badge{display:inline-block;font-size:9px;padding:2px 6px;border-radius:3px;background:rgba(0,82,204,0.08);color:var(--blue);font-weight:700;margin-top:4px}
</style>
<style>
.gate-card{margin:8px 12px;border-radius:8px;padding:14px;text-align:center}
.gate-card.open{background:rgba(0,200,83,0.1);border:2px solid var(--green)}
.gate-card.mid{background:rgba(255,167,38,0.1);border:2px solid #ffa726}
.gate-card.closed{background:rgba(255,23,68,0.1);border:2px solid var(--red)}
.gate-state{font-size:20px;font-weight:900;letter-spacing:2px}
.gate-card.open .gate-state{color:var(--green)}.gate-card.mid .gate-state{color:#ffa726}.gate-card.closed .gate-state{color:var(--red)}
.gate-detail{font-size:10px;color:var(--text-sub);margin-top:4px}
.gate-atk{font-size:12px;font-weight:700;margin-top:6px}
.regime-row{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin:6px 12px}
.regime-box{border-radius:4px;padding:5px;text-align:center;background:var(--card-bg);border:1px solid rgba(0,0,0,0.06)}
.regime-label{font-size:8px;color:var(--text-sub);font-weight:600;text-transform:uppercase}
.regime-val{font-size:12px;font-weight:700}
.regime-val.pos{color:var(--green)}.regime-val.neg{color:var(--red)}
.prod-card{margin:8px 12px;border-radius:8px;padding:12px;background:rgba(0,82,204,0.04);border:1.5px solid rgba(0,82,204,0.15)}
.prod-title{font-size:11px;font-weight:700;color:var(--blue);margin-bottom:8px}
.prod-input-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid rgba(0,0,0,0.06)}
.prod-input-label{font-size:10px;font-weight:600;color:var(--text-sub)}
.prod-toggle{display:flex;gap:0;background:rgba(0,0,0,0.04);border-radius:4px;padding:1px}
.prod-toggle-btn{padding:3px 10px;border-radius:3px;font-size:10px;font-weight:600;border:none;cursor:pointer;background:none;color:var(--text-sub)}
.prod-toggle-btn.active{background:var(--blue);color:#fff}
.prod-input{width:90px;padding:3px 6px;border:1px solid rgba(0,0,0,0.12);border-radius:4px;font-size:11px;text-align:right;font-family:monospace}
.prod-fx-btn{font-size:9px;padding:2px 6px;border:1px solid rgba(0,0,0,0.12);border-radius:3px;background:none;cursor:pointer;color:var(--text-sub)}
.prod-table{width:100%;font-size:10px;border-collapse:collapse}
.prod-table th{text-align:left;padding:6px 4px;font-size:9px;font-weight:600;color:var(--text-sub);border-bottom:1px solid rgba(0,0,0,0.1)}
.prod-table td{padding:5px 4px;border-bottom:1px solid rgba(0,0,0,0.04)}
.prod-table .num{text-align:right;font-family:monospace;font-weight:600}
.prod-table .shares{font-size:12px;font-weight:800;color:var(--blue)}
.prod-table .dev{font-size:9px}
.prod-table .dev.neg{color:var(--red)}.prod-table .dev.pos{color:var(--green)}
.prod-summary{margin-top:8px;font-size:10px;display:flex;justify-content:space-between;padding:6px;background:rgba(0,0,0,0.02);border-radius:4px}
.prod-meta{font-size:9px;color:var(--text-sub);margin-top:6px}
</style>
<style>
.signal-pair{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 12px}
@media(max-width:600px){.signal-pair{grid-template-columns:1fr;gap:6px}}
.signal-card{border-radius:6px;padding:10px;min-height:60px}
.signal-card.buy{background:rgba(0,200,83,0.06);border:1px solid rgba(0,200,83,0.25)}
.signal-card.sell{background:rgba(255,23,68,0.06);border:1px solid rgba(255,23,68,0.25)}
.signal-card-title{font-size:11px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.signal-card.buy .signal-card-title{color:var(--green)}.signal-card.sell .signal-card-title{color:var(--red)}
.ss{background:#fff;border-radius:4px;padding:8px;margin:4px 0;border:1px solid rgba(0,0,0,0.05)}
.ss-top{display:flex;align-items:center;justify-content:space-between;gap:4px}
.ss-ticker{font-size:15px;font-weight:800}.ss-price{font-size:14px;font-weight:700}
.ss-company{font-size:10px;color:var(--text-sub);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ss-badges{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
.ss-badge{font-size:8px;padding:1px 4px;border-radius:2px;white-space:nowrap}
.ss-badge.ex{background:rgba(0,0,0,0.04);color:var(--text-sub)}
.ss-badge.sec{background:rgba(0,82,204,0.08);color:var(--blue)}
.ss-badge.idx{background:rgba(0,200,83,0.1);color:var(--green)}
.ss-rets{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin-top:5px}
.ss-ret{text-align:center;font-size:9px;background:rgba(0,0,0,0.02);border-radius:2px;padding:2px 0}
.ss-ret-label{color:var(--text-sub)}.ss-ret-val{font-weight:600;font-size:10px}
.ss-ret-val.pos{color:var(--green)}.ss-ret-val.neg{color:var(--red)}
.ss-vol{font-size:9px;color:var(--text-sub);margin-top:3px;text-align:right}
.signal-empty{font-size:10px;color:var(--text-sub);font-style:italic}
</style>
<style>
.section-title{font-size:12px;font-weight:700;margin:16px 12px 6px;color:var(--text-main)}
.sector-grid{display:flex;flex-wrap:wrap;gap:4px;margin:0 12px}
.sector-chip{font-size:10px;padding:4px 8px;border-radius:4px;font-weight:600}
.sector-chip.pass{background:rgba(0,200,83,0.1);color:var(--green)}
.sector-chip.fail{background:rgba(0,0,0,0.04);color:var(--text-sub)}
.theme-pick{margin:4px 12px;padding:8px;border-radius:4px;background:var(--card-bg);border:1px solid rgba(0,0,0,0.06)}
.theme-pick-name{font-size:12px;font-weight:700}.theme-pick-meta{font-size:9px;color:var(--text-sub)}
.theme-pick-badges{display:flex;gap:3px;margin-top:3px}
.theme-pick-badge{font-size:8px;padding:1px 5px;border-radius:2px}
.tpb-strong{background:rgba(0,200,83,0.1);color:var(--green)}.tpb-accel{background:rgba(245,158,11,0.1);color:var(--gold)}
.stock-pick{font-size:11px;padding:4px 12px;display:flex;justify-content:space-between;border-bottom:1px solid rgba(0,0,0,0.04)}
.trigger-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin:0 12px}
@media(max-width:500px){.trigger-grid{grid-template-columns:repeat(3,1fr)}}
.trigger-box{text-align:center;padding:6px;border-radius:4px;border:1px solid rgba(0,0,0,0.06);background:var(--card-bg)}
.trigger-box.fired{background:rgba(255,23,68,0.08);border-color:rgba(255,23,68,0.3)}
.trigger-label{font-size:8px;color:var(--text-sub);font-weight:600}.trigger-val{font-size:10px;font-weight:700}
.funnel{margin:8px 12px}.funnel-bar{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:10px}
.funnel-fill{height:6px;border-radius:3px;background:var(--green)}.funnel-label{color:var(--text-sub);min-width:130px;text-align:right}.funnel-count{font-weight:700;min-width:30px}
</style>
<style>
.bm-card{margin:8px 12px;border-radius:8px;padding:12px;background:var(--card-bg);border:1px solid rgba(0,0,0,0.06)}
.bm-title{font-size:11px;font-weight:700;color:var(--blue);margin-bottom:8px}
.bm-table{width:100%;font-size:10px;border-collapse:collapse}
.bm-table th{text-align:left;padding:3px 4px;color:var(--text-sub);font-weight:600;border-bottom:1px solid rgba(0,0,0,0.1)}
.bm-table td{padding:3px 4px;border-bottom:1px solid rgba(0,0,0,0.04)}
.bm-table tr.highlight{background:rgba(0,82,204,0.04);font-weight:700}
.bm-table .best{color:var(--green);font-weight:700}
.logic-card{margin:4px 12px;border-radius:6px;border:1px solid rgba(0,0,0,0.06);overflow:hidden}
.logic-card-header{padding:10px 12px;font-size:11px;font-weight:700;cursor:pointer;background:var(--card-bg);display:flex;justify-content:space-between;align-items:center}
.logic-card-body{display:none;padding:10px 12px;font-size:10px;line-height:1.7;color:var(--text-main)}
.logic-card.open .logic-card-body{display:block}
.logic-card.open .lc-icon{transform:rotate(90deg)}
.lc-icon{font-size:9px;transition:transform 0.2s}
.logic-rule{margin:4px 0;padding:4px 8px;background:rgba(0,0,0,0.02);border-radius:3px;font-size:10px}
.logic-table{width:100%;font-size:9px;border-collapse:collapse;margin:6px 0}
.logic-table th,.logic-table td{padding:3px 4px;border-bottom:1px solid rgba(0,0,0,0.06);text-align:left}
.ledger-card{margin:8px 12px;border-radius:8px;padding:12px;background:var(--card-bg);border:1px solid rgba(0,0,0,0.06)}
.ledger-title{font-size:11px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.ledger-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid rgba(0,0,0,0.04);font-size:10px}
.ledger-tk{font-weight:800;font-size:12px;min-width:50px}
.ledger-bar-wrap{flex:1;background:rgba(0,0,0,0.04);border-radius:3px;height:8px;overflow:hidden}
.ledger-bar{height:100%;border-radius:3px;transition:width 0.3s}
.ledger-bar.locked{background:var(--red)}.ledger-bar.unlocked{background:var(--green)}
.ledger-info{font-size:9px;color:var(--text-sub);min-width:80px;text-align:right}
.order-row{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:10px}
.order-action{font-weight:700;font-size:10px;padding:1px 6px;border-radius:3px;min-width:36px;text-align:center}
.order-action.buy{background:rgba(0,200,83,0.1);color:var(--green)}
.order-action.sell{background:rgba(255,23,68,0.1);color:var(--red)}
.order-action.hold{background:rgba(0,0,0,0.04);color:var(--text-sub)}
.health-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin:6px 12px}
.health-box{border-radius:4px;padding:5px;text-align:center;background:var(--card-bg);border:1px solid rgba(0,0,0,0.06)}
.health-label{font-size:8px;color:var(--text-sub);font-weight:600}.health-val{font-size:12px;font-weight:700}
.health-val.ok{color:var(--green)}.health-val.warn{color:var(--gold)}.health-val.bad{color:var(--red)}
</style>
</head>
<body>
<div class="prism-header">
  <div class="prism-title">PRISM</div>
  <div class="prism-sub">Portfolio Regime & Investment Signal Machine</div>
  <div id="prismDate" class="prism-badge">Loading...</div>
</div>
<div id="prismMain"></div>
<script>
const SEC_JA={"Basic Materials":"素材","Communication Services":"通信","Energy":"エネルギー","Financial Services":"金融","Industrials":"資本財","Technology":"テクノロジー","Consumer Defensive":"生活必需品","Real Estate":"不動産","Utilities":"公益","Healthcare":"ヘルスケア","Consumer Cyclical":"一般消費財"};
const fmt=v=>{if(v===null||v===undefined)return"—";const n=Number(v);return isNaN(n)?"—":(n>=0?"+":"")+((n*100).toFixed(1))+"%"};
const _v="?v="+Date.now();
Promise.all([
  fetch("/api/prism/meta.json"+_v).then(r=>r.json()),
  fetch("/api/prism/gate.json"+_v).then(r=>r.json()),
  fetch("/api/prism/sectors.json"+_v).then(r=>r.json()),
  fetch("/api/prism/themes.json"+_v).then(r=>r.json()),
  fetch("/api/prism/constituents.json"+_v).then(r=>r.json()),
  fetch("/api/prism/signals.json"+_v).then(r=>r.json()),
  fetch("/api/prism/ledger.json"+_v).then(r=>r.json()).catch(()=>null),
  fetch("/api/prism/orders.json"+_v).then(r=>r.json()).catch(()=>[])
]).then(([meta,gate,sectors,themes,constituents,signals,ledger,orders])=>{
  document.getElementById("prismDate").textContent="Snapshot: "+meta.snapshot_date;
  let h="";

  // K-gate
  const gc=gate.gate_state.toLowerCase();
  const gLabel={OPEN:"攻撃モード",MID:"警戒モード",CLOSED:"防御モード"}[gate.gate_state]||gate.gate_state;
  h+=`<div class="gate-card ${gc}"><div class="gate-state">K-GATE: ${gate.gate_state}</div>`;
  h+=`<div class="gate-detail">SPY 3M: ${fmt(gate.benchmark_ret_3m)} | SHV 3M: ${fmt(gate.cash_ret_3m)} | Excess: ${fmt(gate.excess_3m)}</div>`;
  h+=`<div class="gate-atk">${gLabel} — 攻撃比率 ${(gate.atk_cap*100).toFixed(0)}%</div></div>`;

  // 4-Axis Regime
  if(gate.equity_axis){
    const ea=gate.equity_axis,ca=gate.credit_axis,ha=gate.hard_asset_axis,da=gate.duration_axis;
    const rv=v=>{const n=Number(v)||0;return{t:fmt(n),c:n>=0?"pos":"neg"}};
    const axes=[{l:"Equity",v:ea.equity_excess_3m},{l:"Credit",v:ca.lqd_excess_3m},{l:"Gold-SHV",v:ha.gld_excess_3m},{l:"Duration",v:da.tlt_ret_3m}];
    h+=`<div class="regime-row">`;
    axes.forEach(a=>{const r=rv(a.v);h+=`<div class="regime-box"><div class="regime-label">${a.l}</div><div class="regime-val ${r.c}">${r.t}</div></div>`;});
    h+=`</div>`;
  }

  // Health Summary
  if(ledger){
    const active=(ledger.positions||[]).filter(p=>p.status==='active');
    const eqPct=active.reduce((s,p)=>s+(p.target_weight||0),0);
    const byS={};active.forEach(p=>{const s=p.sector||'?';byS[s]=(byS[s]||0)+(p.target_weight||0);});
    const maxS=Math.max(...Object.values(byS),0);
    const maxN=Math.max(...active.map(p=>p.target_weight||0),0);
    const minHoldCount=active.filter(p=>!p.eligible_to_exit).length;
    h+=`<div class="health-grid">`;
    h+=`<div class="health-box"><div class="health-label">Equity</div><div class="health-val">${(eqPct*100).toFixed(1)}%</div></div>`;
    h+=`<div class="health-box"><div class="health-label">MaxSector</div><div class="health-val ${maxS<=0.35?'ok':'bad'}">${(maxS*100).toFixed(1)}%</div></div>`;
    h+=`<div class="health-box"><div class="health-label">MaxName</div><div class="health-val ${maxN<=0.08?'ok':'bad'}">${(maxN*100).toFixed(1)}%</div></div>`;
    h+=`<div class="health-box"><div class="health-label">🔒MinHold</div><div class="health-val">${minHoldCount}/${active.length}</div></div>`;
    h+=`</div>`;
  }

  // Production Portfolio — Rebalance Calculator (opengrail同等)
  const pp=signals.production_portfolio;
  if(pp&&pp.weights){
    window._pp=pp;
    h+=`<div class="prod-card"><div class="prod-title">📊 ${pp.strategy} — リバランス計算</div>`;
    // Input row
    h+=`<div class="prod-input-row">`;
    h+=`<span class="prod-input-label">投資資金</span>`;
    h+=`<div class="prod-toggle"><button class="prod-toggle-btn active" onclick="setPrismCcy('USD')">USD</button><button class="prod-toggle-btn" onclick="setPrismCcy('JPY')">JPY</button></div>`;
    h+=`<span id="prismCcySign">$</span><input id="prismCapital" class="prod-input" type="number" value="10000" oninput="calcPrismRebal()">`;
    h+=`<span class="prod-input-label">ドル円:</span><input id="prismFx" class="prod-input" type="number" value="150" step="0.1" style="width:60px" oninput="calcPrismRebal()">`;
    h+=`<button class="prod-fx-btn" onclick="fetchPrismFx()">🔄 現在レート</button>`;
    h+=`</div>`;
    // Table
    h+=`<table class="prod-table"><thead><tr><th>銘柄</th><th>目標比率 / 投資額</th><th style="text-align:right">株価($)</th><th style="text-align:right">購入株数 / 実配分</th></tr></thead>`;
    h+=`<tbody id="prismRebalBody"></tbody></table>`;
    h+=`<div id="prismRebalSummary"></div>`;
    h+=`<div class="prod-meta">Sector Cap: ${(pp.sector_cap*100).toFixed(0)}% | Max Positions: ${pp.max_positions} | MinHold: 20日 | ※購入株数は切り捨て・端数は現金保有</div>`;
    h+=`</div>`;
  }

  // Position Ledger
  if(ledger&&ledger.positions){
    const active=ledger.positions.filter(p=>p.status==='active');
    if(active.length>0){
      h+=`<div class="ledger-card"><div class="ledger-title">📋 Position Ledger (as_of: ${ledger.as_of_date||'?'})</div>`;
      active.forEach(p=>{
        const pct=Math.min((p.holding_days||0)/20*100,100);
        const cls=p.eligible_to_exit?'unlocked':'locked';
        const icon=p.eligible_to_exit?'🔓':'🔒';
        h+=`<div class="ledger-row"><span class="ledger-tk">${p.ticker}</span>`;
        h+=`<div class="ledger-bar-wrap"><div class="ledger-bar ${cls}" style="width:${pct}%"></div></div>`;
        h+=`<span class="ledger-info">${icon} ${p.holding_days||0}d/20d ${p.eligible_to_exit?'売却可':'保持中'}</span></div>`;
      });
      h+=`</div>`;
    }
  }

  // Orders
  if(orders&&orders.length>0){
    h+=`<div class="ledger-card"><div class="ledger-title">📝 本日の注文 (${orders[0]?.date||''})</div>`;
    orders.forEach(o=>{
      const acls=o.action==='BUY'?'buy':o.action==='SELL'?'sell':'hold';
      const blocked=o.min_hold_blocked==='True'?' 🔒':'';
      h+=`<div class="order-row"><span class="order-action ${acls}">${o.action}</span>`;
      h+=`<span style="font-weight:700;min-width:50px">${o.ticker}</span>`;
      h+=`<span style="font-size:9px;color:var(--text-sub)">${o.reason}${blocked}</span>`;
      h+=`<span style="margin-left:auto;font-size:10px;font-weight:600">${(Number(o.target_weight)*100).toFixed(1)}%</span></div>`;
    });
    h+=`</div>`;
  }

  // Buy/Sell
  const buyStocks=constituents.filter(c=>c.stock_selected);
  const trig=signals.trigger_candidates||{};
  const prevT=(trig.theme_membership_diff?.removed)||[];
  const dropT=(trig.T2_theme_drop)||[];
  const decelT=(trig.T3_accel_flip)||[];
  const sellThemes=[...new Set([...prevT,...dropT,...decelT])];
  const sellStocks=constituents.filter(c=>sellThemes.includes(c.theme));
  const newEntryT=(trig.T5_new_entry)||[];

  h+=`<div class="signal-pair"><div class="signal-card buy"><div class="signal-card-title">▲ 購入候補 (${buyStocks.length})</div>`;
  if(!buyStocks.length){h+=`<div class="signal-empty">該当なし</div>`;}
  else{buyStocks.forEach(c=>{
    const secJa=SEC_JA[c.sector]||c.sector;
    const MC_JA={"mega":"超大型","large":"大型","mid":"中型","small":"小型"};
    const mcJa=MC_JA[c.market_cap_bucket]||c.market_cap_bucket;
    const isNew=newEntryT.includes(c.theme);
    h+=`<div class="ss"><div class="ss-top"><span class="ss-ticker">${c.ticker}</span><span class="ss-price">$${(c.price||0).toLocaleString()}</span></div>`;
    h+=`<div class="ss-company">${c.name_ja||c.name||c.ticker} — ${c.theme}</div>`;
    h+=`<div class="ss-badges"><span class="ss-badge ex">${c.exchange||""}</span><span class="ss-badge ex">${mcJa}</span><span class="ss-badge sec">${secJa}</span>`;
    (c.indices||[]).forEach(idx=>{h+=`<span class="ss-badge idx">${idx}</span>`;});
    if(isNew)h+=`<span class="ss-badge" style="background:rgba(245,158,11,0.12);color:#f59e0b">NEW</span>`;
    h+=`</div><div class="ss-rets">`;
    [{l:"1M",v:c.ret_1m},{l:"3M",v:c.ret_3m},{l:"6M",v:c.ret_6m},{l:"1Y",v:c.ret_1y}].forEach(r=>{
      h+=`<div class="ss-ret"><div class="ss-ret-label">${r.l}</div><div class="ss-ret-val ${(r.v||0)>=0?"pos":"neg"}">${fmt(r.v)}</div></div>`;
    });
    h+=`</div><div class="ss-vol">Vol(20d): ${((c.vol_20d_annualized||0)*100).toFixed(0)}%</div></div>`;
  });}

<div class="logic-rule">K-gateは1.5ppのCAGRで10.8ppのMaxDD改善を購入。「alpha削減装置」ではなくリスク効率改善装置。binary性（段階的でなく離散的）も問題なし（Linear≈Current）。</div>

window._prismCcy='USD';
function setPrismCcy(c){
  window._prismCcy=c;
  document.querySelectorAll('.prod-toggle-btn').forEach(b=>b.classList.toggle('active',b.textContent===c));
  document.getElementById('prismCcySign').textContent=c==='USD'?'$':'¥';
  calcPrismRebal();
}
function fetchPrismFx(){
  const btn=document.querySelector('.prod-fx-btn');btn.textContent='取得中...';
  fetch('https://api.exchangerate-api.com/v4/latest/USD').then(r=>r.json()).then(d=>{
    const rate=d.rates?.JPY||150;
    document.getElementById('prismFx').value=rate.toFixed(2);
    btn.textContent='🔄 '+rate.toFixed(2)+'円';
    calcPrismRebal();
  }).catch(()=>{btn.textContent='🔄 取得失敗';});
}
function calcPrismRebal(){
  const pp=window._pp;if(!pp)return;
  const rawCap=parseFloat(document.getElementById('prismCapital').value)||0;
  const fx=parseFloat(document.getElementById('prismFx').value)||150;
  const capUSD=window._prismCcy==='JPY'?rawCap/fx:rawCap;
  const prices=pp.prices||{};
  const weights=pp.weights;
  const entries=Object.entries(weights).filter(([tk])=>tk!=='SHV').sort((a,b)=>b[1]-a[1]);
  const shvW=weights['SHV']||0;
  let totalInvested=0;let html='';
  entries.forEach(([tk,w])=>{
    const px=prices[tk];if(!px)return;
    const targetAmt=capUSD*w;
    const shares=Math.floor(targetAmt/px);
    const actualAmt=shares*px;
    const actualPct=capUSD>0?(actualAmt/capUSD)*100:0;
    const dev=actualPct-(w*100);
    totalInvested+=actualAmt;
    const secMap=pp.sector_map||{};
    const secJa={"Basic Materials":"素材","Technology":"テクノロジー","Energy":"エネルギー","Industrials":"資本財","Utilities":"公益","Healthcare":"ヘルスケア","Financial Services":"金融","Consumer Defensive":"生活必需品","Consumer Cyclical":"一般消費財","Communication Services":"通信","Real Estate":"不動産"};
    const sec=secJa[secMap[tk]||'']||'';
    html+=`<tr><td><b>${tk}</b> <span style="font-size:9px;color:var(--text-sub)">${sec}</span></td>`;
    html+=`<td class="num">${(w*100).toFixed(1)}% / $${targetAmt.toFixed(0)}</td>`;
    html+=`<td class="num">$${px.toLocaleString()}</td>`;
    html+=`<td class="num"><span class="shares">${shares}株</span> <span class="dev ${dev>=0?'pos':'neg'}">実${actualPct.toFixed(1)}% (${dev>=0?'+':''}${dev.toFixed(1)}%)</span></td></tr>`;
  });
  // SHV row
  if(shvW>0){
    const shvPx=prices['SHV']||110.15;
    const shvTarget=capUSD*shvW;
    const shvShares=Math.floor(shvTarget/shvPx);
    const shvActual=shvShares*shvPx;
    const shvPct=capUSD>0?(shvActual/capUSD)*100:0;
    const shvDev=shvPct-(shvW*100);
    totalInvested+=shvActual;
    html+=`<tr style="background:rgba(0,0,0,0.02)"><td><b>SHV</b> <span style="font-size:9px;color:var(--text-sub)">短期国債ETF(防御)</span></td>`;
    html+=`<td class="num">${(shvW*100).toFixed(1)}% / $${shvTarget.toFixed(0)}</td>`;
    html+=`<td class="num">$${shvPx.toLocaleString()}</td>`;
    html+=`<td class="num"><span class="shares">${shvShares}株</span> <span class="dev ${shvDev>=0?'pos':'neg'}">実${shvPct.toFixed(1)}% (${shvDev>=0?'+':''}${shvDev.toFixed(1)}%)</span></td></tr>`;
  }
  const el=document.getElementById('prismRebalBody');if(el)el.innerHTML=html;
  const residual=capUSD-totalInvested;
  const residualPct=capUSD>0?(residual/capUSD)*100:0;
  const fmtD=v=>'$'+v.toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0});
  const fmtY=v=>'¥'+Math.round(v*fx).toLocaleString();
  let sumH=`<div class="prod-summary"><span>実投資額 <b>${fmtD(totalInvested)}</b>`;
  if(window._prismCcy==='JPY')sumH+=` (${fmtY(totalInvested)})`;
  sumH+=`</span><span>未使用現金 <b style="color:${residualPct>15?'var(--red)':'var(--text-main)'}"> ${fmtD(residual)} (${residualPct.toFixed(1)}%)</b>`;
  if(window._prismCcy==='JPY')sumH+=` (${fmtY(residual)})`;
  sumH+=`</span></div>`;
  const sumEl=document.getElementById('prismRebalSummary');if(sumEl)sumEl.innerHTML=sumH;
}
