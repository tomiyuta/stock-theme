<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>テーマ詳細 | 米国株テーマトラッカー</title>
  <link rel="stylesheet" href="/styles.css?v=15">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
.column-header{display:flex;align-items:center;padding:6px 12px;font-size:10px;color:var(--text-sub);border-bottom:1px solid var(--border);width:100%;box-sizing:border-box}
.column-header .ch-left{flex:1;min-width:0}.column-header .ch-right{display:flex;gap:16px;flex-shrink:0}
.stock-card{background:var(--card-bg);border-radius:var(--card-radius);border-left:3px solid rgba(0,0,0,0.08);margin:var(--card-gap) 0;padding:0 6px 0 4px;min-height:64px;display:flex;flex-direction:column;width:100%;box-sizing:border-box;overflow:hidden}
.stock-card.up{border-left-color:var(--positive)}.stock-card.down{border-left-color:var(--negative)}
.stock-row{display:flex;align-items:center;gap:0;min-height:64px;width:100%}
.stock-card .theme-name{flex:1 1 0;min-width:0;overflow:hidden}
.stock-card .theme-name-primary{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-tag{font-size:9px;padding:1px 4px;border-radius:2px;background:rgba(0,0,0,0.06);color:var(--text-sub);margin-left:3px;flex-shrink:0}
.sector-tag{font-size:9px;color:var(--text-sub);margin-left:3px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;max-width:80px;white-space:nowrap}
.idx-tag{font-size:8px;padding:1px 4px;border-radius:2px;margin-left:3px;flex-shrink:0;white-space:nowrap}
.idx-tag.sp{background:rgba(0,200,83,0.1);color:#00c853}
.idx-tag.ndx{background:rgba(0,82,204,0.1);color:#0052cc}
.idx-tag.ex{background:rgba(0,0,0,0.04);color:var(--text-sub)}
.stock-sub{display:flex;align-items:center;gap:3px;flex-wrap:wrap;margin-top:1px}
.stock-sector{font-size:9px;padding:1px 4px;border-radius:2px;background:rgba(0,82,204,0.08);color:#0052cc}
.stock-industry{font-size:9px;color:var(--text-sub)}
.theme-tags{display:flex;gap:2px;flex-wrap:wrap;margin-top:2px;max-height:32px;overflow:hidden}
.theme-tag{font-size:7px;padding:1px 3px;border-radius:2px;background:rgba(156,39,176,0.08);color:#9c27b0;white-space:nowrap}
.margin-tag{font-size:8px;padding:1px 4px;border-radius:2px;background:rgba(0,150,136,0.1);color:#009688;margin-left:3px;flex-shrink:0}
@media(max-width:767px){.sector-tag{max-width:50px}.mc-tag{font-size:8px;padding:0 3px}.idx-tag{font-size:7px;padding:0 3px}}
@media(max-width:380px){.sector-tag{display:none}.mc-tag{display:none}.idx-tag{display:none}}
</style>
</head>
<body>
  <header>
    <div class="header-top">
      <a href="/" style="text-decoration:none;color:var(--text-sub);font-size:14px">← テーマ一覧</a>
    </div>
  </header>
  <main id="detailMain" style="padding:0;overflow-x:hidden;width:100%"><div class="loading" style="padding:60px 16px">読み込み中...</div></main>
  <nav class="bottom-nav">
    <a class="nav-item active" href="/"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg></span>テーマ</a>
    <a class="nav-item" href="/map"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"/></svg></span>マップ</a>
    <a class="nav-item" href="/market-movers"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span>銘柄</a>
    <a class="nav-item" href="/infographic"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15 15 0 014 10 15 15 0 01-4 10 15 15 0 01-4-10 15 15 0 014-10z"/></svg></span>マクロ</a>
      <a class="nav-item" href="/prism"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/><line x1="12" y1="22" x2="12" y2="8.5"/><line x1="22" y1="8.5" x2="2" y2="8.5"/></svg></span>PRISM</a>
  </nav>
  <script>
const PL={"1日":"1D","5日":"5D","10日":"10D","1ヶ月":"1M","2ヶ月":"2M","3ヶ月":"3M","半年":"6M","1年":"1Y"};
const fmt=v=>v==null?"—":(v>=0?"+":"")+((v*100).toFixed(1))+"%";
const SEC_JA={"Technology":"テクノロジー","Healthcare":"ヘルスケア","Financial Services":"金融","Energy":"エネルギー","Consumer Cyclical":"一般消費財","Consumer Defensive":"生活必需品","Industrials":"資本財","Basic Materials":"素材","Real Estate":"不動産","Utilities":"公益","Communication Services":"通信"};
const SP500=new Set(["AAPL","ABBV","ABT","ACN","ADBE","ADI","ADM","ADP","ADSK","AEP","AMAT","AMD","AMGN","AMT","AMZN","ANET","ANSS","AON","APD","APH","AVGO","AXP","BA","BAC","BK","BKNG","BKR","BLK","BMY","BR","BRK.B","BSX","BX","C","CAT","CB","CDNS","CEG","CHTR","CI","CL","CMCSA","CME","CMG","CMS","CNP","COF","COP","COST","CRM","CRWD","CSCO","CTAS","CTSH","CVS","CVX","D","DD","DE","DHR","DIS","DLR","DOW","DUK","DVN","DXCM","EA","ECL","EMR","ENPH","EOG","EQIX","ETN","EW","EXC","EXPE","F","FANG","FAST","FCX","FDX","FI","FISV","FTNT","GD","GE","GEHC","GILD","GIS","GLW","GM","GOOG","GOOGL","GS","GWW","HAL","HCA","HD","HON","HPQ","HUM","IBM","ICE","IDXX","INTC","INTU","ISRG","ITW","JCI","JNJ","JPM","KHC","KLAC","KMB","KO","KR","LEN","LIN","LLY","LMT","LOW","LRCX","LULU","LYV","MA","MAR","MCD","MCHP","MCK","MCO","MDLZ","MDT","MELI","MET","META","MMM","MNST","MO","MOH","MPC","MPWR","MRK","MRNA","MS","MSCI","MSFT","MSI","MU","NCLH","NEE","NFLX","NKE","NOC","NOW","NSC","NVDA","NVR","NXPI","O","ODFL","OKE","ON","ORCL","ORLY","OXY","PANW","PAYC","PAYX","PEP","PFE","PG","PGR","PLD","PM","PNC","POOL","PPG","PRU","PSA","PSX","PYPL","QCOM","RCL","REGN","RMD","ROP","ROST","RTX","SBUX","SCHW","SHW","SLB","SNPS","SO","SPG","SRE","STE","STZ","SYK","T","TDG","TGT","TJX","TMO","TMUS","TSLA","TSN","TT","TTD","TTWO","TXN","TYL","UNH","UNP","UPS","URI","USB","V","VICI","VLO","VRSK","VRTX","VZ","WBA","WBD","WEC","WELL","WFC","WM","WMT","WST","XOM","XYL","YUM","ZBH","ZTS"]);
const slug=location.pathname.replace("/theme/","").replace(/\/$/,"");
Promise.all([
  fetch("/api/theme_ranking.json").then(r=>r.json()),
  fetch("/api/stock_meta.json?v=2").then(r=>r.json()).catch(()=>({})),
  fetch("/api/alpha_beta.json?v=2").then(r=>r.json()).catch(()=>({})),
  fetch("/api/theme-details/"+slug+".json?v=2").then(r=>r.json()).catch(()=>null),
  fetch("/api/ticker_enrichment.json?v=2").then(r=>r.json()).catch(()=>({}))
]).then(([ranking, stockMeta, abAll, detail, enrichment])=>{
  const all=ranking.all_themes||[];
  const theme=all.find(t=>t.slug===slug);
  if(!theme){document.getElementById("detailMain").innerHTML='<div class="loading">テーマが見つかりません</div>';return}
  document.title=theme.name+" | 米国株テーマトラッカー";
  const periods=(ranking.all_periods||[]).filter(p=>p!=="日中");
  const ab=(abAll["3ヶ月"]||{})[slug]||{};
  const tickers=theme.related?theme.related.split(",").filter(t=>t.trim()).map(t=>t.trim()):[];
  const tp=theme.tickerPerformances||{};
  // Period grid
  const pgHtml=periods.map(p=>{const v=theme[p];const cls=v>0?"positive":v<0?"negative":"";return'<div class="dp-box"><div class="dp-label">'+(PL[p]||p)+'</div><div class="dp-value '+cls+'">'+fmt(v)+'</div></div>'}).join("");

  // Sort stocks by 1D return
  const p="1日";
  const rows=tickers.map(tk=>{
    const perf=tp[tk]||{};
    const meta=stockMeta[tk]||{};
    const r1d=perf[p]??null;
    const r1y=perf["1年"]??null;
    return {tk, r1d, r1y, meta, perf};
  }).sort((a,b)=>(b.r1d??-Infinity)-(a.r1d??-Infinity));

  // Build chart HTML
  let chartHtml="";
  if(detail&&detail.prices&&detail.prices.length>0){
    chartHtml='<div class="detail-chart-wrap"><canvas id="dChart"></canvas></div>';
  }

  // Build stock cards (本家準拠)
  let stockHtml='<div class="column-header"><div class="ch-left">終値：'+(ranking.latest_stock_date||"—")+'</div><div class="ch-right" id="stockPeriodBar">'+periods.map(pr=>'<span class="period-btn'+(pr==="1日"?" active":"")+'" onclick="switchStockPeriod(\''+pr+'\')" style="cursor:pointer;font-size:10px;padding:2px 4px;border-radius:3px">'+(PL[pr]||pr)+'</span>').join('')+'</div></div>';
  let currentStockPeriod="1日";
  rows.forEach((s,i)=>{
    const dir=(s.r1d??0)>=0?"up":"down";
    const rankClass=i<3?"top3 "+dir:"";
    const mcLabel=s.meta.mc?'<span class="mc-tag">'+s.meta.mc+'</span>':"";
    const sectorLabel=s.meta.industry?'<span class="sector-tag">'+s.meta.industry+'</span>':"";
    const ex=s.meta.exchange||"";
    const exTag=ex?'<span class="idx-tag ex">'+ex+'</span>':"";
    const spTag=SP500.has(s.tk)?'<span class="idx-tag sp">S&P500</span>':"";
    const ndxTag=(s.meta.indices||[]).map(idx=>'<span class="idx-tag ndx">'+idx+'</span>').join("");
    const sectorJa=SEC_JA[s.meta.sector]||s.meta.sector||"";
    const companyName=s.meta.name_ja||s.meta.name||s.tk;
    const price=s.meta.price?("$"+s.meta.price.toLocaleString()):"—";
    const r1dStr=fmt(s.r1d);
    const r1dCls=(s.r1d??0)>=0?"positive":"negative";
    const enr=enrichment[s.tk]||{};
    const marginTag=enr.margin!=null?'<span class="margin-tag">利益率 '+enr.margin+'%</span>':'';
    const otherThemes=(enr.themes||[]).filter(t=>t!==theme.name);
    const themeTags=otherThemes.length>0?'<div class="theme-tags">'+otherThemes.map(t=>'<span class="theme-tag">'+t+'</span>').join('')+'</div>':'';

    const perfJson=JSON.stringify(s.perf).replace(/"/g,'&quot;');
    stockHtml+=`<div class="stock-card ${dir}" data-perf="${perfJson}" data-tk="${s.tk}"><div class="stock-row">
      <div class="rank ${rankClass}">${i+1}</div>
      <div class="theme-name" style="flex:1;min-width:0">
        <div class="theme-name-primary" style="display:flex;align-items:center;gap:0">${s.tk}${mcLabel}${marginTag}${exTag}${spTag}${ndxTag}</div>
        <div class="theme-name-secondary">${companyName}</div>
        <div class="stock-sub">${sectorJa?'<span class="stock-sector">'+sectorJa+'</span>':''}${s.meta.industry?'<span class="stock-industry">'+s.meta.industry+'</span>':''}</div>
        ${themeTags}
      </div>
      <div class="sparkline-wrap"><canvas data-tk="${s.tk}" height="52"></canvas></div>
      <div class="return-cell" data-ret-cell>
        <div class="return-value ${r1dCls}">${r1dStr}</div>
        <div class="return-sub">${price}</div>
      </div>
    </div></div>`;
  });


  // Assemble final HTML
  document.getElementById("detailMain").innerHTML =
    '<div style="padding:12px">'+
    '<div class="detail-title">'+theme.name+'</div>'+
    '<div class="detail-meta">'+theme.industry+' › '+theme.theme1+' › '+theme.theme2+' · '+tickers.length+'銘柄</div>'+
    '<div class="detail-periods">'+pgHtml+'</div>'+
    '</div>'+chartHtml+stockHtml;

  // Render chart — Option C: テーマ平均（太線）＋全構成銘柄（細線）
  if(detail&&detail.prices&&detail.prices.length>0&&detail.tickers&&detail.tickers.length>0){
    const ctx=document.getElementById("dChart");
    if(ctx){
      const dates=detail.prices.map(p=>p.date);
      const tks=detail.tickers;
      const colors=["#ef5350","#42a5f5","#66bb6a","#ffa726","#ab47bc","#26c6da","#8d6e63","#78909c","#ec407a","#d4e157","#5c6bc0","#29b6f6"];
      const datasets=[];
      // Per-ticker return series
      const allSeries=[];
      tks.forEach((tk,idx)=>{
        const prices=detail.prices.map(p=>p[tk]).filter(v=>v!=null);
        if(prices.length<2) return;
        const base=prices[0];
        const vals=detail.prices.map(p=>p[tk]!=null?((p[tk]/base)-1)*100:null);
        allSeries.push(vals);
        datasets.push({label:tk,data:vals,borderColor:colors[idx%colors.length],borderWidth:1,fill:false,pointRadius:0,tension:0.3,borderDash:[],spanGaps:true});
      });
      // Theme average (equal-weight)
      if(allSeries.length>0){
        const avg=dates.map((_,i)=>{
          const vals=allSeries.map(s=>s[i]).filter(v=>v!=null);
          return vals.length>0?vals.reduce((a,b)=>a+b,0)/vals.length:null;
        });
        const lastAvg=avg.filter(v=>v!=null).pop()||0;
        datasets.unshift({label:"テーマ平均",data:avg,borderColor:"#1a1a1a",borderWidth:3,fill:false,pointRadius:0,tension:0.3,spanGaps:true});
      }
      new Chart(ctx,{type:"line",data:{labels:dates,datasets},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:"bottom",labels:{boxWidth:12,font:{size:10},usePointStyle:true}}},
        scales:{x:{display:false},y:{ticks:{callback:v=>v.toFixed(0)+"%"}}},animation:false}});
    }
  }

  // Render per-ticker sparklines from detail price data
  if(detail&&detail.prices&&detail.prices.length>0){
    requestAnimationFrame(()=>{
      document.querySelectorAll('canvas[data-tk]').forEach(canvas=>{
        const tk=canvas.dataset.tk;
        const prices=detail.prices.filter(p=>p[tk]!=null).map(p=>p[tk]);
        if(prices.length<2)return;
        const base=prices[0];
        const vals=prices.map(p=>((p/base)-1)*100);
        const last=vals[vals.length-1];
        const color=last>=0?"#00c853":"#ff1744";
        const ctx2=canvas.getContext("2d");
        new Chart(ctx2,{type:"line",data:{labels:vals.map((_,i)=>i),datasets:[{data:vals,borderColor:color,borderWidth:1.5,fill:{target:"origin",above:color+"15",below:color+"15"},pointRadius:0,tension:0.3}]},
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}},animation:false}});
      });
    });
  }
  // Period switch for stock cards
  window.switchStockPeriod=function(p){
    currentStockPeriod=p;
    document.querySelectorAll('#stockPeriodBar .period-btn').forEach(b=>{b.classList.toggle('active',b.textContent.trim()===(PL[p]||p))});
    const cards=Array.from(document.querySelectorAll('.stock-card[data-perf]'));
    cards.forEach(card=>{
      try{
        const perf=JSON.parse(card.dataset.perf);
        const v=perf[p]??null;
        const cell=card.querySelector('[data-ret-cell]');
        if(cell){
          const cls=(v??0)>=0?"positive":"negative";
          cell.querySelector('.return-value').className="return-value "+cls;
          cell.querySelector('.return-value').textContent=fmt(v);
        }
        card.classList.toggle('up',(v??0)>=0);
        card.classList.toggle('down',(v??0)<0);
      }catch(e){}
    });
    // Re-sort
    const container=cards[0]?.parentNode;
    if(container){
      const sorted=cards.sort((a,b)=>{
        const pa=JSON.parse(a.dataset.perf)[p]??-999;
        const pb=JSON.parse(b.dataset.perf)[p]??-999;
        return pb-pa;
      });
      sorted.forEach((c,i)=>{
        container.appendChild(c);
        const rank=c.querySelector('.rank');
        if(rank)rank.textContent=i+1;
      });
    }
  };

});
  </script>
</body>
</html>
