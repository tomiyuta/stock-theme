<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>テーマ詳細 | 米国株テーマトラッカー</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
  <header>
    <div class="header-top">
      <a href="/" style="text-decoration:none;color:var(--text-sub);font-size:14px">← 戻る</a>
    </div>
  </header>
  <main id="detailMain" style="padding:12px">
    <div class="loading">読み込み中...</div>
  </main>
  <nav class="bottom-nav">
    <a class="nav-item" href="/"><span class="nav-icon">🏠</span>ホーム</a>
    <a class="nav-item" href="/map"><span class="nav-icon">🗺</span>マップ</a>
    <a class="nav-item" href="/market-movers"><span class="nav-icon">📈</span>銘柄</a>
    <a class="nav-item" href="/infographic"><span class="nav-icon">🌐</span>マクロテーマ</a>

  </nav>
  <script>
const PL={"1日":"1D","5日":"5D","10日":"10D","1ヶ月":"1M","2ヶ月":"2M","3ヶ月":"3M","半年":"6M","1年":"1Y"};
const fmt=v=>v==null?"—":(v>=0?"+":"")+((v*100).toFixed(1))+"%";
const slug = location.pathname.replace("/theme/","").replace(/\/$/,"");
Promise.all([
  fetch("/api/theme_ranking.json").then(r=>r.json()),
  fetch("/api/alpha_beta.json").then(r=>r.json()).catch(()=>({})),
  fetch("/api/theme-details/"+slug+".json").then(r=>r.json()).catch(()=>null)
]).then(([ranking, abAll, detail]) => {
  const all = ranking.all_themes||[];
  const theme = all.find(t=>t.slug===slug);
  if(!theme){document.getElementById("detailMain").innerHTML='<div class="loading">テーマが見つかりません</div>';return;}
  document.title = theme.name + " | 米国株テーマトラッカー";
  const periods = (ranking.all_periods||ranking.periods||[]).filter(p=>p!=="日中");
  const ab = (abAll["3ヶ月"]||{})[slug]||{};
  const tickerCount = theme.related?theme.related.split(",").filter(t=>t.trim()).length:0;
  const pgHtml = periods.map(p=>{
    const v=theme[p]; const cls=v>0?"positive":v<0?"negative":"";
    return '<div class="dp-box"><div class="dp-label">'+(PL[p]||p)+'</div><div class="dp-value '+cls+'">'+fmt(v)+'</div></div>';
  }).join("");
  const tp = theme.tickerPerformances||{};
  const p = "1日";
  const rows = Object.entries(tp).map(([tk,d])=>({tk,r:d[p]??null})).sort((a,b)=>(b.r??-Infinity)-(a.r??-Infinity));
  const rowsHtml = rows.map(t=>{
    const cls=(t.r??0)>=0?"positive":"negative";
    const abd=ab[t.tk];
    const abStr=abd?'<div class="dt-sub">α'+(abd.alpha>0?"+":"")+abd.alpha+' β'+abd.beta+' R²'+abd.r2+'</div>':"";
    return '<div class="dt-row"><div><div class="dt-name">'+t.tk+'</div>'+abStr+'</div><div class="dt-return '+cls+'">'+fmt(t.r)+'</div></div>';
  }).join("");
  let chartHtml = "";
  if(detail && detail.prices && detail.prices.length > 0) {
    chartHtml = '<div class="detail-chart-wrap"><canvas id="dChart"></canvas></div>';
  }
  document.getElementById("detailMain").innerHTML =
    '<div class="detail-title">'+theme.name+'</div>'+
    '<div class="detail-meta">'+theme.industry+' › '+theme.theme1+' › '+theme.theme2+' · '+tickerCount+'銘柄</div>'+
    '<div class="detail-periods">'+pgHtml+'</div>'+
    chartHtml+
    '<div class="detail-section">構成銘柄 (1D)</div>'+rowsHtml;
  if(detail && detail.prices && detail.prices.length>0 && detail.tickers.length>0) {
    const ctx = document.getElementById("dChart");
    if(ctx) {
      const dates = detail.prices.map(p=>p.date);
      const tk0 = detail.tickers[0];
      const base = detail.prices.find(p=>p[tk0])?.[tk0]||1;
      const vals = detail.prices.map(p=>(((p[tk0]||base)/base)-1)*100);
      new Chart(ctx, {
        type:"line", data:{labels:dates,datasets:[{data:vals,borderColor:"#0052cc",borderWidth:1.5,fill:false,pointRadius:0,tension:0.3}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{display:false},y:{ticks:{callback:v=>v.toFixed(0)+"%"}}},animation:false}
      });
    }
  }
});
  </script>
</body>
</html>
