<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>G2-MAX | PRISMATIC</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#ffffff">
  <link rel="stylesheet" href="/styles.css?v=21">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root{--text-main:#1a1a2e;--text-sub:#6b7280;--bg:#fff;--card-bg:#f8f9fb;--green:#00c853;--red:#ff1744;--blue:#0052cc;--gold:#f59e0b;--purple:#7c3aed;--g2:#e11d48}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',-apple-system,sans-serif;background:var(--bg);color:var(--text-main);padding-bottom:80px}
@media(min-width:1024px){html{background:#eee}body{max-width:700px;margin:0 auto;background:var(--bg);min-height:100vh;box-shadow:0 0 40px rgba(0,0,0,0.06)}}
.section-title{font-size:12px;font-weight:700;margin:16px 12px 6px;color:var(--text-main)}
.card{margin:8px 12px;border-radius:8px;padding:12px;background:var(--card-bg);border:1px solid rgba(0,0,0,0.06)}
.card-title{font-size:11px;font-weight:700;margin-bottom:8px}
.tbl{width:100%;font-size:10px;border-collapse:collapse}
.tbl th{text-align:left;padding:3px 4px;color:var(--text-sub);font-weight:600;border-bottom:1px solid rgba(0,0,0,0.1)}
.tbl td{padding:3px 4px;border-bottom:1px solid rgba(0,0,0,0.04)}
.pos{color:var(--green);font-weight:700}.neg{color:var(--red);font-weight:700}
.prod-card{margin:8px 12px;border-radius:8px;padding:12px;background:rgba(225,29,72,0.03);border:1.5px solid rgba(225,29,72,0.15);overflow-x:auto;-webkit-overflow-scrolling:touch}
.prod-title{font-size:11px;font-weight:700;color:var(--g2);margin-bottom:10px}
.prod-input-row{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid rgba(0,0,0,0.06)}
.prod-input-top{display:flex;align-items:center;justify-content:space-between}
.prod-seg{display:flex;border:0.5px solid rgba(0,0,0,0.15);border-radius:20px;overflow:hidden;background:rgba(0,0,0,0.03)}
.prod-seg-btn{padding:7px 20px;font-size:12px;font-weight:500;border:none;cursor:pointer;background:none;color:var(--text-sub);border-radius:20px;transition:all 0.15s}
.prod-seg-btn.active{background:var(--text-main);color:#fff}
.prod-fx-area{display:flex;align-items:center;gap:6px;cursor:pointer;padding:4px 10px;border-radius:16px;transition:background 0.15s}
.prod-fx-area:hover{background:rgba(0,0,0,0.04)}
.prod-fx-rate{font-size:12px;font-weight:500;color:var(--text-main)}
.prod-fx-dot{width:5px;height:5px;border-radius:50%;background:#1D9E75;flex-shrink:0}
.prod-fx-time{font-size:10px;color:var(--text-sub)}
.prod-fx-icon{width:14px;height:14px;color:var(--text-sub);transition:transform 0.5s}
.prod-big-wrap{position:relative}
.prod-big-sign{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:20px;font-weight:500;color:var(--text-sub)}
.prod-big-input{width:100%;padding:14px 14px 14px 34px;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;font-size:22px;font-weight:500;font-family:monospace;text-align:left;box-sizing:border-box;background:none;color:var(--text-main);outline:none;transition:border-color 0.15s}
.prod-big-input:focus{border-color:var(--g2)}
.prod-conv-row{display:flex;align-items:center;justify-content:space-between;padding:2px 4px;font-size:13px;color:var(--text-sub)}
.prod-input-label{font-size:10px;font-weight:600;color:var(--text-sub)}
.prod-input{width:90px;padding:10px 8px;border:1px solid rgba(0,0,0,0.12);border-radius:4px;font-size:11px;text-align:right;font-family:monospace}
.prod-table{width:100%;font-size:10px;border-collapse:collapse}
.prod-table th{text-align:left;padding:6px 4px;font-size:9px;font-weight:600;color:var(--text-sub);border-bottom:1px solid rgba(0,0,0,0.1)}
.prod-table td{padding:5px 4px;border-bottom:1px solid rgba(0,0,0,0.04)}
.prod-table .num{text-align:right;font-family:monospace;font-weight:600}
.prod-table .shares{font-size:12px;font-weight:800;color:var(--g2)}
.prod-table .dev{font-size:9px}.prod-table .dev.neg{color:var(--red)}.prod-table .dev.pos{color:var(--green)}
.prod-summary{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;padding-top:8px;border-top:1px solid rgba(0,0,0,0.06);font-size:10px;color:var(--text-sub)}
</style>
</head>
<body>
<div style="padding:16px 12px 4px;text-align:center">
  <div style="font-size:20px;font-weight:900;letter-spacing:1px">G2-<span style="color:var(--g2)">MAX</span></div>
  <div style="font-size:10px;color:var(--text-sub);margin-top:2px">Tier 3 実験室 — 制約研究・集中リスク検証専用</div>
  <div style="font-size:8px;color:#c0392b;margin-top:2px;font-weight:700">⚠ 絶対値は全てartifact（M汚染感応度: 致命的）。成果として引用禁止。</div>
  <div style="margin-top:3px"><span style="font-size:8px;padding:2px 6px;border-radius:3px;background:rgba(192,57,43,0.08);color:#c0392b;font-weight:700">PIT Silver — 累積127億倍は実現不能</span></div>
  <div id="headerMeta"></div>
</div>
<div id="g2Main"><div style="padding:40px;text-align:center;color:var(--text-sub)">Loading...</div></div>
<script>
const _v='?t='+Date.now();
Promise.all([
  fetch('/api/prism-g2/shadow_comparison.json'+_v).then(r=>r.json()),
  fetch('/api/prism-g2/meta.json'+_v).then(r=>r.json())
]).then(([comp,meta])=>{
  let h='';
  const pct=v=>(v*100).toFixed(1)+'%';

  // === 1. Status Card ===
  h+=`<div style="margin:8px 12px;border-radius:8px;padding:14px;text-align:center;background:rgba(225,29,72,0.06);border:2px solid var(--g2)">`;
  h+=`<div style="font-size:20px;font-weight:900;letter-spacing:2px;color:var(--g2)">G2-MAX: ${meta.status||'SHADOW'}</div>`;
  h+=`<div style="font-size:10px;color:var(--text-sub);margin-top:4px">${comp.snapshot_date} | ${comp.version||'G2-MAX_v1'}</div>`;
  h+=`</div>`;


  // === 3. Portfolio ===
  h+=`<div class="section-title">📊 G2-MAX ポートフォリオ</div>`;
  h+=`<div class="card"><div class="card-title" style="color:var(--g2)">6テーマ集中 × raw α63 — ${comp.comparisons?.length||0}銘柄</div>`;
  h+=`<table class="tbl"><tr><th>#</th><th>テーマ</th><th>銘柄</th><th>価格</th><th>α63</th></tr>`;
  (comp.comparisons||[]).forEach((c,i)=>{
    const s = c.stocks?.[0] || {};
    const a = s.alpha63;
    h+=`<tr><td>${i+1}</td><td style="font-size:9px">${c.theme_name||c.theme}</td>`;
    h+=`<td style="font-weight:700">${s.ticker||'—'}</td>`;
    h+=`<td>$${s.price||'—'}</td>`;
    h+=`<td class="${a>0?'pos':'neg'}">${a!==undefined?a.toFixed(3):'—'}</td></tr>`;
  });
  h+=`</table></div>`;

  // === 4. Theme Details (expandable) ===
  (comp.comparisons||[]).forEach((c,i)=>{
    const s = c.stocks?.[0] || {};
    h+=`<div style="margin:4px 12px;border-radius:6px;border:1px solid rgba(0,0,0,0.06);overflow:hidden;cursor:pointer" onclick="this.querySelector('.g2body').style.display=this.querySelector('.g2body').style.display==='block'?'none':'block'">`;
    h+=`<div style="padding:8px 10px;font-size:11px;font-weight:700;background:var(--card-bg);display:flex;justify-content:space-between"><span>${c.theme_name||c.theme} → ${s.ticker||'?'}</span><span style="font-size:9px">▶</span></div>`;
    h+=`<div class="g2body" style="display:none;padding:8px 10px;font-size:9px">`;
    if(s.price) h+=`<div style="font-size:14px;font-weight:700">$${s.price} <span style="font-size:10px;color:var(--text-sub)">${s.name||''}</span></div>`;
    h+=`<div style="display:flex;gap:4px;margin:4px 0">`;
    if(s.sector) h+=`<span style="font-size:8px;padding:1px 4px;border-radius:2px;background:rgba(0,82,204,0.08);color:var(--blue)">${s.sector}</span>`;
    if(s.mc) h+=`<span style="font-size:8px;padding:1px 4px;border-radius:2px;background:rgba(0,0,0,0.04)">${s.mc}</span>`;
    h+=`</div>`;
    h+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin:6px 0">`;
    [['α63',s.alpha63],['β63',s.beta63],['R²',s.r2_63]].forEach(([l,v])=>{
      h+=`<div style="padding:3px 5px;border-radius:3px;background:rgba(225,29,72,0.05)"><div style="font-size:7px;color:var(--text-sub)">${l}</div><div style="font-weight:700">${v!==null&&v!==undefined?v:'—'}</div></div>`;
    });
    h+=`</div>`;
    h+=`<div style="font-size:8px;color:var(--text-sub)">Theme score: ${c.theme_score?.toFixed(3)||'—'} | mom63: ${pct(c.mom63||0)} | mom126: ${pct(c.mom126||0)}</div>`;
    h+=`</div></div>`;
  });

  // === 5. Sell Card ===
  h+=`<div id="sellCardG2"></div>`;
  h+=`<div id="rebalDiffG2"></div>`;

  // === 6. Rebalance Calculator ===
  window._g2_picks = (comp.comparisons||[]).map(c => {
    const s = c.stocks?.[0] || {};
    return {ticker:s.ticker, price:s.price, sector:s.sector, theme:c.theme_name, alpha63:s.alpha63, w5b_weight:c.w5b_weight||0, beast_weight:c.beast_weight||0};
  });
  const nPicks = comp.comparisons?.length || 5;
  const wPct = (100/nPicks).toFixed(0);
  h+=`<div class="section-title">📊 G2-MAX リバランス計算</div>`;
  h+=`<div class="prod-card"><div class="prod-title">G2-MAX Shadow Portfolio — ${nPicks}銘柄</div>`;
  h+=`<div class="prod-input-row">`;
  h+=`<div class="prod-input-top">`;
  h+=`<div class="prod-seg"><button class="prod-seg-btn active" id="g2SegUSD" onclick="setG2Ccy('USD')">USD</button><button class="prod-seg-btn" id="g2SegJPY" onclick="setG2Ccy('JPY')">JPY</button></div>`;
  h+=`<div class="prod-fx-area" onclick="fetchG2Fx()"><span class="prod-fx-rate" id="g2FxRate">¥---</span><div class="prod-fx-dot" id="g2FxDot"></div><span class="prod-fx-time" id="g2FxTime">取得中...</span><svg class="prod-fx-icon" id="g2FxIcon" viewBox="0 0 16 16"><path d="M13.65 2.35A8 8 0 1 0 16 8h-2a6 6 0 1 1-1.76-4.24L10 6h6V0l-2.35 2.35z" fill="currentColor"/></svg></div>`;
  h+=`</div>`;
  h+=`<div class="prod-big-wrap"><span class="prod-big-sign" id="g2CcySign">$</span><input id="g2Capital" class="prod-big-input" type="text" value="10,000" oninput="calcG2()"></div>`;
  h+=`<div class="prod-conv-row"><span id="g2ConvDisplay">≈ ¥---</span><span style="font-size:10px;color:var(--text-sub)">exchangerate-api.com</span></div>`;
  h+=`</div>`;
  h+=`<table class="prod-table"><thead><tr><th>銘柄</th><th>テーマ</th><th style="text-align:right">G2%</th><th style="text-align:right;color:#D85A30">🔥%</th><th style="text-align:right">株価</th><th style="text-align:right">G2 株数</th><th style="text-align:right;color:#D85A30">🔥株数</th></tr></thead>`;
  h+=`<tbody id="g2RebalBody"></tbody></table>`;
  h+=`<div id="g2RebalSummary"></div>`;
  h+=`<div style="font-size:8px;color:var(--text-sub);margin-top:6px">G2 = W5b 30%キャップ | 🔥 = W5bキャップなし | 同一銘柄・ウェイトのみ異なる</div>`;
  h+=`</div>`;

  // === 6. Cumulative Returns Chart ===
  h+=`<div class="section-title">📈 累積リターン推移（BT 参考値）</div>`;
  h+=`<div class="card"><div class="card-title" style="color:var(--g2)">G2-MAX vs SPY — 25年Norgate BT ⚠PIT汚染参考値</div>`;
  h+=`<div style="position:relative;height:280px;margin-bottom:12px"><div style="display:flex;align-items:center;margin-bottom:4px"><div class="log-toggle" id="cumChartG2Toggle"><button onclick="toggleLogScale('_cumChartG2','cumChartG2Toggle',false)">線形</button><button class="active" onclick="toggleLogScale('_cumChartG2','cumChartG2Toggle',true)">対数</button></div></div><canvas id="cumChartG2"></canvas></div>`;
  h+=`<div id="cumStatsG2" style="margin-top:12px"></div>`;
  h+=`</div>`;

  // === 7. Annual Performance ===
  h+=`<div class="section-title">📊 年次パフォーマンス（BT 参考値）</div>`;
  h+=`<div class="card"><table class="tbl"><thead><tr><th>年</th><th>G2-MAX</th><th style="color:#D85A30">BEAST</th><th>SPY</th></tr></thead><tbody id="annualBodyG2"></tbody></table>`;
  h+=`<div style="font-size:8px;color:var(--text-sub);margin-top:4px">⚠ PIT Silver: M汚染感応度=致命的（6テーマ集中）。絶対値は全てartifact。制約研究・集中リスク検証用途のみ。</div></div>`;

  // === 8. Ablation BT Comparison ===
  h+=`<div class="section-title">🔬 Ablation BT（戦略間比較）</div>`;
  h+=`<div class="card"><div class="card-title">CAGR最大化 ablation ladder</div>`;
  h+=`<table class="tbl"><tr><th>Strategy</th><th>CAGR</th><th>Sharpe</th><th>MaxDD</th><th>Terminal</th></tr>`;
  const abl=[
    ['G0 A5-lite <span style="font-size:7px;color:var(--text-sub)">(5yr)</span>','67.2%','1.576','-42.0%','19.1x'],
    ['G1 5テーマ集中 <span style="font-size:7px;color:var(--text-sub)">(5yr)</span>','145.3%','2.179','-48.7%','172.8x'],
    ['G2 6テーマ W5b ★','149.5%','1.63','-58.9%','—'],
    ['🔥 BEAST (W5b nocap)','132.6%','0.87','-71.8%','—'],
    ['G3a α/σ² <span style="font-size:7px;color:var(--text-sub)">(5yr)</span>','64.6%','1.576','-39.3%','17.5x'],
    ['G4 Kelly <span style="font-size:7px;color:var(--text-sub)">(5yr)</span>','36.6%','0.838','-51.9%','6.0x'],
  ];
  abl.forEach(([s,c,sh,md,t])=>{
    const best=s.includes('★');const beast=s.includes('BEAST');
    h+=`<tr style="${best?'background:rgba(225,29,72,0.06);font-weight:700':beast?'background:rgba(216,90,48,0.06);color:#D85A30':''}"><td>${s}</td><td>${c}</td><td>${sh}</td><td>${md}</td><td>${t}</td></tr>`;
  });
  h+=`</table>`;
  h+=`<div style="font-size:8px;color:var(--text-sub);margin-top:4px">G2(★)=Sharpe基準の採用戦略。BEAST=キャップなし参考値（CAGR↑ Sharpe↓）。Kelly正規化は全て逆効果。</div>`;
  h+=`</div>`;

  // === 9. Architecture ===
  h+=`<div class="section-title">📐 G2-MAX アーキテクチャ</div>`;
  const arch=[
    ["設計思想",`<div style="font-size:10px;line-height:1.6;padding:6px;background:rgba(225,29,72,0.04);border-radius:4px"><b>G2-MAX</b> = CAGR最大化専用のW5b一貫性加重raw α戦略<br>PRISM-RQ（Sharpe/Calmar重視）とは<b>目的関数が異なる</b><br>Ablation BTで「集中+raw α+W5b加重」がCAGR最大の構成と確認</div>`],
    ["Layer 1: 6テーマ集中 + Corr Budget",`<div style="font-size:10px;line-height:1.6"><code>ThemeScore = 0.50×rank(R63) + 0.30×rank(R126) + 0.20×rank(R21)</code><br><br><b>選定:</b> 上位からgreedy採用、相関制約 max_corr &lt; 0.80<br><b>テーマ数:</b> 6（Sharpe最大2.80 / MaxDD最良-44%の最適点）<br><b>sector cap:</b> なし<br><b>BFM-v2 veto:</b> なし</div>`],
    ["Layer 2: Raw Self-Excluded α63",`<div style="font-size:10px;line-height:1.6"><b>OLS回帰（63日、自己除外）:</b><br><code>r_i(d) = α + β × r_theme_ex_self(d) + ε</code><br><br><b>スコア:</b> raw α_cum63（SNRb/shrink不使用）<br><b>各テーマ1銘柄:</b> α63最大を選定</div>`],
    ["Layer 3: W5b一貫性加重",`<div style="font-size:10px;line-height:1.6"><b>3期間モメンタムの一貫性でウェイトを決定:</b><br><code>R252_ex1m = (1+R252)/(1+R21) - 1</code> (12-1 momentum)<br><code>pos_count = Σ𝟙(R63>0, R126>0, R252_ex1m>0)</code><br><code>avg_ret = mean(max(R63,0), max(R126,0), max(R252_ex1m,0))</code><br><code>raw_weight = pos_count × (1 + avg_ret)</code><br><code>weight = normalize + 30%キャップ</code><br><br><b>直感:</b> 3期間全てで上昇しているテーマ（真のトレンド）に多く配分。1期間だけ正のテーマ（ノイズ）は減量。<br><br><b>vs 等ウェイト:</b> CAGR +52pt, Sharpe +0.14, 2022年DD -28%→-14%改善</div>`],
    ["防御装置",`<div style="font-size:10px;line-height:1.6"><b>残すもの:</b><br>• Correlation budget（同一因子の重複ベット回避）<br>• Data integrity / delisting 系 hard exit<br><br><b>外すもの:</b><br>• BFM-v2 veto（CAGR -14pt）<br>• SNRb（CAGR -9.5pt）<br>• shrink(r²)<br>• sector cap<br>• Vol overlay<br>• panic de-gearing（今回のBTでは無効）</div>`],
    ["PIT汚染の影響",`<div style="font-size:10px;line-height:1.6;color:var(--g2)"><b>G2-MAXはPIT汚染感応度が致命的。</b><br>6テーマ集中 + raw α + W5b加重 → frozen membershipの勝者バイアスが全戦略中最大。<br>CAGR +149%、累積127億倍は完全なartifact。成果として引用禁止。<br>月次+240%（2021-01）は実運用で再現不能。<br><br>Tier 3 実験室: 制約の有効性検証、集中リスク研究、cap/ranking感度実験にのみ使用。<br>W5bキャップ(30%)の構造的価値（vs BEAST）は相対比較として一定の根拠あり。</div>`],
  ];
  arch.forEach(([title,body])=>{
    h+=`<div style="margin:4px 12px;border-radius:6px;border:1px solid rgba(0,0,0,0.06);overflow:hidden;cursor:pointer" onclick="this.querySelector('.abody').style.display=this.querySelector('.abody').style.display==='block'?'none':'block'">`;
    h+=`<div style="padding:8px 10px;font-size:11px;font-weight:700;background:var(--card-bg);display:flex;justify-content:space-between"><span>${title}</span><span style="font-size:9px">▶</span></div>`;
    h+=`<div class="abody" style="display:none;padding:8px 10px">${body}</div></div>`;
  });

  // === 10. Forward Clock ===
  h+=`<div style="margin:16px 12px 4px;font-size:10px;font-weight:700">Forward Clock</div>`;
  h+=`<div class="card"><div style="font-size:9px;color:var(--text-sub)">G2-MAX: 2026-04-10開始 | 独立clock</div>`;
  h+=`<div style="background:rgba(0,0,0,0.04);border-radius:4px;height:10px;overflow:hidden;margin:6px 0"><div style="height:100%;width:0%;border-radius:4px;background:var(--g2)"></div></div>`;
  h+=`<div style="display:flex;justify-content:space-between;font-size:8px;color:var(--text-sub)"><span>0/18 rebalances</span><span>Pilot: 12 | Review: 18</span></div></div>`;

  // === 11. Strategy Comparison ===
  h+=`<div class="section-title" style="color:var(--text-sub)">🏷️ 戦略系譜</div>`;
  h+=`<div style="margin:4px 12px;padding:8px;border-radius:6px;background:var(--card-bg);font-size:8px;line-height:1.8;color:var(--text-sub)">`;
  h+=`<b style="color:var(--blue)">PRISM-R</b> CAGR=27.2% Sharpe=0.87 MaxDD=-54.6% — baseline (A5-lite W5b)<br>`;
  h+=`<b style="color:var(--purple)">PRISM-RQ</b> CAGR=26.6% Sharpe=0.93 MaxDD=-54.1% — risk-adjusted (BFM-v2+Q rebal)<br>`;
  h+=`<b style="color:var(--g2)">G2-MAX</b> CAGR=149.5% Sharpe=1.63 MaxDD=-58.9% — CAGR-max (W5b consistency-weighted raw α)`;
  h+=`</div>`;

  document.getElementById('g2Main').innerHTML=h;
  // Sell card placeholder
  document.getElementById('G2Main')||document.body;
  setTimeout(initG2,300);
  setTimeout(()=>{fetchG2Fx();setTimeout(calcG2,1500);},300);
}).catch(err=>{document.getElementById('g2Main').innerHTML=`<p style="color:red;padding:20px">Error: ${err.message}</p>`;});

// Rebalance calculator
let g2ccy='USD';let g2fx=150;
function setG2Ccy(c){
  g2ccy=c;
  document.getElementById('g2SegUSD').classList.toggle('active',c==='USD');
  document.getElementById('g2SegJPY').classList.toggle('active',c==='JPY');
  document.getElementById('g2CcySign').textContent=c==='USD'?'$':'¥';
  const cap=document.getElementById('g2Capital');
  if(c==='JPY'){cap.value=Math.round(parseFloat(cap.value.replace(/,/g,''))*g2fx).toLocaleString();}
  else{cap.value=Math.round(parseFloat(cap.value.replace(/,/g,''))/g2fx).toLocaleString();}
  calcG2();
}
function fetchG2Fx(){
  const dot=document.getElementById('g2FxDot');const time=document.getElementById('g2FxTime');
  const icon=document.getElementById('g2FxIcon');const rate=document.getElementById('g2FxRate');
  dot.style.background='#BA7517';time.textContent='取得中...';icon.style.transform='rotate(360deg)';
  fetch('https://api.exchangerate-api.com/v4/latest/USD').then(r=>r.json()).then(d=>{
    g2fx=d.rates?.JPY||150;rate.textContent='¥'+g2fx.toFixed(2);
    dot.style.background='#1D9E75';const now=new Date();
    time.textContent=now.toLocaleTimeString('ja-JP',{timeZone:'Asia/Tokyo',hour:'2-digit',minute:'2-digit',hour12:false})+' JST取得';
    icon.style.transform='rotate(0deg)';calcG2();
  }).catch(()=>{dot.style.background='#E24B4A';time.textContent='取得失敗';icon.style.transform='rotate(0deg)';});
}
function calcG2(){
  const picks=window._g2_picks;if(!picks||!picks.length)return;
  const rawCap=parseFloat(document.getElementById('g2Capital').value.replace(/,/g,''))||0;
  const fx=g2fx;
  const capUSD=g2ccy==='JPY'?rawCap/fx:rawCap;
  let totalInvG2=0;let totalInvB=0;let html='';
  picks.forEach(p=>{
    if(!p.price)return;
    const w=p.w5b_weight||1.0/picks.length;
    const bw=p.beast_weight||1.0/picks.length;
    const g2target=capUSD*w;const g2shares=Math.floor(g2target/p.price);
    const g2actual=g2shares*p.price;const g2pct=capUSD>0?(g2actual/capUSD)*100:0;
    const btarget=capUSD*bw;const bshares=Math.floor(btarget/p.price);
    const bactual=bshares*p.price;const bpct=capUSD>0?(bactual/capUSD)*100:0;
    totalInvG2+=g2actual;totalInvB+=bactual;
    html+=`<tr><td><b style="color:var(--g2)">${p.ticker}</b> <span style="font-size:8px;color:var(--text-sub)">α${p.alpha63!=null?p.alpha63.toFixed(2):''}</span></td>`;
    html+=`<td style="font-size:9px">${p.theme}</td>`;
    html+=`<td class="num" style="font-weight:700;color:var(--g2)">${(w*100).toFixed(1)}%</td>`;
    html+=`<td class="num" style="font-weight:700;color:#D85A30">${(bw*100).toFixed(1)}%</td>`;
    html+=`<td class="num">$${p.price.toLocaleString()}</td>`;
    html+=`<td class="num"><span class="shares">${g2shares}株</span> <span class="dev ${g2pct-w*100>=0?'pos':'neg'}">実${g2pct.toFixed(1)}%</span></td>`;
    html+=`<td class="num" style="color:#D85A30"><span class="shares">${bshares}株</span> <span style="font-size:8px">実${bpct.toFixed(1)}%</span></td></tr>`;
  });
  document.getElementById('g2RebalBody').innerHTML=html;
  const resG2=capUSD-totalInvG2;const resB=capUSD-totalInvB;
  const resPctG2=capUSD>0?(resG2/capUSD)*100:0;const resPctB=capUSD>0?(resB/capUSD)*100:0;
  const fmtD=v=>'$'+v.toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0});
  const fmtY=v=>'¥'+Math.round(v*fx).toLocaleString();
  let sh=`<div class="prod-summary"><span style="color:var(--g2)">G2 投資額 <b>${fmtD(totalInvG2)}</b>`;
  if(g2ccy==='JPY')sh+=` (${fmtY(totalInvG2)})`;
  sh+=`</span><span style="color:var(--g2)">余り <b style="color:${resPctG2>15?'var(--red)':'var(--text-main)'}"> ${fmtD(resG2)} (${resPctG2.toFixed(1)}%)</b></span></div>`;
  sh+=`<div class="prod-summary" style="margin-top:4px"><span style="color:#D85A30">🔥 投資額 <b>${fmtD(totalInvB)}</b>`;
  if(g2ccy==='JPY')sh+=` (${fmtY(totalInvB)})`;
  sh+=`</span><span style="color:#D85A30">余り <b style="color:${resPctB>15?'var(--red)':'var(--text-main)'}"> ${fmtD(resB)} (${resPctB.toFixed(1)}%)</b></span></div>`;
  document.getElementById('g2RebalSummary').innerHTML=sh;
  const convEl=document.getElementById('g2ConvDisplay');
  if(convEl){if(g2ccy==='USD')convEl.textContent='≈ ¥'+Math.round(rawCap*fx).toLocaleString();else convEl.textContent='≈ $'+Math.round(rawCap/fx).toLocaleString();}
}

// Cumulative returns chart
function initG2(){
fetch('/api/prism-g2/cumulative_returns.json?t='+Date.now()).then(r=>r.json()).then(cr=>{
  const ctx=document.getElementById('cumChartG2');if(!ctx)return;
  const fwd=cr.forward_overlay||{dates:[],a5:[],SPY:[]};
  const lastBT=cr.a5[cr.a5.length-1]||1;const lastSPY=cr.SPY[cr.SPY.length-1]||1;
  const btBeast=cr.beast||[];
  const fwdA5=(fwd.a5||[]).map(g=>Math.round(lastBT*g*1e6)/1e6);
  const lastBeast=btBeast[btBeast.length-1]||1;
  const fwdBeast=(fwd.beast||[]).map(g=>Math.round(lastBeast*g*1e6)/1e6);
  const fwdSPY=(fwd.SPY||[]).map(g=>Math.round(lastSPY*g*1e6)/1e6);
  const allDates=[...cr.dates,...fwd.dates.filter(d=>!cr.dates.includes(d))];
  const btA5=[...cr.a5,...new Array(fwd.dates.filter(d=>!cr.dates.includes(d)).length).fill(null)];
  const btBeastPad=[...btBeast,...new Array(fwd.dates.filter(d=>!cr.dates.includes(d)).length).fill(null)];
  const btSPY=[...cr.SPY,...new Array(fwd.dates.filter(d=>!cr.dates.includes(d)).length).fill(null)];
  const fA5=[...new Array(cr.dates.length-1).fill(null),lastBT,...fwdA5];
  const fBeast=[...new Array(cr.dates.length-1).fill(null),lastBeast,...fwdBeast];
  const fSPY=[...new Array(cr.dates.length-1).fill(null),lastSPY,...fwdSPY];
  window._cumChartG2=new Chart(ctx,{type:'line',data:{labels:allDates,datasets:[
    {label:'G2 BT(参考)',data:btA5,borderColor:'rgba(225,29,72,0.4)',borderWidth:1.5,pointRadius:0,fill:false,borderDash:[4,3]},
    {label:'BEAST BT',data:btBeastPad,borderColor:'rgba(216,90,48,0.5)',borderWidth:1.5,pointRadius:0,fill:false,borderDash:[6,3]},
    {label:'G2 実績',data:fA5,borderColor:'#e11d48',borderWidth:2.5,pointRadius:fwd.dates.length>0?3:0,fill:false},
    {label:'BEAST 実績',data:fBeast,borderColor:'#D85A30',borderWidth:2.5,pointRadius:fwd.dates.length>0?3:0,fill:false},
    {label:'SPY BT',data:btSPY,borderColor:'rgba(156,163,175,0.4)',borderWidth:1,pointRadius:0,fill:false,borderDash:[4,3]},
    {label:'SPY 実績',data:fSPY,borderColor:'#9ca3af',borderWidth:2,pointRadius:fwd.dates.length>0?3:0,fill:false}
  ]},options:{responsive:true,maintainAspectRatio:false,layout:{padding:{bottom:8}},interaction:{mode:'index',intersect:false},spanGaps:false,
    plugins:{legend:{position:'top',labels:{font:{size:10},boxWidth:12}},tooltip:{callbacks:{label:c=>{const v=c.parsed.y;if(v>=1e9)return c.dataset.label+': '+(v/1e9).toFixed(1)+'Bx';if(v>=1e6)return c.dataset.label+': '+(v/1e6).toFixed(1)+'Mx';if(v>=1e3)return c.dataset.label+': '+(v/1e3).toFixed(1)+'Kx';return c.dataset.label+': '+v.toFixed(2)+'x'}}}},
    scales:{x:{type:'category',ticks:{maxTicksLimit:8,maxRotation:45,font:{size:8}},grid:{display:false}},y:{type:'logarithmic',ticks:{font:{size:9},callback:v=>{if(v>=1e9)return(v/1e9).toFixed(0)+'Bx';if(v>=1e6)return(v/1e6).toFixed(0)+'Mx';if(v>=1e3)return(v/1e3).toFixed(0)+'Kx';return v.toFixed(1)+'x'}},grid:{color:'rgba(0,0,0,0.04)'}}}}});
  const st=cr.stats;
  const mkRow=(name,color,cagr,maxdd,sharpe,sortino,calmar)=>`<div style="display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:6px;background:${color};margin-bottom:4px"><div style="font-size:10px;font-weight:700;min-width:50px;color:var(--text-main)">${name}</div><div style="display:flex;gap:6px;flex:1"><div style="flex:1;text-align:center"><div style="font-size:7px;color:var(--text-sub)">CAGR</div><div style="font-size:11px;font-weight:700">${cagr}</div></div><div style="flex:1;text-align:center"><div style="font-size:7px;color:var(--text-sub)">MaxDD</div><div style="font-size:11px;font-weight:700">${maxdd}</div></div><div style="flex:1;text-align:center"><div style="font-size:7px;color:var(--text-sub)">Sharpe</div><div style="font-size:11px;font-weight:700">${sharpe}</div></div><div style="flex:1;text-align:center"><div style="font-size:7px;color:var(--text-sub)">Sortino</div><div style="font-size:11px;font-weight:700">${sortino}</div></div><div style="flex:1;text-align:center"><div style="font-size:7px;color:var(--text-sub)">Calmar</div><div style="font-size:11px;font-weight:700">${calmar}</div></div></div></div>`;
  document.getElementById('cumStatsG2').innerHTML=
    mkRow('G2-MAX','rgba(225,29,72,0.06)',(st.a5.cagr*100).toFixed(1)+'%',(st.a5.maxdd*100).toFixed(1)+'%',st.a5.sharpe.toFixed(2),(st.a5.sortino||0).toFixed(2),(st.a5.calmar||0).toFixed(2))+
    (st.beast?mkRow('🔥BEAST','rgba(216,90,48,0.06)',(st.beast.cagr*100).toFixed(1)+'%',(st.beast.maxdd*100).toFixed(1)+'%',st.beast.sharpe.toFixed(2),(st.beast.sortino||0).toFixed(2),(st.beast.calmar||0).toFixed(2)):'')+
    mkRow('SPY','rgba(0,0,0,0.03)',(st.SPY.cagr*100).toFixed(1)+'%',(st.SPY.maxdd*100).toFixed(1)+'%',st.SPY.sharpe.toFixed(2),(st.SPY.sortino||0).toFixed(2),(st.SPY.calmar||0).toFixed(2));
  const ann=cr.annual;const years=Object.keys(ann.a5).sort();let tb='';
  years.forEach(y=>{
    const gv=ann.a5[y]||0,bv=(ann.beast||{})[y]||0,sv=ann.SPY[y]||0;
    const f=v=>(v>=0?'+':'')+(v*100).toFixed(1)+'%';
    const c=v=>v>=0?'color:var(--green)':'color:var(--red)';
    tb+=`<tr><td style="font-weight:600">${y}</td><td style="${c(gv)};font-weight:700">${f(gv)}</td><td style="${c(bv)};color:#D85A30">${f(bv)}</td><td style="${c(sv)}">${f(sv)}</td></tr>`;
  });
  document.getElementById('annualBodyG2').innerHTML=tb;
}).catch(e=>console.warn('G2 chart error:',e));}
</script>

<script>
function toggleLogScale(chartVar, toggleId, isLog) {
  const chart = window[chartVar];
  if (!chart) return;
  chart.options.scales.y.type = isLog ? 'logarithmic' : 'linear';
  if (isLog) {
    chart.options.scales.y.ticks.callback = function(v) {
      if ([0.5,1,2,5,10,20,50,100,200,500].includes(v)) return v.toFixed(v<10?1:0)+'x';
      return null;
    };
  } else {
    chart.options.scales.y.ticks.callback = function(v) { return v.toFixed(1)+'x'; };
  }
  chart.update();
  document.querySelectorAll('#'+toggleId+' button').forEach(function(b,i) {
    b.classList.toggle('active', isLog ? i===1 : i===0);
  });
}
</script>



<script>

      diff.unchanged.forEach(a=>{h += '<div style="padding:2px 0;font-size:10px;color:var(--text-sub)">'+a.ticker+' <span style="font-size:9px">'+(a.theme||'')+'</span></div>';});

    h += '<div style="font-size:8px;color:var(--text-sub);margin-top:6px">前回: '+(diff.prev_date||'初回')+'</div>';
