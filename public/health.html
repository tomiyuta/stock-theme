<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>健康診断 | PRISMATIC</title>
  <link rel="stylesheet" href="/styles.css?v=22">
  <style>
    /* health page 専用 — iframe で opengrail/monitor を埋め込み */
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body { display: flex; flex-direction: column; }
    .health-main {
      flex: 1 1 auto;
      overflow: hidden;
      position: relative;
      /* bottom-nav の高さ分を引く (PC=56px, mobile=60px 程度) */
      padding-bottom: 0;
      background: var(--bg-color);
    }
    .health-iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #F8F7F4;
    }
    .health-loading {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: var(--text-sub);
      font-size: 12px;
      z-index: 1;
      pointer-events: none;
    }
    /* bottom-nav の safe area を確保 */
    .bottom-nav { z-index: 300; }
  </style>
</head>
<body>
  <main class="health-main">
    <div class="health-loading">読み込み中…</div>
    <iframe
      class="health-iframe"
      src="https://opengrail.vercel.app/monitor"
      title="市場の健康診断"
      loading="eager"
      allow="fullscreen"
      onload="this.previousElementSibling.style.display='none'"
    ></iframe>
  </main>

  <nav class="bottom-nav">
    <a class="nav-item" href="/"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg></span>テーマ</a>
    <a class="nav-item active" href="/health"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 2v6H3v8h6v6h6v-6h6V8h-6V2z"/></svg></span>健康診断</a>
    <a class="nav-item" href="/map"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"/></svg></span>マップ</a>
    <a class="nav-item" href="/market-movers"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span>銘柄</a>
    <a class="nav-item" href="/infographic"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15 15 0 014 10 15 15 0 01-4 10 15 15 0 01-4-10 15 15 0 014-10z"/></svg></span>マクロ</a>
    <a class="nav-item" href="/prism"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/><line x1="12" y1="22" x2="12" y2="8.5"/><line x1="22" y1="8.5" x2="2" y2="8.5"/></svg></span>PRISM</a>
    <a class="nav-item" href="/prism-r"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/><circle cx="12" cy="12" r="3"/></svg></span><span style="color:#7c3aed">R</span></a>
    <a class="nav-item" href="/prism-rq"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg></span><span style="color:#7c3aed">RQ</span></a>
    <a class="nav-item" href="/prism-g2"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/><path d="M7 14l5-8 5 8" fill="currentColor"/></svg></span><span style="color:#e11d48">G2</span></a>
  </nav>
</body>
</html>
